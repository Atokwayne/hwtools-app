<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HW Tools v2 — Inventaris & Penjualan</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F5F6FA;color:#1C2333;font-size:14px}
:root{--nav:210px;--acc:#185FA5;--accl:#E6F1FB;--ok:#3B6D11;--okl:#EAF3DE;--err:#A32D2D;--errl:#FCEBEB;--warn:#854F0B;--warnl:#FAEEDA;--bd:#E2E6EF;--t2:#6B7280;--t3:#9CA3AF;--bg2:#fff;--bg3:#F5F6FA}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--nav);background:#fff;border-right:1px solid var(--bd);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10;overflow-y:auto}
.logo{padding:16px;border-bottom:1px solid var(--bd)}.logo h1{font-size:14px;font-weight:700;color:#1C2333}.logo p{font-size:10px;color:var(--t2);margin-top:2px}
.nl{font-size:10px;font-weight:700;color:var(--t3);padding:8px 14px 3px;letter-spacing:.06em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--t2);border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:#F5F6FA;color:#1C2333}.ni.active{color:var(--acc);background:var(--accl);border-left-color:var(--acc);font-weight:600}
.ni i{font-size:16px;width:18px;flex-shrink:0}
.main{margin-left:var(--nav);flex:1;min-width:0}
.hdr{height:50px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:5}
.hdr h2{font-size:14px;font-weight:700}.hdr-r{display:flex;gap:8px}
.content{padding:22px}
.btn{padding:7px 13px;border-radius:7px;border:1px solid var(--bd);background:#fff;color:#1C2333;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:#F5F6FA}.btn-p{background:var(--acc);color:#fff;border-color:var(--acc)}.btn-p:hover{background:#134E8A}
.btn-d{background:var(--errl);color:var(--err);border-color:#F7C1C1}.btn-ok{background:var(--okl);color:var(--ok);border-color:#C0DD97}
.btn-sm{padding:4px 9px;font-size:11px}.btn-ic{padding:5px;border-radius:6px}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-t{font-size:11px;font-weight:700;margin-bottom:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.met{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:14px}
.ml{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}.mv{font-size:18px;font-weight:700}.ms{font-size:11px;color:var(--t3);margin-top:3px}
.g{color:var(--ok)}.r{color:var(--err)}.b{color:var(--acc)}.o{color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 11px;font-size:10px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;background:#FAFBFC}
td{padding:9px 11px;border-bottom:1px solid #F0F2F7;vertical-align:middle}tr:last-child td{border-bottom:none}tbody tr:hover td{background:#FAFBFC}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bb{background:var(--accl);color:var(--acc)}.bg2{background:var(--okl);color:var(--ok)}.br{background:var(--errl);color:var(--err)}.bo{background:var(--warnl);color:var(--warn)}.bx{background:#F0F2F7;color:var(--t2)}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:#fff;color:#1C2333;font-size:12px;font-family:inherit;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
input[type=checkbox]{width:auto;cursor:pointer}
.fr{display:grid;gap:10px;margin-bottom:12px}.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:1fr 1fr 1fr 1fr}
label{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;max-height:94vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-lg{max-width:820px}
.mh{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mh h3{font-size:14px;font-weight:700}.mb{padding:20px}.mf{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.fb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}.fb input,.fb select{width:auto;min-width:140px}
.empty{text-align:center;padding:40px;color:var(--t3)}.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.35}.empty p{font-size:12px}
.chip{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:10px;background:#F0F2F7;color:var(--t2);font-family:monospace;font-weight:700}
.pb{height:5px;background:#F0F2F7;border-radius:3px;overflow:hidden;margin-top:3px}.pbf{height:100%;border-radius:3px;background:var(--acc)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ib{padding:10px 12px;background:var(--accl);border-radius:7px;font-size:12px;border-left:3px solid var(--acc);margin-bottom:12px}
.sb{padding:12px;background:#FAFBFC;border-radius:7px;font-size:12px;border:1px solid var(--bd)}
.sb .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #F0F2F7}
.sb .row:last-child{border-bottom:none;font-weight:700;padding-top:7px}
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}.tw table{border:none}
.toast{position:fixed;bottom:22px;right:22px;background:#1C2333;color:#fff;padding:11px 16px;border-radius:9px;font-size:12px;z-index:999;animation:su .25s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.nw{white-space:nowrap}.rt{text-align:right}.tm{color:var(--t2)}.divider{height:1px;background:var(--bd);margin:12px 0}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.tab-bar{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.sku-line{display:grid;grid-template-columns:1fr 120px 100px 90px 90px 100px 36px;gap:6px;align-items:center;padding:8px;border:1px solid var(--bd);border-radius:7px;margin-bottom:6px;background:#FAFBFC}
.sku-line:hover{background:#F0F2F7}
.bar-wrap{display:flex;align-items:flex-end;gap:3px;height:110px}
.bg3{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bw{display:flex;align-items:flex-end;gap:1px;height:96px}
.bar{border-radius:2px 2px 0 0;min-height:2px}
.bl{font-size:9px;color:var(--t3);margin-top:2px}
.pay-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600}
.outstanding{background:var(--errl);color:var(--err)}.paid{background:var(--okl);color:var(--ok)}.partial{background:var(--warnl);color:var(--warn)}
</style>
</head>
<body><div id="app"></div>
<script>
const BRANDS=['Sellery','Ranger Germany','Castrix','Blickle','Prohex','Crossman','King Tony','Elora','Truecraft','Force','Jason','Kondo','KTC','Matsu','Tekiro','Kukko','Toyoda','Zeki','ETC'];
const PAY_METHODS=['Cash','Transfer Bank','QRIS','EDC'];
const EXPENSE_CATS=['Biaya Kirim','Biaya Operasional','Biaya Pemasaran','Biaya Lain-lain'];
const MO=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const KEY='hwtools-v2';
const fmt=n=>new Intl.NumberFormat('id-ID').format(Math.round(n||0));
const rp=n=>'Rp '+fmt(n);
const pct=n=>((n||0)*100).toFixed(1)+'%';
const fd=d=>d?new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}):'';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const today=()=>new Date().toISOString().slice(0,10);

let S={
  page:'dashboard',modal:null,tab:'',
  products:[],stockIn:[],stockOut:[],
  suppliers:[],customers:[],
  expenses:[],returns:[],
  fb:'',fp:'monthly',fy:new Date().getFullYear(),fm:new Date().getMonth(),q:'',
};

function load(){
  try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);
    ['products','stockIn','stockOut','suppliers','customers','expenses','returns'].forEach(k=>{if(p[k])S[k]=p[k];});
  }}catch(e){}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify({products:S.products,stockIn:S.stockIn,stockOut:S.stockOut,suppliers:S.suppliers,customers:S.customers,expenses:S.expenses,returns:S.returns}));}catch(e){}
}
function toast(msg,ok=true){const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.background=ok?'#1C2333':'#A32D2D';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// ── COMPUTED ──────────────────────────────────────────
function stats(sku){
  const p=S.products.find(x=>x.sku===sku);if(!p)return{stokBagus:0,stokKaratan:0,avg:0};
  const tIn=S.stockIn.reduce((a,inv)=>a+(inv.items||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  const tOut=S.stockOut.reduce((a,inv)=>a+(inv.items||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  const tRet=S.returns.filter(x=>x.stokMasuk&&x.sku===sku).reduce((a,x)=>a+x.qty,0);
  const stokBagus=Math.max(0,(p.sb||0)+tIn-tOut+tRet);
  let q=p.sb||0,v=(p.m||0)*q;
  S.stockIn.forEach(inv=>(inv.items||[]).filter(x=>x.sku===sku).forEach(x=>{q+=x.qty;v+=x.hn*x.qty;}));
  return{stokBagus,stokKaratan:p.sk||0,avg:q>0?v/q:p.m||0};
}
function nilaiTotal(){return S.products.reduce((a,p)=>{const s=stats(p.sku);return a+s.stokBagus*s.avg;},0);}
function metrics(period,yr,mo){
  let outs=[...S.stockOut];
  if(period==='monthly')outs=outs.filter(x=>{const d=new Date(x.tgl);return d.getFullYear()===yr&&d.getMonth()===mo;});
  else if(period==='quarterly'){const q=Math.floor(mo/3);outs=outs.filter(x=>{const d=new Date(x.tgl);return d.getFullYear()===yr&&Math.floor(d.getMonth()/3)===q;});}
  else if(period==='semesterly'){const s=mo<6?0:1;outs=outs.filter(x=>{const d=new Date(x.tgl);return d.getFullYear()===yr&&(d.getMonth()<6?0:1)===s;});}
  else outs=outs.filter(x=>new Date(x.tgl).getFullYear()===yr);
  const omz=outs.reduce((a,x)=>a+(x.neto||0),0);
  const hpp=outs.reduce((a,x)=>a+(x.items||[]).reduce((b,i)=>b+i.hpp*i.qty,0),0);
  const laba=omz-hpp;
  return{omz,hpp,laba,mp:omz>0?laba/omz:0,trx:outs.length};
}
function getOutstandingTotal(){
  return S.stockOut.filter(x=>x.payStatus!=='paid').reduce((a,x)=>{
    const paid=(x.payments||[]).reduce((b,p)=>b+p.amount,0);
    return a+(x.neto-paid);
  },0);
}
function getCustomerOutstanding(custId){
  return S.stockOut.filter(x=>x.custId===custId&&x.payStatus!=='paid').reduce((a,x)=>{
    const paid=(x.payments||[]).reduce((b,p)=>b+p.amount,0);
    return a+(x.neto-paid);
  },0);
}

// ── LAYOUT ────────────────────────────────────────────
const PAGES={dashboard:'Dashboard',analisis:'Analisis Bisnis',produk:'Data Produk',stokmasuk:'Stok Masuk',stokkeluar:'Stok Keluar',rekap:'Rekap per Brand',supplier:'Database Supplier',customer:'Database Customer',piutang:'Piutang Outstanding',biaya:'Pencatatan Biaya',retur:'Retur'};
function render(){document.getElementById('app').innerHTML=layout();bind();}
function navI(icon,lbl,pg){return`<div class="ni${S.page===pg?' active':''}" data-nav="${pg}"><i class="ti ti-${icon}"></i>${lbl}</div>`;}

function layout(){
  const HB={
    produk:`<button class="btn btn-p" id="bAddP"><i class="ti ti-plus"></i> Tambah Produk</button>`,
    stokmasuk:`<button class="btn btn-p" id="bAddI"><i class="ti ti-plus"></i> Catat Stok Masuk</button>`,
    stokkeluar:`<button class="btn btn-p" id="bAddO"><i class="ti ti-plus"></i> Catat Penjualan</button>`,
    supplier:`<button class="btn btn-p" id="bAddSup"><i class="ti ti-plus"></i> Tambah Supplier</button>`,
    customer:`<button class="btn btn-p" id="bAddCust"><i class="ti ti-plus"></i> Tambah Customer</button>`,
    biaya:`<button class="btn btn-p" id="bAddExp"><i class="ti ti-plus"></i> Catat Biaya</button>`,
    retur:`<button class="btn btn-p" id="bAddRet"><i class="ti ti-plus"></i> Catat Retur</button>`,
  };
  return`<div class="layout">
  <div class="sidebar">
    <div class="logo"><h1>HW Tools</h1><p>Inventaris &amp; Penjualan v2</p></div>
    <div style="padding:6px 0;flex:1;overflow-y:auto">
      <div class="nl">Utama</div>
      ${navI('dashboard','Dashboard','dashboard')}
      ${navI('chart-bar','Analisis Bisnis','analisis')}
      <div class="nl">Inventaris</div>
      ${navI('package','Data Produk','produk')}
      ${navI('arrow-bar-to-down','Stok Masuk','stokmasuk')}
      ${navI('arrow-bar-up','Stok Keluar','stokkeluar')}
      ${navI('refresh','Retur','retur')}
      <div class="nl">Keuangan</div>
      ${navI('credit-card','Piutang','piutang')}
      ${navI('receipt','Biaya','biaya')}
      <div class="nl">Database</div>
      ${navI('truck','Supplier','supplier')}
      ${navI('users','Customer','customer')}
      ${navI('list-details','Rekap Brand','rekap')}
    </div>
    <div style="padding:12px;border-top:1px solid var(--bd)">
      <button class="btn btn-sm" style="width:100%;justify-content:center;margin-bottom:6px" id="bExp"><i class="ti ti-download"></i> Export Data</button>
      <label class="btn btn-sm" style="width:100%;justify-content:center;cursor:pointer"><i class="ti ti-upload"></i> Import Data<input type="file" accept=".json" id="bImp" style="display:none"></label>
    </div>
  </div>
  <div class="main">
    <div class="hdr"><h2>${PAGES[S.page]||''}</h2><div class="hdr-r">${HB[S.page]||''}</div></div>
    <div class="content">${page()}</div>
  </div>
  </div>${S.modal?modal():''}`;
}

function page(){
  const pg=S.page;
  if(pg==='dashboard')return pgDash();
  if(pg==='analisis')return pgAn();
  if(pg==='produk')return pgProd();
  if(pg==='stokmasuk')return pgIn();
  if(pg==='stokkeluar')return pgOut();
  if(pg==='rekap')return pgRekap();
  if(pg==='supplier')return pgSup();
  if(pg==='customer')return pgCust();
  if(pg==='piutang')return pgPiutang();
  if(pg==='biaya')return pgBiaya();
  if(pg==='retur')return pgRetur();
  return'';
}

// ── DASHBOARD ─────────────────────────────────────────
function pgDash(){
  const now=new Date(),m=metrics('monthly',now.getFullYear(),now.getMonth()),y=metrics('yearly',now.getFullYear(),now.getMonth());
  const ns=nilaiTotal(),sk=S.products.length,st=S.products.reduce((a,p)=>a+stats(p.sku).stokBagus,0);
  const piutang=getOutstandingTotal();
  return`
  <div class="mg">
    <div class="met"><div class="ml">Omzet Bulan Ini</div><div class="mv b">${rp(m.omz)}</div><div class="ms">${m.trx} transaksi</div></div>
    <div class="met"><div class="ml">Laba Kotor Bulan Ini</div><div class="mv ${m.laba>=0?'g':'r'}">${rp(m.laba)}</div><div class="ms">${pct(m.mp)} margin</div></div>
    <div class="met"><div class="ml">Omzet Tahun Ini</div><div class="mv b">${rp(y.omz)}</div><div class="ms">${y.trx} transaksi</div></div>
    <div class="met"><div class="ml">Nilai Stok (Modal)</div><div class="mv o">${rp(ns)}</div><div class="ms">${fmt(st)} pcs · ${sk} SKU</div></div>
    <div class="met"><div class="ml">Piutang Outstanding</div><div class="mv r">${rp(piutang)}</div><div class="ms">${S.stockOut.filter(x=>x.payStatus!=='paid').length} invoice belum lunas</div></div>
  </div>
  <div class="two">
    <div class="card"><div class="card-t">Penjualan Terbaru</div>
    ${!S.stockOut.length?`<div class="empty"><i class="ti ti-receipt-off"></i><p>Belum ada data</p></div>`:`
    <table><thead><tr><th>Tgl</th><th>Invoice</th><th>Customer</th><th class="rt">Neto</th><th>Status</th></tr></thead><tbody>
    ${[...S.stockOut].reverse().slice(0,7).map(x=>{
      const cust=S.customers.find(c=>c.id===x.custId);
      const paid=(x.payments||[]).reduce((a,p)=>a+p.amount,0);
      const status=paid>=x.neto?'paid':paid>0?'partial':'outstanding';
      return`<tr><td class="nw">${fd(x.tgl)}</td><td><span class="chip">${x.inv||'—'}</span></td>
        <td>${cust?cust.nama:'—'}</td><td class="rt">${rp(x.neto)}</td>
        <td><span class="pay-badge ${status}">${status==='paid'?'Lunas':status==='partial'?'Sebagian':'Belum'}</span></td></tr>`;
    }).join('')}</tbody></table>`}
    </div>
    <div class="card"><div class="card-t">Stok Masuk Terbaru</div>
    ${!S.stockIn.length?`<div class="empty"><i class="ti ti-package-off"></i><p>Belum ada data</p></div>`:`
    <table><thead><tr><th>Tgl</th><th>Invoice</th><th>Supplier</th><th class="rt">Item</th><th class="rt">Total</th></tr></thead><tbody>
    ${[...S.stockIn].reverse().slice(0,7).map(x=>{
      const sup=S.suppliers.find(s=>s.id===x.supId);
      const total=(x.items||[]).reduce((a,i)=>a+i.total,0);
      return`<tr><td class="nw">${fd(x.tgl)}</td><td><span class="chip">${x.inv||'—'}</span></td>
        <td>${sup?sup.nama:'—'}</td><td class="rt">${(x.items||[]).length}</td><td class="rt">${rp(total)}</td></tr>`;
    }).join('')}</tbody></table>`}
    </div>
  </div>
  <div class="two">
    <div class="card"><div class="card-t">Piutang Terbesar</div>
    ${!S.customers.length?`<div class="empty"><i class="ti ti-user-off"></i><p>Belum ada customer</p></div>`:`
    <table><thead><tr><th>Customer</th><th class="rt">Outstanding</th></tr></thead><tbody>
    ${S.customers.map(c=>({c,o:getCustomerOutstanding(c.id)})).filter(x=>x.o>0).sort((a,b)=>b.o-a.o).slice(0,5).map(({c,o})=>`<tr>
      <td>${c.nama}</td><td class="rt r"><strong>${rp(o)}</strong></td></tr>`).join('')||`<tr><td colspan="2"><div class="empty" style="padding:16px"><p>Tidak ada piutang outstanding</p></div></td></tr>`}
    </tbody></table>`}
    </div>
    <div class="card"><div class="card-t">Biaya Bulan Ini</div>
    ${(()=>{
      const now=new Date();
      const bln=S.expenses.filter(x=>{const d=new Date(x.tgl);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});
      const total=bln.reduce((a,x)=>a+x.jumlah,0);
      if(!bln.length)return`<div class="empty"><i class="ti ti-receipt-off"></i><p>Belum ada biaya dicatat</p></div>`;
      return`<div class="met" style="margin-bottom:10px"><div class="ml">Total Biaya Bulan Ini</div><div class="mv r">${rp(total)}</div></div>
      <table><thead><tr><th>Kategori</th><th class="rt">Jumlah</th></tr></thead><tbody>
      ${EXPENSE_CATS.map(cat=>{const t=bln.filter(x=>x.cat===cat).reduce((a,x)=>a+x.jumlah,0);return t?`<tr><td>${cat}</td><td class="rt">${rp(t)}</td></tr>`:''}).join('')}
      </tbody></table>`;
    })()}
    </div>
  </div>`;
}

// ── ANALISIS ──────────────────────────────────────────
function pgAn(){
  const yrs=[...new Set(S.stockOut.map(x=>new Date(x.tgl).getFullYear()))];
  if(!yrs.includes(S.fy))yrs.push(S.fy);yrs.sort((a,b)=>b-a);
  const m=metrics(S.fp,S.fy,S.fm);
  const mon=Array.from({length:12},(_,i)=>metrics('monthly',S.fy,i));
  const maxO=Math.max(...mon.map(x=>x.omz),1);
  const expTotal=S.expenses.filter(x=>new Date(x.tgl).getFullYear()===S.fy).reduce((a,x)=>a+x.jumlah,0);
  const bData=BRANDS.map(b=>{
    let outs=S.stockOut.filter(x=>x.brand===b||(x.items||[]).some(i=>S.products.find(p=>p.sku===i.sku&&p.brand===b)));
    if(S.fp==='monthly')outs=outs.filter(x=>{const d=new Date(x.tgl);return d.getFullYear()===S.fy&&d.getMonth()===S.fm;});
    else if(S.fp==='yearly')outs=outs.filter(x=>new Date(x.tgl).getFullYear()===S.fy);
    const o=outs.reduce((a,x)=>a+(x.items||[]).filter(i=>S.products.find(p=>p.sku===i.sku&&p.brand===b)).reduce((b2,i)=>b2+i.qty*i.hj,0),0);
    const laba=outs.reduce((a,x)=>a+(x.items||[]).filter(i=>S.products.find(p=>p.sku===i.sku&&p.brand===b)).reduce((b2,i)=>b2+(i.qty*i.hj-i.hpp*i.qty),0),0);
    return{b,o,laba,trx:outs.length};
  }).filter(x=>x.o>0).sort((a,b)=>b.o-a.o);
  const tO=bData.reduce((a,x)=>a+x.o,0)||1;
  return`
  <div class="fb">
    <select id="sFp">${['monthly','quarterly','semesterly','yearly'].map(v=>`<option value="${v}" ${S.fp===v?'selected':''}>${{monthly:'Bulanan',quarterly:'Kuartalan',semesterly:'Semesteran',yearly:'Tahunan'}[v]}</option>`).join('')}</select>
    <select id="sFy">${yrs.map(y=>`<option value="${y}" ${S.fy==y?'selected':''}>${y}</option>`).join('')}</select>
    ${S.fp==='monthly'?`<select id="sFm">${MO.map((m,i)=>`<option value="${i}" ${S.fm==i?'selected':''}>${m}</option>`).join('')}</select>`:''}
  </div>
  <div class="mg">
    <div class="met"><div class="ml">Omzet</div><div class="mv b">${rp(m.omz)}</div></div>
    <div class="met"><div class="ml">HPP</div><div class="mv o">${rp(m.hpp)}</div></div>
    <div class="met"><div class="ml">Laba Kotor</div><div class="mv ${m.laba>=0?'g':'r'}">${rp(m.laba)}</div></div>
    <div class="met"><div class="ml">Margin</div><div class="mv ${m.mp>=.2?'g':m.mp>=.1?'o':'r'}">${pct(m.mp)}</div></div>
    <div class="met"><div class="ml">Total Biaya ${S.fy}</div><div class="mv r">${rp(expTotal)}</div></div>
  </div>
  <div class="card"><div class="card-t">Omzet &amp; Laba Bulanan ${S.fy}</div>
  <div class="bar-wrap">
  ${mon.map((d,i)=>{const hO=Math.round((d.omz/maxO)*92),hL=Math.round((Math.max(0,d.laba)/maxO)*92),act=i===S.fm&&S.fp==='monthly';
    return`<div class="bg3"><div class="bw"><div class="bar" style="width:10px;height:${hO||2}px;background:${act?'#185FA5':'#B5D4F4'}" title="${rp(d.omz)}"></div><div class="bar" style="width:10px;height:${hL||2}px;background:${act?'#3B6D11':'#C0DD97'}" title="${rp(d.laba)}"></div></div><div class="bl">${MO[i]}</div></div>`;
  }).join('')}
  </div>
  <div style="display:flex;gap:14px;margin-top:8px">
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)"><span style="width:10px;height:10px;background:#B5D4F4;border-radius:2px;display:inline-block"></span>Omzet</div>
    <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)"><span style="width:10px;height:10px;background:#C0DD97;border-radius:2px;display:inline-block"></span>Laba Kotor</div>
  </div></div>
  <div class="card"><div class="card-t">Kontribusi per Brand</div>
  ${!bData.length?`<div class="empty"><i class="ti ti-chart-bar-off"></i><p>Belum ada data</p></div>`:
  bData.map(({b,o,laba,trx})=>{const p=o/tO;return`<div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-weight:600;font-size:12px">${b}</span>
    <span style="font-size:11px;color:var(--t2)">${rp(o)} · <span class="${laba>=0?'g':'r'}">${rp(laba)}</span> · ${trx} trx</span></div>
    <div class="pb"><div class="pbf" style="width:${(p*100).toFixed(1)}%"></div></div>
    <div style="font-size:10px;color:var(--t3);margin-top:2px">${(p*100).toFixed(1)}% omzet</div>
  </div>`;}).join('')}
  </div>`;
}

// ── PIUTANG ───────────────────────────────────────────
function pgPiutang(){
  const outstanding=S.stockOut.filter(x=>{
    const paid=(x.payments||[]).reduce((a,p)=>a+p.amount,0);
    return paid<x.neto;
  });
  const totalOut=outstanding.reduce((a,x)=>{const paid=(x.payments||[]).reduce((b,p)=>b+p.amount,0);return a+(x.neto-paid);},0);
  return`
  <div class="mg">
    <div class="met"><div class="ml">Total Piutang Outstanding</div><div class="mv r">${rp(totalOut)}</div><div class="ms">${outstanding.length} invoice</div></div>
    <div class="met"><div class="ml">Customer dengan Piutang</div><div class="mv">${[...new Set(outstanding.map(x=>x.custId).filter(Boolean))].length}</div></div>
  </div>
  <div class="tw"><table><thead><tr><th>Tanggal</th><th>Invoice</th><th>Customer</th><th>Term</th><th>Jatuh Tempo</th><th class="rt">Nilai Invoice</th><th class="rt">Sudah Dibayar</th><th class="rt">Sisa</th><th>Status</th><th></th></tr></thead><tbody>
  ${!outstanding.length?`<tr><td colspan="10"><div class="empty"><i class="ti ti-circle-check"></i><p>Tidak ada piutang outstanding</p></div></td></tr>`:
  outstanding.map(x=>{
    const cust=S.customers.find(c=>c.id===x.custId);
    const paid=(x.payments||[]).reduce((a,p)=>a+p.amount,0);
    const sisa=x.neto-paid;
    const status=paid>0?'partial':'outstanding';
    const jt=x.jatuhTempo?new Date(x.jatuhTempo):null;
    const overdue=jt&&jt<new Date();
    return`<tr>
      <td class="nw">${fd(x.tgl)}</td><td><span class="chip">${x.inv||'—'}</span></td>
      <td>${cust?cust.nama:'—'}</td>

      <td class="rt">${rp(x.neto)}</td><td class="rt g">${rp(paid)}</td>
      <td class="rt r"><strong>${rp(sisa)}</strong></td>
      <td><span class="pay-badge ${status}">${status==='partial'?'Sebagian':'Belum'}</span></td>
      <td><button class="btn btn-ic btn-sm btn-ok" data-pay="${x.id}" title="Catat Pembayaran"><i class="ti ti-cash"></i></button></td>

  }).join('')}

}

function skuLineIn(it,idx){
  const skuOpts=S.products.map(p=>`<option value="${p.sku}" ${it.sku===p.sku?'selected':''}>${p.sku} — ${p.nama}</option>`).join('');
  return`<div class="sku-line" data-idx="${idx}" id="iline-${idx}">
    <select class="iSku" data-idx="${idx}"><option value="">— SKU —</option>${skuOpts}</select>
    <input class="iHl" type="number" value="${it.hl||0}" placeholder="Harga List" data-idx="${idx}">
    <input class="iDc" type="number" value="${it.disc||0}" placeholder="Disc %" min="0" max="100" data-idx="${idx}">
    <input class="iHn" type="number" value="${it.hn||0}" placeholder="Net" readonly style="background:#f5f6fa" data-idx="${idx}">
    <input class="iQt" type="number" value="${it.qty||1}" placeholder="Qty" min="1" data-idx="${idx}">
    <input class="iTot" type="number" value="${it.total||0}" placeholder="Total" readonly style="background:#f5f6fa" data-idx="${idx}">
    <button class="btn btn-ic btn-sm btn-d removeItem" data-idx="${idx}"><i class="ti ti-minus"></i></button>
  </div>`;
}
function skuLineOut(it,idx){
  const skuOpts=S.products.map(p=>`<option value="${p.sku}" ${it.sku===p.sku?'selected':''}>${p.sku} — ${p.nama}</option>`).join('');
  return`<div class="sku-line" style="grid-template-columns:1fr 100px 80px 80px 80px 36px" data-idx="${idx}" id="oline-${idx}">
    <select class="oSku" data-idx="${idx}"><option value="">— SKU —</option>${skuOpts}</select>
    <input class="oHj" type="number" value="${it.hj||0}" placeholder="Harga Jual" data-idx="${idx}">
    <input class="oDc" type="number" value="${it.disc||0}" placeholder="Disc %" min="0" max="100" data-idx="${idx}">
    <input class="oQt" type="number" value="${it.qty||1}" placeholder="Qty" min="1" data-idx="${idx}">
    <input class="oTot" type="number" value="${it.total||0}" placeholder="Total" readonly style="background:#f5f6fa" data-idx="${idx}">
    <button class="btn btn-ic btn-sm btn-d removeItemO" data-idx="${idx}"><i class="ti ti-minus"></i></button>
  </div>`;
}
function calcOutSummary(items,fee){
  const gross=items.reduce((a,i)=>a+(i.total||0),0);
  const neto=gross-(fee||0);
  const hpp=items.reduce((a,i)=>a+(i.hpp||0)*i.qty,0);
  const laba=neto-hpp;
  const mp=neto>0?laba/neto:0;
  return`<div class="row"><span>Gross</span><span>${rp(gross)}</span></div>
    <div class="row"><span>Fee Marketplace</span><span class="r">${rp(fee||0)}</span></div>
    <div class="row"><span>Neto</span><span>${rp(neto)}</span></div>
    <div class="row"><span>HPP</span><span class="o">${rp(hpp)}</span></div>
    <div class="row"><span>Laba Kotor</span><strong class="${laba>=0?'g':'r'}">${rp(laba)}</strong></div>
    <div class="row"><span>Margin</span><strong class="${mp>=.2?'g':mp>=.1?'o':'r'}">${pct(mp)}</strong></div>`;
}

  document.querySelectorAll('[data-dexp]').forEach(el=>el.addEventListener('click',()=>{if(confirm('Hapus biaya ini?')){S.expenses=S.expenses.filter(x=>x.id!==el.dataset.dexp);save();render();}}));
  document.querySelectorAll('[data-dret]').forEach(el=>el.addEventListener('click',()=>{if(confirm('Hapus retur ini?')){S.returns=S.returns.filter(x=>x.id!==el.dataset.dret);save();render();}}));
  document.querySelectorAll('[data-ret-stok]').forEach(el=>el.addEventListener('click',()=>{S.returns=S.returns.map(x=>x.id===el.dataset.retStok?{...x,stokMasuk:true}:x);save();render();toast('Stok dikonfirmasi masuk kembali');}}));
  // modal overlay close
  document.getElementById('mOv')?.addEventListener('click',e=>{if(e.target.id==='mOv'){S.modal=null;render();}});
  // export/import
  document.getElementById('bExp')?.addEventListener('click',()=>{
    const keys=['products','stockIn','stockOut','suppliers','customers','expenses','returns'];
    const d=JSON.stringify(Object.fromEntries(keys.map(k=>[k,S[k]])),null,2);
    const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(d);
    a.download='hwtools-v2-'+today()+'.json';a.click();toast('Data diekspor');
  });
  document.getElementById('bImp')?.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
      ['products','stockIn','stockOut','suppliers','customers','expenses','returns'].forEach(k=>{
        if(d[k])S[k]=[...S[k],...d[k].filter(x=>!S[k].find(y=>y.id===x.id))];
      });save();render();toast('Import berhasil!');}catch(e){alert('File tidak valid');}};r.readAsText(f);
  });
}

// ── MODAL BINDINGS ────────────────────────────────────
function bm(){
  document.getElementById('bCl')?.addEventListener('click',()=>{S.modal=null;render();});
  document.getElementById('bCl2')?.addEventListener('click',()=>{S.modal=null;render();});

  // PRODUK SAVE
  document.getElementById('bSvP')?.addEventListener('click',function(){
    const id=this.dataset.id,br=document.getElementById('fBr').value;
    const sku=document.getElementById('fSk').value.trim().toUpperCase(),nama=document.getElementById('fNm').value.trim();
    const m=parseFloat(document.getElementById('fMd').value)||0,sb=parseFloat(document.getElementById('fSb').value)||0,sk=parseFloat(document.getElementById('fSk2').value)||0;
    if(!sku||!nama){alert('SKU dan Nama wajib diisi');return;}
    if(id){S.products=S.products.map(p=>p.id===id?{...p,brand:br,nama,m,sb,sk}:p);}
    else{if(S.products.find(p=>p.sku===sku)){alert('SKU sudah ada!');return;}S.products.push({id:uid(),brand:br,sku,nama,m,sb,sk});}
    save();S.modal=null;render();toast(id?'Produk diperbarui':'Produk ditambahkan');
  });

  // STOK MASUK — multi SKU
  bindItemsIn();
  document.getElementById('bSvI')?.addEventListener('click',()=>{
    const tg=document.getElementById('fTg').value,inv=document.getElementById('fIn').value,supId=document.getElementById('fSup').value;
    if(!tg){alert('Tanggal wajib diisi');return;}
    const items=collectItemsIn();
    if(!items.length){alert('Tambahkan minimal 1 SKU');return;}
    if(items.some(i=>!i.sku)){alert('Semua baris harus dipilih SKU-nya');return;}
    S.stockIn.push({id:uid(),tgl:tg,inv,supId,items});
    save();S.modal=null;render();toast('Stok masuk dicatat');
  });

  // STOK KELUAR — multi SKU + edit
  bindItemsOut();
  document.getElementById('fPt')?.addEventListener('change',e=>{
    const tr=document.getElementById('termRow');if(tr)tr.style.display=e.target.value==='credit'?'':'none';
  });
  document.getElementById('fTermDays')?.addEventListener('input',e=>{
    const tg=document.getElementById('fTg').value;
    if(tg&&e.target.value){const d=new Date(tg);d.setDate(d.getDate()+parseInt(e.target.value));const jt=document.getElementById('fJt');if(jt)jt.value=d.toISOString().slice(0,10);}
  });
  document.getElementById('bSvO')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tg=document.getElementById('fTg').value,inv=document.getElementById('fIn').value;
    const custId=document.getElementById('fCust').value,ch=document.getElementById('fCh').value;
    const fee=parseFloat(document.getElementById('fFee').value)||0;
    const payTerm=document.getElementById('fPt').value,termDays=parseInt(document.getElementById('fTermDays')?.value||0);
    const jatuhTempo=document.getElementById('fJt')?.value||'';
    if(!tg){alert('Tanggal wajib diisi');return;}
    const items=collectItemsOut();
    if(!items.length){alert('Tambahkan minimal 1 SKU');return;}
    if(items.some(i=>!i.sku)){alert('Semua baris harus dipilih SKU-nya');return;}
    const gross=items.reduce((a,i)=>a+i.total,0),neto=gross-fee;
    const rec={tgl:tg,inv,custId,ch,fee,payTerm,termDays,jatuhTempo,items,neto,payStatus:payTerm==='cash'?'paid':'outstanding',payments:payTerm==='cash'?[]:[],gross};
    if(id){S.stockOut=S.stockOut.map(x=>x.id===id?{...x,...rec}:x);toast('Penjualan diperbarui');}
    else{S.stockOut.push({id:uid(),...rec});toast('Penjualan dicatat');}
    save();S.modal=null;render();
  });

  // PAYMENT SAVE
  document.getElementById('bSvPay')?.addEventListener('click',function(){
    const id=this.dataset.id,tg=document.getElementById('fTg').value;
    const met=document.getElementById('fMet').value,amt=parseFloat(document.getElementById('fAmt').value)||0;
    const note=document.getElementById('fNote').value;
    if(!amt){alert('Jumlah bayar wajib diisi');return;}
    S.stockOut=S.stockOut.map(x=>{
      if(x.id!==id)return x;
      const payments=[...(x.payments||[]),{id:uid(),tgl:tg,met,amount:amt,note}];
      const paid=payments.reduce((a,p)=>a+p.amount,0);
      const payStatus=paid>=x.neto?'paid':paid>0?'partial':'outstanding';
      return{...x,payments,payStatus};
    });
    save();S.modal=null;render();toast('Pembayaran dicatat');
  });

  // SUPPLIER SAVE
  document.getElementById('bSvSup')?.addEventListener('click',function(){
    const id=this.dataset.id,nama=document.getElementById('fNm').value.trim();
    if(!nama){alert('Nama supplier wajib diisi');return;}
    const rec={nama,pic:document.getElementById('fPic').value,telp:document.getElementById('fTelp').value,email:document.getElementById('fEmail').value,alamat:document.getElementById('fAlamat').value,npwp:document.getElementById('fNpwp').value,note:document.getElementById('fNote').value};
    if(id){S.suppliers=S.suppliers.map(x=>x.id===id?{...x,...rec}:x);}
    else S.suppliers.push({id:uid(),...rec});
    save();S.modal=null;render();toast(id?'Supplier diperbarui':'Supplier ditambahkan');
  });

  // CUSTOMER SAVE
  document.getElementById('bSvCust')?.addEventListener('click',function(){
    const id=this.dataset.id,nama=document.getElementById('fNm').value.trim();
    if(!nama){alert('Nama customer wajib diisi');return;}
    const rec={nama,tipe:document.getElementById('fTipe').value,pic:document.getElementById('fPic').value,telp:document.getElementById('fTelp').value,email:document.getElementById('fEmail').value,npwp:document.getElementById('fNpwp').value,alamat:document.getElementById('fAlamat').value,creditLimit:parseFloat(document.getElementById('fCl').value)||0,note:document.getElementById('fNote').value};
    if(id){S.customers=S.customers.map(x=>x.id===id?{...x,...rec}:x);}
    else S.customers.push({id:uid(),...rec});
    save();S.modal=null;render();toast(id?'Customer diperbarui':'Customer ditambahkan');
  });

  // BIAYA SAVE
  document.getElementById('bSvExp')?.addEventListener('click',()=>{
    const tg=document.getElementById('fTg').value,cat=document.getElementById('fCat').value;
    const desc=document.getElementById('fDesc').value,jml=parseFloat(document.getElementById('fJml').value)||0;
    const invRef=document.getElementById('fInvRef').value;
    if(!jml){alert('Jumlah wajib diisi');return;}
    S.expenses.push({id:uid(),tgl:tg,cat,deskripsi:desc,jumlah:jml,invRef});
    save();S.modal=null;render();toast('Biaya dicatat');
  });

  // RETUR SAVE
  document.getElementById('bSvRet')?.addEventListener('click',()=>{
    const tg=document.getElementById('fTg').value,tipe=document.getElementById('fTipe').value;
    const sku=document.getElementById('fSkRet').value,qt=parseFloat(document.getElementById('fQt').value)||1;
    const invRef=document.getElementById('fInvRef').value,ch=document.getElementById('fCh').value;
    const alasan=document.getElementById('fAlasan').value,stokMasuk=document.getElementById('fStokMasuk').checked;
    if(!sku){alert('Pilih SKU produk');return;}
    const p=S.products.find(x=>x.sku===sku);
    S.returns.push({id:uid(),tgl:tg,tipe,sku,nama:p?.nama||'',qty:qt,invRef,ch,alasan,stokMasuk});
    save();S.modal=null;render();toast('Retur dicatat');
  });
}

// ── ITEM LINE HELPERS ─────────────────────────────────
function collectItemsIn(){
  const lines=document.querySelectorAll('#itemList .sku-line');
  return [...lines].map(line=>{
    const idx=line.dataset.idx;
    const sku=line.querySelector('.iSku').value;
    const hl=parseFloat(line.querySelector('.iHl').value)||0;
    const disc=parseFloat(line.querySelector('.iDc').value)||0;
    const qty=parseFloat(line.querySelector('.iQt').value)||1;
    const hn=hl*(1-disc/100);const total=hn*qty;
    const p=S.products.find(x=>x.sku===sku);
    return{id:uid(),sku,nama:p?.nama||'',brand:p?.brand||'',hl,disc,hn,qty,total};
  });
}
function collectItemsOut(){
  const lines=document.querySelectorAll('#itemListO .sku-line');
  return [...lines].map(line=>{
    const sku=line.querySelector('.oSku').value;
    const hj=parseFloat(line.querySelector('.oHj').value)||0;
    const disc=parseFloat(line.querySelector('.oDc').value)||0;
    const qty=parseFloat(line.querySelector('.oQt').value)||1;
    const hjNet=hj*(1-disc/100);const total=hjNet*qty;
    const p=S.products.find(x=>x.sku===sku);
    const s=sku?stats(sku):{avg:0};
    return{id:uid(),sku,nama:p?.nama||'',brand:p?.brand||'',hj:hjNet,disc,qty,total,hpp:s.avg};
  });
}
function updateInTotal(){
  const items=collectItemsIn();
  const el=document.getElementById('fGrandTotal');
  if(el)el.textContent=rp(items.reduce((a,i)=>a+i.total,0));
}
function updateOutSummary(){
  const items=collectItemsOut();
  const fee=parseFloat(document.getElementById('fFee')?.value)||0;
  const el=document.getElementById('outSummary');
  if(el)el.innerHTML=calcOutSummary(items,fee);
}
function bindItemsIn(){
  const list=document.getElementById('itemList');if(!list)return;
  document.getElementById('bAddItem')?.addEventListener('click',()=>{
    const idx=list.querySelectorAll('.sku-line').length;
    const div=document.createElement('div');div.innerHTML=skuLineIn({id:uid(),sku:'',qty:1,hl:0,disc:0,hn:0,total:0},idx);
    list.appendChild(div.firstElementChild);bindLineIn(list.lastElementChild);
  });
  list.querySelectorAll('.sku-line').forEach(line=>bindLineIn(line));
}
function bindLineIn(line){
  line.querySelectorAll('.iHl,.iDc,.iQt').forEach(el=>el.addEventListener('input',()=>{
    const hl=parseFloat(line.querySelector('.iHl').value)||0,dc=parseFloat(line.querySelector('.iDc').value)||0,qt=parseFloat(line.querySelector('.iQt').value)||1;
    const hn=hl*(1-dc/100);line.querySelector('.iHn').value=Math.round(hn);line.querySelector('.iTot').value=Math.round(hn*qt);updateInTotal();
  }));
  line.querySelector('.removeItem')?.addEventListener('click',()=>{line.remove();updateInTotal();});
}
function bindItemsOut(){
  const list=document.getElementById('itemListO');if(!list)return;
  document.getElementById('bAddItemO')?.addEventListener('click',()=>{
    const idx=list.querySelectorAll('.sku-line').length;
    const div=document.createElement('div');div.innerHTML=skuLineOut({id:uid(),sku:'',qty:1,hj:0,disc:0,total:0},idx);
    list.appendChild(div.firstElementChild);bindLineOut(list.lastElementChild);
  });
  list.querySelectorAll('.sku-line').forEach(line=>bindLineOut(line));
  document.getElementById('fFee')?.addEventListener('input',updateOutSummary);
}
function bindLineOut(line){
  line.querySelectorAll('.oHj,.oDc,.oQt').forEach(el=>el.addEventListener('input',()=>{
    const hj=parseFloat(line.querySelector('.oHj').value)||0,dc=parseFloat(line.querySelector('.oDc').value)||0,qt=parseFloat(line.querySelector('.oQt').value)||1;
    const hjNet=hj*(1-dc/100);line.querySelector('.oTot').value=Math.round(hjNet*qt);updateOutSummary();
  }));
  line.querySelector('.oSku')?.addEventListener('change',updateOutSummary);
  line.querySelector('.removeItemO')?.addEventListener('click',()=>{line.remove();updateOutSummary();});
}

load();render();
</script>
