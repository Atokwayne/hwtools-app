<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F5F6FA;color:#1C2333;font-size:14px}
:root{--nav:215px;--acc:#185FA5;--accl:#E6F1FB;--ok:#3B6D11;--okl:#EAF3DE;--err:#A32D2D;--errl:#FCEBEB;--warn:#854F0B;--warnl:#FAEEDA;--bd:#E2E6EF;--t2:#6B7280;--t3:#9CA3AF}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--nav);background:#fff;border-right:1px solid var(--bd);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:10;overflow-y:auto}
.logo{padding:15px;border-bottom:1px solid var(--bd)}.logo h1{font-size:14px;font-weight:700}.logo p{font-size:10px;color:var(--t2);margin-top:2px}
.nl{font-size:10px;font-weight:700;color:var(--t3);padding:8px 14px 3px;letter-spacing:.06em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;color:var(--t2);border-left:2px solid transparent;transition:all .15s}
.ni:hover{background:#F5F6FA;color:#1C2333}.ni.active{color:var(--acc);background:var(--accl);border-left-color:var(--acc);font-weight:600}
.ni i{font-size:16px;width:18px;flex-shrink:0}
.main{margin-left:var(--nav);flex:1;min-width:0}
.hdr{height:50px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:5}
.hdr h2{font-size:14px;font-weight:700}.hdr-r{display:flex;gap:8px}
.content{padding:22px}
.btn{padding:7px 13px;border-radius:7px;border:1px solid var(--bd);background:#fff;color:#1C2333;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:#F5F6FA}.btn-p{background:var(--acc);color:#fff;border-color:var(--acc)}.btn-p:hover{background:#134E8A}
.btn-d{background:var(--errl);color:var(--err);border-color:#F7C1C1}.btn-ok{background:var(--okl);color:var(--ok);border-color:#C0DD97}
.btn-sm{padding:4px 9px;font-size:11px}.btn-ic{padding:5px;border-radius:6px}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.card-t{font-size:11px;font-weight:700;margin-bottom:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.met{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:14px}
.ml{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}.mv{font-size:17px;font-weight:700}.ms{font-size:11px;color:var(--t3);margin-top:3px}
.g{color:var(--ok)}.r{color:var(--err)}.b{color:var(--acc)}.o{color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 11px;font-size:10px;font-weight:700;color:var(--t2);border-bottom:1px solid var(--bd);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em;background:#FAFBFC}
td{padding:9px 11px;border-bottom:1px solid #F0F2F7;vertical-align:middle}tr:last-child td{border-bottom:none}tbody tr:hover td{background:#FAFBFC}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bb{background:var(--accl);color:var(--acc)}.bg2{background:var(--okl);color:var(--ok)}.br{background:var(--errl);color:var(--err)}.bo{background:var(--warnl);color:var(--warn)}.bx{background:#F0F2F7;color:var(--t2)}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:#fff;color:#1C2333;font-size:12px;font-family:inherit;transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
input[type=checkbox]{width:auto;cursor:pointer}
.fr{display:grid;gap:10px;margin-bottom:12px}.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:1fr 1fr 1fr 1fr}
label{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;max-height:94vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-lg{max-width:880px}
.mh{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mh h3{font-size:14px;font-weight:700}.mb{padding:20px}.mf{padding:13px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}
.fb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}.fb input,.fb select{width:auto;min-width:140px}
.empty{text-align:center;padding:40px;color:var(--t3)}.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.35}.empty p{font-size:12px}
.chip{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:10px;background:#F0F2F7;color:var(--t2);font-family:monospace;font-weight:700}
.pb{height:5px;background:#F0F2F7;border-radius:3px;overflow:hidden;margin-top:3px}.pbf{height:100%;border-radius:3px;background:var(--acc)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ib{padding:10px 12px;background:var(--accl);border-radius:7px;font-size:12px;border-left:3px solid var(--acc);margin-bottom:12px}
.sb{padding:12px;background:#FAFBFC;border-radius:7px;font-size:12px;border:1px solid var(--bd)}
.sb .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #F0F2F7}
.sb .row:last-child{border-bottom:none;font-weight:700;padding-top:7px}
.tw{overflow-x:auto;border-radius:10px;border:1px solid var(--bd)}.tw table{border:none}
.toast{position:fixed;bottom:22px;right:22px;background:#1C2333;color:#fff;padding:11px 16px;border-radius:9px;font-size:12px;z-index:999;animation:su .25s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.nw{white-space:nowrap}.rt{text-align:right}.tm{color:var(--t2)}.divider{height:1px;background:var(--bd);margin:12px 0}
.pay-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600}
.outstanding{background:var(--errl);color:var(--err)}.paid{background:var(--okl);color:var(--ok)}.partial{background:var(--warnl);color:var(--warn)}
.tertahan{background:var(--warnl);color:var(--warn)}.cair{background:var(--okl);color:var(--ok)}
.bar-wrap{display:flex;align-items:flex-end;gap:3px;height:110px}
.bg3{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bw{display:flex;align-items:flex-end;gap:1px;height:96px}.bar{border-radius:2px 2px 0 0;min-height:2px}
.bl{font-size:9px;color:var(--t3);margin-top:2px}
.sku-line{display:grid;gap:6px;align-items:center;padding:8px;border:1px solid var(--bd);border-radius:7px;margin-bottom:6px;background:#FAFBFC}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.lr-row{display:flex;justify-content:space-between;padding:8px 12px;font-size:13px;border-bottom:1px solid #F0F2F7}
.lr-row.head{background:#FAFBFC;font-weight:700;font-size:11px;text-transform:uppercase;color:var(--t2)}
.lr-row.total{font-weight:700;background:#FAFBFC;border-top:2px solid var(--bd)}
.lr-row.sub{padding-left:24px;color:var(--t2)}
</style>
</head>
<body><div id="app"></div>
<script>
// ═══ CONSTANTS ═══
const BRANDS=['Sellery','Ranger Germany','Castrix','Blickle','Prohex','Crossman','King Tony','Elora','Truecraft','Force','Jason','Kondo','KTC','Matsu','Tekiro','Kukko','Toyoda','Zeki','ETC'];
const CURRENCIES=['IDR','RMB','USD'];
const PAY_METHODS=['Cash','Transfer Bank','QRIS','EDC'];
const EXPENSE_CATS=['Biaya Kirim','Biaya Operasional','Biaya Pemasaran','Biaya Lain-lain'];
const MO=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const KEY='hwtools-v21';
const fmt=n=>new Intl.NumberFormat('id-ID').format(Math.round(n||0));
const fmt2=n=>new Intl.NumberFormat('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const rp=n=>'Rp '+fmt(n);
const cur=(n,c)=>(c||'IDR')+' '+fmt2(n);
const pct=n=>((n||0)*100).toFixed(1)+'%';
const fd=d=>d?new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}):'';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const today=()=>new Date().toISOString().slice(0,10);

let S={
  page:'dashboard',modal:null,
  products:[],purchases:[],sales:[],
  suppliers:[],customers:[],expenses:[],returns:[],purchaseOrders:[],
  fb:'',fp:'monthly',fy:new Date().getFullYear(),fm:new Date().getMonth(),q:'',
  imp:null,
};

function load(){
  try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);
    ['products','purchases','sales','suppliers','customers','expenses','returns','purchaseOrders'].forEach(k=>{if(p[k])S[k]=p[k];});
  }}catch(e){}
  // migrasi dari v2 lama jika ada
  try{const old=localStorage.getItem('hwtools-v2');if(old&&!S.products.length){const p=JSON.parse(old);
    if(p.products)S.products=p.products;
    if(p.stockIn)S.purchases=p.stockIn.map(x=>({...x,curr:'IDR',rate:1}));
    if(p.stockOut)S.sales=p.stockOut.map(x=>({...x,ongkir:0}));
    if(p.suppliers)S.suppliers=p.suppliers;
    if(p.customers)S.customers=p.customers;
    if(p.expenses)S.expenses=p.expenses;
    if(p.returns)S.returns=p.returns;
  }}catch(e){}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify({products:S.products,purchases:S.purchases,sales:S.sales,suppliers:S.suppliers,customers:S.customers,expenses:S.expenses,returns:S.returns,purchaseOrders:S.purchaseOrders}));}catch(e){}
}
function toast(msg,ok=true){const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.background=ok?'#1C2333':'#A32D2D';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// ═══ COMPUTED ═══
function stats(sku){
  const p=S.products.find(x=>x.sku===sku);if(!p)return{stokBagus:0,stokKaratan:0,avg:0};
  const tIn=S.purchases.reduce((a,inv)=>a+(inv.items||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  const tOut=S.sales.reduce((a,inv)=>a+(inv.items||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  // retur penjualan yang dikonfirmasi = stok masuk kembali (+)
  const tRetIn=S.returns.filter(x=>x.stokMasuk&&x.sku===sku&&(x.jenisRetur||'penjualan')==='penjualan').reduce((a,x)=>a+x.qty,0);
  // retur pembelian yang dikonfirmasi = stok keluar (-)
  const tRetOut=S.returns.filter(x=>x.stokMasuk&&x.sku===sku&&x.jenisRetur==='pembelian').reduce((a,x)=>a+x.qty,0);
  const stokBagus=Math.max(0,(p.sb||0)+tIn-tOut+tRetIn-tRetOut);
  let q=p.sb||0,v=(p.m||0)*q;
  S.purchases.forEach(inv=>(inv.items||[]).filter(x=>x.sku===sku).forEach(x=>{q+=x.qty;v+=(x.hnIDR||x.hn||0)*x.qty;}));
  return{stokBagus,stokKaratan:p.sk||0,avg:q>0?v/q:p.m||0};
}
function nilaiTotal(){return S.products.reduce((a,p)=>{const s=stats(p.sku);return a+s.stokBagus*s.avg;},0);}
// laba per invoice penjualan
function returnsForSale(saleId){
  return S.returns.filter(x=>(x.jenisRetur||'penjualan')==='penjualan'&&x.refSaleId===saleId).reduce((a,x)=>a+(x.nilaiRetur||0),0);
}
function returnsForPurchase(buyId){
  return S.returns.filter(x=>x.jenisRetur==='pembelian'&&x.refBuyId===buyId).reduce((a,x)=>a+(x.nilaiRetur||0),0);
}
function saleProfit(sale){
  const hppTotal=(sale.items||[]).reduce((a,i)=>a+(i.hpp||0)*i.qty,0);
  const gross=(sale.items||[]).reduce((a,i)=>a+i.total,0);
  const fee=sale.fee||0, ongkir=sale.ongkir||0;
  const retur=returnsForSale(sale.id);
  const neto=gross-fee-retur;
  const labaKotor=neto-hppTotal-ongkir;
  return{gross,fee,ongkir,retur,neto,hppTotal,labaKotor,margin:neto>0?labaKotor/neto:0};
}
function saleNeto(sale){return saleProfit(sale).neto;}
function metricsPenjualan(period,yr,mo){
  let outs=[...S.sales];
  const inP=d=>{const dt=new Date(d);
    if(period==='monthly')return dt.getFullYear()===yr&&dt.getMonth()===mo;
    if(period==='quarterly')return dt.getFullYear()===yr&&Math.floor(dt.getMonth()/3)===Math.floor(mo/3);
    if(period==='semesterly')return dt.getFullYear()===yr&&(dt.getMonth()<6?0:1)===(mo<6?0:1);
    return dt.getFullYear()===yr;
  };
  outs=outs.filter(x=>inP(x.tgl));
  let omz=0,hpp=0,laba=0;
  outs.forEach(s=>{const pr=saleProfit(s);omz+=pr.neto;hpp+=pr.hppTotal;laba+=pr.labaKotor;});
  return{omz,hpp,laba,mp:omz>0?laba/omz:0,trx:outs.length};
}
function getPiutangTotal(){
  return S.sales.filter(x=>x.payStatus!=='paid').reduce((a,x)=>{
    const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);
    return a+(saleNeto(x)-paid);
  },0);
}
function getCustomerPiutang(cid){
  return S.sales.filter(x=>x.custId===cid&&x.payStatus!=='paid').reduce((a,x)=>{
    const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);
    return a+(saleNeto(x)-paid);
  },0);
}
function getUtangTotal(){
  const buyUtang=S.purchases.filter(x=>x.payStatus!=='paid').reduce((a,x)=>{
    const totalIDR=(x.items||[]).reduce((b,i)=>b+(i.totalIDR||i.total||0),0);
    const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);
    return a+(totalIDR-paid);
  },0);
  const expUtang=S.expenses.filter(x=>x.payStatus==='belum').reduce((a,x)=>a+x.jumlah,0);
  return buyUtang+expUtang;
}
function purchaseTotalIDR(p){return (p.items||[]).reduce((a,i)=>a+(i.totalIDR||i.total||0),0)-returnsForPurchase(p.id);}
function danaTertahanTotal(){
  return S.sales.filter(x=>x.ch==='Online'&&x.danaStatus==='tertahan').reduce((a,x)=>a+saleNeto(x),0);
}
// ═══ LAYOUT ═══
const PAGES={dashboard:'Dashboard',analisis:'Analisis Bisnis',labarugi:'Laporan Laba Rugi',reminder:'Reminder Jatuh Tempo',produk:'Data Produk',po:'Purchase Order',pembelian:'Pembelian',penjualan:'Penjualan',rekap:'Rekap per Brand',retur:'Retur',piutang:'Piutang Customer',utang:'Hutang Supplier',biaya:'Pencatatan Biaya',supplier:'Database Supplier',customer:'Database Customer'};
function render(){document.getElementById('app').innerHTML=layout();bind();}
function renderContent(){const c=document.querySelector('.content');if(c){c.innerHTML=page();bind();}else render();}
function navI(icon,lbl,pg){return`<div class="ni${S.page===pg?' active':''}" data-nav="${pg}"><i class="ti ti-${icon}"></i>${lbl}</div>`;}
function layout(){
  const HB={
    produk:`<button class="btn" id="bImpProd"><i class="ti ti-file-import"></i> Import SKU</button><button class="btn btn-p" id="bAddP"><i class="ti ti-plus"></i> Tambah Produk</button>`,
    po:`<button class="btn btn-p" id="bAddPO"><i class="ti ti-plus"></i> Buat PO</button>`,
    pembelian:`<button class="btn btn-p" id="bAddBuy"><i class="ti ti-plus"></i> Catat Pembelian</button>`,
    penjualan:`<button class="btn" id="bImpSell"><i class="ti ti-file-import"></i> Import Penjualan</button><button class="btn btn-p" id="bAddSell"><i class="ti ti-plus"></i> Catat Penjualan</button>`,
    supplier:`<button class="btn btn-p" id="bAddSup"><i class="ti ti-plus"></i> Tambah Supplier</button>`,
    customer:`<button class="btn btn-p" id="bAddCust"><i class="ti ti-plus"></i> Tambah Customer</button>`,
    biaya:`<button class="btn btn-p" id="bAddExp"><i class="ti ti-plus"></i> Catat Biaya</button>`,
    retur:`<button class="btn btn-p" id="bAddRet"><i class="ti ti-plus"></i> Catat Retur</button>`,
  };
  return`<div class="layout">
  <div class="sidebar">
    <div class="logo"><h1>HW Tools</h1><p>Inventaris, Penjualan &amp; Keuangan v2.1</p></div>
    <div style="padding:6px 0;flex:1;overflow-y:auto">
      <div class="nl">Utama</div>
      ${navI('dashboard','Dashboard','dashboard')}
      ${navI('chart-bar','Analisis Bisnis','analisis')}
      ${navI('report-money','Laba Rugi','labarugi')}
      ${navI('bell','Reminder Jatuh Tempo','reminder')}
      <div class="nl">Inventaris</div>
      ${navI('package','Data Produk','produk')}
      ${navI('rekap','Rekap per Brand','rekap')}
      ${navI('refresh','Retur','retur')}
      <div class="nl">Pembelian</div>
      ${navI('file-text','Purchase Order','po')}
      ${navI('arrow-bar-to-down','Pembelian','pembelian')}
      ${navI('building-warehouse','Hutang Supplier','utang')}
      <div class="nl">Penjualan</div>
      ${navI('arrow-bar-up','Penjualan','penjualan')}
      ${navI('credit-card','Piutang Customer','piutang')}
      <div class="nl">Keuangan</div>
      ${navI('receipt','Biaya','biaya')}
      <div class="nl">Database</div>
      ${navI('truck','Supplier','supplier')}
      ${navI('users','Customer','customer')}
    </div>
    <div style="padding:12px;border-top:1px solid var(--bd)">
      <button class="btn btn-sm" style="width:100%;justify-content:center;margin-bottom:6px" id="bExp"><i class="ti ti-download"></i> Export Data</button>
      <label class="btn btn-sm" style="width:100%;justify-content:center;cursor:pointer"><i class="ti ti-upload"></i> Import Data<input type="file" accept=".json" id="bImp" style="display:none"></label>
    </div>
  </div>
  <div class="main">
    <div class="hdr"><h2>${PAGES[S.page]||''}</h2><div class="hdr-r">${HB[S.page]||''}</div></div>
    <div class="content">${page()}</div>
  </div>
  </div>${S.modal?modal():''}`;
}
function page(){
  const m={dashboard:pgDash,analisis:pgAn,labarugi:pgLR,reminder:pgReminder,produk:pgProd,po:pgPO,pembelian:pgBuy,penjualan:pgSell,rekap:pgRekap,retur:pgRetur,piutang:pgPiutang,utang:pgUtang,biaya:pgBiaya,supplier:pgSup,customer:pgCust};
  return (m[S.page]||(()=>''))();
}

// ═══ DASHBOARD ═══
function pgDash(){
  const now=new Date(),m=metricsPenjualan('monthly',now.getFullYear(),now.getMonth()),y=metricsPenjualan('yearly',now.getFullYear(),now.getMonth());
  const ns=nilaiTotal(),sk=S.products.length,st=S.products.reduce((a,p)=>a+stats(p.sku).stokBagus,0);
  const piutang=getPiutangTotal(),utang=getUtangTotal(),tertahan=danaTertahanTotal();
  return`
  <div class="mg">
    <div class="met"><div class="ml">Omzet Bulan Ini</div><div class="mv b">${rp(m.omz)}</div><div class="ms">${m.trx} transaksi</div></div>
    <div class="met"><div class="ml">Laba Kotor Bulan Ini</div><div class="mv ${m.laba>=0?'g':'r'}">${rp(m.laba)}</div><div class="ms">${pct(m.mp)} margin</div></div>
    <div class="met"><div class="ml">Nilai Stok (Modal)</div><div class="mv o">${rp(ns)}</div><div class="ms">${fmt(st)} pcs · ${sk} SKU</div></div>
    <div class="met"><div class="ml">Piutang Customer</div><div class="mv r">${rp(piutang)}</div><div class="ms">belum dibayar</div></div>

// ═══ REMINDER JATUH TEMPO ═══
function getReminders(){
  const now=new Date();now.setHours(0,0,0,0);
  const items=[];
  // piutang customer dengan jatuh tempo
  S.sales.filter(x=>x.payTerm==='credit'&&x.jatuhTempo).forEach(x=>{
    const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const sisa=saleNeto(x)-paid;
    if(sisa<=0)return;
    const jt=new Date(x.jatuhTempo);jt.setHours(0,0,0,0);
    const days=Math.round((jt-now)/86400000);
    const c=S.customers.find(cc=>cc.id===x.custId);
    items.push({jenis:'Piutang',pihak:c?c.nama:'(Customer)',inv:x.inv||'—',tgl:x.jatuhTempo,sisa,days,refId:x.id,refType:'sale'});
  });
  // hutang biaya dengan jatuh tempo
  S.expenses.filter(x=>x.payStatus==='belum'&&x.jatuhTempo).forEach(x=>{
    const jt=new Date(x.jatuhTempo);jt.setHours(0,0,0,0);
    const days=Math.round((jt-now)/86400000);
    const s=S.suppliers.find(ss=>ss.id===x.supId);
    items.push({jenis:'Hutang Biaya',pihak:s?s.nama:'(Supplier)',inv:x.invNo||'—',tgl:x.jatuhTempo,sisa:x.jumlah,days,refId:x.id,refType:'exp'});
  });
  return items.sort((a,b)=>a.days-b.days);
}
function pgReminder(){
  const rem=getReminders();
  const overdue=rem.filter(r=>r.days<0);
  const soon=rem.filter(r=>r.days>=0&&r.days<=7);
  const later=rem.filter(r=>r.days>7);
  const totOverdue=overdue.reduce((a,r)=>a+r.sisa,0);
  const totSoon=soon.reduce((a,r)=>a+r.sisa,0);
  const remRow=r=>{
    const badge=r.days<0?`<span class="pay-badge outstanding">Lewat ${Math.abs(r.days)} hari</span>`:
      r.days===0?`<span class="pay-badge tertahan">Hari ini</span>`:
      `<span class="pay-badge ${r.days<=7?'partial':'paid'}">${r.days} hari lagi</span>`;
    return `<tr><td><span class="bdg ${r.jenis==='Piutang'?'bb':'bo'}">${r.jenis}</span></td>
      <td>${r.pihak}</td><td><span class="chip">${r.inv}</span></td>
      <td class="nw">${fd(r.tgl)}</td><td>${badge}</td>
      <td class="rt r"><strong>${rp(r.sisa)}</strong></td></tr>`;
  };
  const tbl=(title,arr,emptyMsg)=>`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 16px;border-bottom:1px solid var(--bd);background:#FAFBFC"><strong style="font-size:12px">${title}</strong></div>
    <div class="tw" style="border:none;border-radius:0"><table><thead><tr><th>Jenis</th><th>Pihak</th><th>Invoice</th><th>Jatuh Tempo</th><th>Status</th><th class="rt">Nilai</th></tr></thead><tbody>
    ${!arr.length?`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>${emptyMsg}</p></div></td></tr>`:arr.map(remRow).join('')}
    </tbody></table></div></div>`;
  return`
  <div class="mg">
    <div class="met"><div class="ml">Sudah Lewat Tempo</div><div class="mv r">${rp(totOverdue)}</div><div class="ms">${overdue.length} tagihan overdue</div></div>
    <div class="met"><div class="ml">Jatuh Tempo ≤ 7 Hari</div><div class="mv o">${rp(totSoon)}</div><div class="ms">${soon.length} tagihan</div></div>
    <div class="met"><div class="ml">Akan Datang</div><div class="mv b">${rp(later.reduce((a,r)=>a+r.sisa,0))}</div><div class="ms">${later.length} tagihan</div></div>
  </div>
  ${tbl('⚠ SUDAH LEWAT JATUH TEMPO',overdue,'Tidak ada tagihan yang lewat tempo')}
  ${tbl('JATUH TEMPO DALAM 7 HARI',soon,'Tidak ada tagihan jatuh tempo minggu ini')}
  ${tbl('AKAN DATANG (> 7 HARI)',later,'Tidak ada tagihan mendatang')}
  <div class="tm" style="font-size:11px;margin-top:8px">Catatan: Reminder muncul untuk piutang penjualan (Credit Term) dan hutang biaya yang punya tanggal jatuh tempo.</div>`;
}

function pgPiutang(){
  const out=S.sales.filter(x=>{const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);return paid<saleNeto(x);});
  const tot=out.reduce((a,x)=>{const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);return a+(saleNeto(x)-paid);},0);
  return`
  <div class="mg">

    <div class="met"><div class="ml">Customer dengan Piutang</div><div class="mv">${[...new Set(out.map(x=>x.custId).filter(Boolean))].length}</div></div>
  </div>
  <div class="tw"><table><thead><tr><th>Tanggal</th><th>Invoice</th><th>Customer</th><th>Term</th><th>Jatuh Tempo</th><th class="rt">Nilai</th><th class="rt">Dibayar</th><th class="rt">Sisa</th><th></th></tr></thead><tbody>

      <td class="rt r"><strong>${rp(sisa)}</strong></td>
      <td><button class="btn btn-ic btn-sm btn-ok" data-paysell="${x.id}"><i class="ti ti-cash"></i></button></td></tr>`;
  }).join('')}
  </tbody></table></div>`;

// ═══ UTANG ═══
function pgUtang(){
  // hutang dari pembelian
  const buyOut=S.purchases.filter(x=>{if(x.payStatus==='paid')return false;const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);return paid<purchaseTotalIDR(x);});
  // hutang dari biaya yang belum lunas
  const expOut=S.expenses.filter(x=>x.payStatus==='belum');
  const totBuy=buyOut.reduce((a,x)=>{const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);return a+(purchaseTotalIDR(x)-paid);},0);
  const totExp=expOut.reduce((a,x)=>a+x.jumlah,0);
  const tot=totBuy+totExp;
  // rollup per supplier
  const supRollup={};
  buyOut.forEach(x=>{const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);const sisa=purchaseTotalIDR(x)-paid;
    const key=x.supId||'_none';if(!supRollup[key])supRollup[key]={count:0,total:0};supRollup[key].count++;supRollup[key].total+=sisa;});
  expOut.forEach(x=>{const key=x.supId||'_none';if(!supRollup[key])supRollup[key]={count:0,total:0};supRollup[key].count++;supRollup[key].total+=x.jumlah;});
  return`
  <div class="mg">
    <div class="met"><div class="ml">Total Hutang Supplier</div><div class="mv r">${rp(tot)}</div><div class="ms">${buyOut.length+expOut.length} tagihan</div></div>
    <div class="met"><div class="ml">Hutang Pembelian</div><div class="mv r">${rp(totBuy)}</div><div class="ms">${buyOut.length} invoice</div></div>
    <div class="met"><div class="ml">Hutang Biaya</div><div class="mv r">${rp(totExp)}</div><div class="ms">${expOut.length} biaya belum lunas</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 16px;border-bottom:1px solid var(--bd);background:#FAFBFC"><strong style="font-size:12px">REKAP PER SUPPLIER — Total Invoice Belum Dibayar</strong></div>
    <div class="tw" style="border:none;border-radius:0"><table><thead><tr><th>Supplier</th><th class="rt">Jumlah Tagihan</th><th class="rt">Total Belum Dibayar</th></tr></thead><tbody>
    ${Object.keys(supRollup).length===0?`<tr><td colspan="3"><div class="empty" style="padding:20px"><p>Tidak ada hutang</p></div></td></tr>`:
    Object.entries(supRollup).sort((a,b)=>b[1].total-a[1].total).map(([k,v])=>{
      const s=S.suppliers.find(ss=>ss.id===k);
      return`<tr><td><strong>${s?s.nama:'(Tanpa Supplier)'}</strong></td><td class="rt">${v.count} tagihan</td><td class="rt r"><strong>${rp(v.total)}</strong></td></tr>`;
    }).join('')}
    </tbody></table></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 16px;border-bottom:1px solid var(--bd);background:#FAFBFC"><strong style="font-size:12px">RINCIAN HUTANG PEMBELIAN</strong></div>
    <div class="tw" style="border:none;border-radius:0"><table><thead><tr><th>Tanggal</th><th>Invoice</th><th>Supplier</th><th>Mata Uang</th><th class="rt">Nilai (IDR)</th><th class="rt">Dibayar</th><th class="rt">Sisa</th><th></th></tr></thead><tbody>
    ${!buyOut.length?`<tr><td colspan="8"><div class="empty" style="padding:20px"><i class="ti ti-circle-check"></i><p>Tidak ada hutang pembelian</p></div></td></tr>`:
    buyOut.map(x=>{
      const s=S.suppliers.find(ss=>ss.id===x.supId);
      const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
      const tIDR=purchaseTotalIDR(x),sisa=tIDR-paid;
      return`<tr><td class="nw">${fd(x.tgl)}</td><td><span class="chip">${x.inv||'—'}</span></td>
        <td>${s?s.nama:'—'}</td><td>${x.curr}${x.curr!=='IDR'?` @${fmt(x.rate)}`:''}</td>
        <td class="rt">${rp(tIDR)}</td><td class="rt g">${rp(paid)}</td>
        <td class="rt r"><strong>${rp(sisa)}</strong></td>
        <td><button class="btn btn-ic btn-sm btn-ok" data-paybuy="${x.id}"><i class="ti ti-cash"></i></button></td></tr>`;
    }).join('')}
    </tbody></table></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 16px;border-bottom:1px solid var(--bd);background:#FAFBFC"><strong style="font-size:12px">RINCIAN HUTANG BIAYA (Belum Lunas)</strong></div>
    <div class="tw" style="border:none;border-radius:0"><table><thead><tr><th>Tanggal</th><th>No. Invoice/Nota</th><th>Kategori</th><th>Supplier</th><th>Deskripsi</th><th class="rt">Jumlah</th><th></th></tr></thead><tbody>
    ${!expOut.length?`<tr><td colspan="7"><div class="empty" style="padding:20px"><i class="ti ti-circle-check"></i><p>Tidak ada hutang biaya</p></div></td></tr>`:
    expOut.map(x=>{
      const s=S.suppliers.find(ss=>ss.id===x.supId);
      return`<tr><td class="nw">${fd(x.tgl)}</td><td>${x.invNo?`<span class="chip">${x.invNo}</span>`:'—'}</td>
        <td><span class="bdg bo">${x.cat}</span></td><td>${s?s.nama:'—'}</td><td>${x.deskripsi||'—'}</td>
        <td class="rt r"><strong>${rp(x.jumlah)}</strong></td>
        <td><button class="btn btn-sm btn-ok" data-explunas="${x.id}">Tandai Lunas</button></td></tr>`;
    }).join('')}
    </tbody></table></div>
  </div>`;
}

function modal(){
  const {type,data:d={}}=S.modal;

  if(type==='prod')return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${d.id?'Edit Produk':'Tambah Produk'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Brand</label><select id="fBr">${BRANDS.map(b=>`<option value="${b}" ${d.brand===b?'selected':''}>${b}</option>`).join('')}</select></div>
      <div><label>SKU</label><input id="fSk" value="${d.sku||''}" placeholder="Contoh: TKR-001" ${d.id?'readonly style="background:#f5f6fa"':''}></div></div>
      <div class="fr"><label>Nama Barang</label><input id="fNm" value="${d.nama||''}" placeholder="Nama lengkap produk"></div>
      <div class="fr c3">
        <div><label>Modal Awal (Rp)</label><input id="fMd" type="number" value="${d.m||0}" min="0"></div>
        <div><label>Stok Awal Bagus</label><input id="fSb" type="number" value="${d.sb||0}" min="0"></div>
        <div><label>Stok Awal Karatan</label><input id="fSk2" type="number" value="${d.sk||0}" min="0"></div>
      </div>
      <div class="fr"><label>Foto Produk (Opsional)</label>
        <div style="display:flex;gap:12px;align-items:center">
          <div id="fotoPreview" style="width:80px;height:80px;border:1px solid var(--bd);border-radius:8px;background:#F5F6FA url('${d.foto||''}') center/cover no-repeat;flex-shrink:0;display:flex;align-items:center;justify-content:center">
            ${d.foto?'':'<i class="ti ti-photo" style="font-size:24px;color:#9CA3AF"></i>'}
          </div>
          <div style="flex:1">
            <label class="btn btn-sm" style="cursor:pointer;display:inline-flex"><i class="ti ti-upload"></i> Pilih Foto<input type="file" id="fFoto" accept="image/*" style="display:none"></label>
            ${d.foto?`<button class="btn btn-sm btn-d" id="bRemFoto" style="margin-left:6px"><i class="ti ti-trash"></i> Hapus</button>`:''}
            <div class="tm" style="font-size:10px;margin-top:4px">Foto otomatis dikompres agar ringan</div>
          </div>
        </div>
        <input type="hidden" id="fFotoData" value="${d.foto||''}">
      </div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvP" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;

  // PURCHASE ORDER
  if(type==='po'){
    const supOpts=S.suppliers.map(s=>`<option value="${s.id}" ${d.supId===s.id?'selected':''}>${s.nama}</option>`).join('');
    const items=d.items||[{id:uid(),sku:'',qty:1,hargaListAsli:0,disc:0,hargaNetAsli:0,total:0}];
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${d.id?'Edit Purchase Order':'Buat Purchase Order'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c4">
        <div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
        <div><label>No. PO</label><input id="fNoPO" value="${d.noPO||''}" placeholder="PO-001"></div>
        <div><label>Supplier</label><select id="fSup"><option value="">— Pilih —</option>${supOpts}</select></div>
        <div><label>Status</label><select id="fStatus">
          <option value="draft" ${d.status==='draft'||!d.status?'selected':''}>Draft</option>
          <option value="sent" ${d.status==='sent'?'selected':''}>Terkirim</option>
          <option value="cancelled" ${d.status==='cancelled'?'selected':''}>Dibatalkan</option>
        </select></div>
      </div>
      <div class="fr c3">
        <div><label>Mata Uang</label><select id="fCurr">${CURRENCIES.map(c=>`<option value="${c}" ${d.curr===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>Rate ke IDR (1 unit = Rp ...)</label><input id="fRate" type="number" value="${d.rate||1}" min="0" step="0.01"></div>
        <div><label>Payment Term</label><select id="fPt">
          <option value="cash" ${d.payTerm!=='credit'?'selected':''}>Cash / Lunas saat terima</option>
          <option value="credit" ${d.payTerm==='credit'?'selected':''}>Credit Term (jadi utang)</option>
        </select></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label style="margin:0">Item Pesanan</label>
        <button class="btn btn-sm btn-p" id="bAddItemPO"><i class="ti ti-plus"></i> Tambah SKU</button>
      </div>
      <div style="font-size:11px;color:var(--t2);display:grid;grid-template-columns:1fr 100px 70px 100px 70px 110px 36px;gap:5px;padding:0 8px;margin-bottom:4px">
        <span>SKU / Produk</span><span>Harga List</span><span>Disc%</span><span>Harga Net</span><span>Qty</span><span>Total</span><span></span>
      </div>
      <div id="itemListPO">${items.map((it,i)=>skuLinePO(it,i)).join('')}</div>
      <div class="sb" style="margin-top:10px">
        <div class="row"><span>Total PO</span><strong id="poGrand">—</strong></div>
        <div class="row"><span>Estimasi dalam IDR</span><strong id="poGrandIDR">—</strong></div>
      </div>
      <div class="fr" style="margin-top:10px"><label>Catatan (Opsional)</label><textarea id="fNote" rows="2" placeholder="Catatan PO...">${d.note||''}</textarea></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvPO" data-id="${d.id||''}">Simpan PO</button></div>
  </div></div>`;
  }

  // PEMBELIAN
  if(type==='buy'||type==='editBuy'){
    const supOpts=S.suppliers.map(s=>`<option value="${s.id}" ${d.supId===s.id?'selected':''}>${s.nama}</option>`).join('');
    const items=d.items||[{id:uid(),sku:'',qty:1,hargaListAsli:0,disc:0,hargaNetAsli:0,totalAsli:0}];
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${type==='editBuy'?'Edit Pembelian':'Catat Pembelian'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3">
        <div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
        <div><label>No. Invoice</label><input id="fIn" value="${d.inv||''}" placeholder="INV-001"></div>
        <div><label>Supplier</label><select id="fSup"><option value="">— Pilih —</option>${supOpts}</select></div>
      </div>
      <div class="fr c2">
        <div><label>Mata Uang</label><select id="fCurr">${CURRENCIES.map(c=>`<option value="${c}" ${d.curr===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>Rate ke IDR (1 unit = Rp ...)</label><input id="fRate" type="number" value="${d.rate||1}" min="0" step="0.01"></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label style="margin:0">Item Produk <span class="tm" style="font-weight:400">— harga dalam mata uang terpilih</span></label>
        <button class="btn btn-sm btn-p" id="bAddItemBuy"><i class="ti ti-plus"></i> Tambah SKU</button>
      </div>
      <div style="font-size:11px;color:var(--t2);display:grid;grid-template-columns:1fr 100px 70px 100px 70px 100px 36px;gap:5px;padding:0 8px;margin-bottom:4px">
        <span>SKU / Produk</span><span>Harga List</span><span>Disc%</span><span>Harga Net</span><span>Qty</span><span>Total</span><span></span>
      </div>
      <div id="itemListBuy">${items.map((it,i)=>skuLineBuy(it,i)).join('')}</div>
      <div class="sb" style="margin-top:10px">
        <div class="row"><span>Total Pembelian</span><strong id="buyGrand">—</strong></div>
        <div class="row"><span>Total dalam IDR (HPP)</span><strong id="buyGrandIDR">—</strong></div>
      </div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvBuy" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;
  }

  // PENJUALAN
  if(type==='sell'||type==='editSell'){
    const custOpts=S.customers.map(c=>`<option value="${c.id}" ${d.custId===c.id?'selected':''}>${c.nama}</option>`).join('');
    const items=d.items||[{id:uid(),sku:'',qty:1,hj:0,disc:0,total:0}];
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${type==='editSell'?'Edit Penjualan':'Catat Penjualan'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3">
        <div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
        <div><label>No. Invoice</label><input id="fIn" value="${d.inv||''}" placeholder="INV-001"></div>
        <div><label>Customer</label><select id="fCust"><option value="">— Pilih —</option>${custOpts}</select></div>
      </div>
      <div class="fr c3">
        <div><label>Channel</label><select id="fCh"><option value="Online" ${d.ch==='Online'?'selected':''}>Online (Marketplace)</option><option value="Offline" ${d.ch==='Offline'?'selected':''}>Offline (Toko)</option></select></div>
        <div><label>Payment Term</label><select id="fPt">
          <option value="cash" ${d.payTerm!=='credit'&&d.payTerm!=='cod'?'selected':''}>Cash</option>
          <option value="credit" ${d.payTerm==='credit'?'selected':''}>Credit Term</option>
          <option value="cod" ${d.payTerm==='cod'?'selected':''}>COD</option>
        </select></div>
        <div><label>Fee Marketplace (Rp)</label><input id="fFee" type="number" value="${d.fee||0}" min="0"></div>
      </div>
      <div id="termRow" style="${d.payTerm==='credit'?'':'display:none'}" class="fr c2">
        <div><label>Jangka (hari)</label><input id="fTermDays" type="number" value="${d.termDays||30}" min="1"></div>
        <div><label>Tgl Jatuh Tempo</label><input id="fJt" type="date" value="${d.jatuhTempo||''}"></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label style="margin:0">Item Produk</label>
        <button class="btn btn-sm btn-p" id="bAddItemSell"><i class="ti ti-plus"></i> Tambah SKU</button>
      </div>
      <div style="font-size:11px;color:var(--t2);display:grid;grid-template-columns:1fr 110px 80px 70px 100px 36px;gap:6px;padding:0 8px;margin-bottom:4px">
        <span>SKU / Produk</span><span>Harga Jual</span><span>Disc%</span><span>Qty</span><span>Total</span><span></span>
      </div>
      <div id="itemListSell">${items.map((it,i)=>skuLineSell(it,i)).join('')}</div>
      <div class="fr c3" style="margin-top:10px">
        <div><label>Biaya Kirim / Ongkir (Rp)</label><input id="fOngkir" type="number" value="${d.ongkir||0}" min="0"></div>
        <div><label>Aktifkan PPN?</label><select id="fPpnOn"><option value="no" ${d.ppnOn?'':'selected'}>Tidak</option><option value="yes" ${d.ppnOn?'selected':''}>Ya</option></select></div>
        <div><label>Persentase PPN (%)</label><input id="fPpnPct" type="number" value="${d.ppnPct||11}" min="0" max="100" step="0.1"></div>
      </div>
      <div class="sb" id="sellSummary">${calcSellSummary(items,parseFloat(d.fee||0),parseFloat(d.ongkir||0),d.ppnOn,parseFloat(d.ppnPct||11))}</div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvSell" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;
  }
  // PAYMENT CUSTOMER (sale)
  if(type==='paySell'){
    const inv=S.sales.find(x=>x.id===d.id)||{};
    const paid=(inv.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const neto=saleNeto(inv),sisa=neto-paid;
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>Catat Pembayaran Customer</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Invoice <strong>${inv.inv||'—'}</strong> · Neto: <strong>${rp(neto)}</strong> · Dibayar: <strong class="g">${rp(paid)}</strong> · Sisa: <strong class="r">${rp(sisa)}</strong></div>
      <div class="fr c2">
        <div><label>Tanggal Bayar</label><input id="fTg" type="date" value="${today()}"></div>
        <div><label>Metode Pembayaran</label><select id="fMet">${PAY_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
      </div>
      <div class="fr"><label>Jumlah Bayar (Rp)</label><input id="fAmt" type="number" value="${sisa}" min="0"></div>
      <div class="fr"><label>Catatan (Opsional)</label><input id="fNote" placeholder="Catatan..."></div>
      ${(inv.payments||[]).length?`<div class="divider"></div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">RIWAYAT PEMBAYARAN</div>
      <table><thead><tr><th>Tanggal</th><th>Metode</th><th class="rt">Jumlah</th><th>Catatan</th></tr></thead><tbody>
      ${inv.payments.map(p=>`<tr><td>${fd(p.tgl)}</td><td>${p.met}</td><td class="rt g">${rp(p.amountIDR||p.amount)}</td><td>${p.note||'—'}</td></tr>`).join('')}
      </tbody></table>`:''}
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvPaySell" data-id="${d.id}">Simpan Pembayaran</button></div>
  </div></div>`;
  }

  // PAYMENT SUPPLIER (purchase) — multi currency
  if(type==='payBuy'){
    const inv=S.purchases.find(x=>x.id===d.id)||{};
    const paid=(inv.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const tIDR=purchaseTotalIDR(inv),sisa=tIDR-paid;
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>Catat Pembayaran ke Supplier</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Invoice <strong>${inv.inv||'—'}</strong> · Total: <strong>${rp(tIDR)}</strong> · Dibayar: <strong class="g">${rp(paid)}</strong> · Sisa: <strong class="r">${rp(sisa)}</strong></div>
      <div class="fr c2">
        <div><label>Tanggal Bayar</label><input id="fTg" type="date" value="${today()}"></div>
        <div><label>Metode Pembayaran</label><select id="fMet">${PAY_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
      </div>
      <div class="fr c3">
        <div><label>Mata Uang</label><select id="fCurr">${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
        <div><label>Rate ke IDR</label><input id="fRate" type="number" value="1" min="0" step="0.01"></div>
        <div><label>Jumlah Bayar</label><input id="fAmt" type="number" value="0" min="0"></div>
      </div>
      <div class="sb"><div class="row"><span>Jumlah dalam IDR</span><strong id="payBuyIDR">Rp 0</strong></div></div>
      <div class="fr" style="margin-top:10px"><label>Catatan (Opsional)</label><input id="fNote" placeholder="Catatan..."></div>
      ${(inv.payments||[]).length?`<div class="divider"></div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">RIWAYAT PEMBAYARAN</div>
      <table><thead><tr><th>Tanggal</th><th>Metode</th><th>Mata Uang</th><th class="rt">Jumlah</th><th class="rt">IDR</th></tr></thead><tbody>
      ${inv.payments.map(p=>`<tr><td>${fd(p.tgl)}</td><td>${p.met}</td><td>${p.curr||'IDR'}</td><td class="rt">${cur(p.amount,p.curr)}</td><td class="rt g">${rp(p.amountIDR||p.amount)}</td></tr>`).join('')}
      </tbody></table>`:''}
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvPayBuy" data-id="${d.id}">Simpan Pembayaran</button></div>
  </div></div>`;
  }

  // SUPPLIER
  if(type==='sup')return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${d.id?'Edit Supplier':'Tambah Supplier'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Nama Supplier *</label><input id="fNm" value="${d.nama||''}" placeholder="Nama perusahaan"></div>
      <div><label>PIC (Opsional)</label><input id="fPic" value="${d.pic||''}"></div></div>
      <div class="fr c2"><div><label>No. Telp (Opsional)</label><input id="fTelp" value="${d.telp||''}"></div>
      <div><label>Email (Opsional)</label><input id="fEmail" value="${d.email||''}"></div></div>
      <div class="fr"><label>Alamat (Opsional)</label><textarea id="fAlamat" rows="2">${d.alamat||''}</textarea></div>
      <div class="fr c2"><div><label>NPWP (Opsional)</label><input id="fNpwp" value="${d.npwp||''}"></div>
      <div><label>Catatan (Opsional)</label><input id="fNote" value="${d.note||''}"></div></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvSup" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;

  // CUSTOMER
  if(type==='cust')return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${d.id?'Edit Customer':'Tambah Customer'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Nama Customer *</label><input id="fNm" value="${d.nama||''}"></div>
      <div><label>Tipe</label><select id="fTipe"><option value="Retail" ${d.tipe==='Retail'?'selected':''}>Retail</option><option value="Corporate" ${d.tipe==='Corporate'?'selected':''}>Corporate</option><option value="Reseller" ${d.tipe==='Reseller'?'selected':''}>Reseller</option></select></div></div>
      <div class="fr c2"><div><label>PIC (Opsional)</label><input id="fPic" value="${d.pic||''}"></div>
      <div><label>No. Telp (Opsional)</label><input id="fTelp" value="${d.telp||''}"></div></div>
      <div class="fr c2"><div><label>Email (Opsional)</label><input id="fEmail" value="${d.email||''}"></div>
      <div><label>NPWP (Opsional)</label><input id="fNpwp" value="${d.npwp||''}"></div></div>
      <div class="fr"><label>Alamat (Opsional)</label><textarea id="fAlamat" rows="2">${d.alamat||''}</textarea></div>
      <div class="fr"><label>Catatan (Opsional)</label><input id="fNote" value="${d.note||''}"></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvCust" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;

  // BIAYA
  if(type==='exp'){
    const isEdit=!!d.id;
    const supOpts=S.suppliers.map(s=>`<option value="${s.id}" ${d.supId===s.id?'selected':''}>${s.nama}</option>`).join('');
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${isEdit?'Edit Biaya':'Catat Biaya'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
      <div><label>Kategori</label><select id="fCat">${EXPENSE_CATS.map(c=>`<option value="${c}" ${d.cat===c?'selected':''}>${c}</option>`).join('')}</select></div></div>
      <div class="fr"><label>Deskripsi</label><input id="fDesc" value="${d.deskripsi||''}" placeholder="Keterangan biaya..."></div>
      <div class="fr c2"><div><label>Jumlah (Rp)</label><input id="fJml" type="number" value="${d.jumlah||0}" min="0"></div>
      <div><label>Supplier / Vendor (Opsional)</label><select id="fSupExp"><option value="">— Tidak ada —</option>${supOpts}</select></div></div>
      <div class="fr c2"><div><label>No. Invoice / Nota (Opsional)</label><input id="fInvNo" value="${d.invNo||''}" placeholder="INV-XXX / Nota-XXX"></div>
      <div><label>Status Pembayaran</label><select id="fPayStatus">
        <option value="lunas" ${d.payStatus!=='belum'?'selected':''}>Lunas</option>
        <option value="belum" ${d.payStatus==='belum'?'selected':''}>Belum Dibayar (jadi Hutang Supplier)</option>
      </select></div></div>
      <div class="fr c2"><div><label>Tgl Jatuh Tempo (jika belum lunas, opsional)</label><input id="fJtExp" type="date" value="${d.jatuhTempo||''}"></div>
      <div><label>Kaitkan ke Invoice Transaksi (Opsional)</label><select id="fInvRef"><option value="">— Tidak —</option>${[...S.purchases.map(x=>x.inv),...S.sales.map(x=>x.inv)].filter(Boolean).map(i=>`<option value="${i}" ${d.invRef===i?'selected':''}>${i}</option>`).join('')}</select></div></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvExp" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;
  }

  // RETUR
  if(type==='ret'){
    const isEdit=!!d.id;
    const jenisRetur=d.jenisRetur||'penjualan';
    const skuOpts=S.products.map(p=>`<option value="${p.sku}" ${d.sku===p.sku?'selected':''}>${p.sku} — ${p.nama}</option>`).join('');
    const saleOpts=S.sales.filter(x=>x.inv).map(x=>{const c=S.customers.find(cc=>cc.id===x.custId);return`<option value="${x.id}" ${d.refSaleId===x.id?'selected':''}>${x.inv} — ${c?c.nama:'(tanpa customer)'} — ${fd(x.tgl)}</option>`;}).join('');
    const buyOpts=S.purchases.filter(x=>x.inv).map(x=>{const s=S.suppliers.find(ss=>ss.id===x.supId);return`<option value="${x.id}" ${d.refBuyId===x.id?'selected':''}>${x.inv} — ${s?s.nama:'(tanpa supplier)'} — ${fd(x.tgl)}</option>`;}).join('');
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${isEdit?'Edit Retur':'Catat Retur'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
      <div><label>Jenis Retur</label><select id="fJenis">
        <option value="penjualan" ${jenisRetur==='penjualan'?'selected':''}>Retur Penjualan (customer kembalikan)</option>
        <option value="pembelian" ${jenisRetur==='pembelian'?'selected':''}>Retur Pembelian (kembalikan ke supplier)</option>
      </select></div></div>
      <div class="fr" id="refSaleRow" style="${jenisRetur==='penjualan'?'':'display:none'}">
        <label>Pilih Invoice Penjualan</label>
        <select id="fRefSale"><option value="">— Pilih Invoice Penjualan —</option>${saleOpts}</select></div>
      <div class="fr" id="refBuyRow" style="${jenisRetur==='pembelian'?'':'display:none'}">
        <label>Pilih Invoice Pembelian</label>
        <select id="fRefBuy"><option value="">— Pilih Invoice Pembelian —</option>${buyOpts}</select></div>
      <div class="fr c2"><div><label>SKU Produk</label><select id="fSkRet"><option value="">— Pilih —</option>${skuOpts}</select></div>
      <div><label>Qty Retur</label><input id="fQt" type="number" value="${d.qty||1}" min="1"></div></div>
      <div class="fr c2"><div><label>Nilai Retur (Rp) — dipotong dari invoice terkait</label><input id="fNilai" type="number" value="${d.nilaiRetur||0}" min="0"></div>
      <div><label>Alasan Retur</label><input id="fAlasan" value="${d.alasan||''}" placeholder="Barang rusak / salah kirim"></div></div>
      <div style="display:flex;align-items:center;gap:8px;padding:10px;background:#F5F6FA;border-radius:7px">
        <input type="checkbox" id="fStokMasuk" ${d.stokMasuk?'checked':''}><label for="fStokMasuk" style="margin:0;cursor:pointer">Konfirmasi pergerakan stok sekarang</label>
      </div>
      <div class="tm" style="font-size:11px;margin-top:6px">Retur penjualan dikonfirmasi → stok kembali masuk gudang &amp; nilai dipotong dari piutang/omzet. Retur pembelian dikonfirmasi → stok keluar gudang &amp; nilai dipotong dari hutang.</div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvRet" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;
  }

  // DRILL-DOWN LABA RUGI
  if(type==='lrDetail'){
    const {lrKey,fp,fy,fm}=d;
    const inP=dt2=>{const dt=new Date(dt2);
      if(fp==='monthly')return dt.getFullYear()===fy&&dt.getMonth()===fm;
      if(fp==='quarterly')return dt.getFullYear()===fy&&Math.floor(dt.getMonth()/3)===Math.floor(fm/3);
      if(fp==='semesterly')return dt.getFullYear()===fy&&(dt.getMonth()<6?0:1)===(fm<6?0:1);
      return dt.getFullYear()===fy;
    };
    let judul='',rows='',total=0,headCols='';
    if(lrKey==='omzet'){
      judul='Rincian Pendapatan Penjualan (Neto)';
      headCols='<th>Tanggal</th><th>Invoice</th><th>Customer</th><th>Channel</th><th class="rt">Neto</th>';
      const salesP=S.sales.filter(x=>inP(x.tgl));
      rows=salesP.map(s=>{const c=S.customers.find(cc=>cc.id===s.custId);const n=saleNeto(s);total+=n;
        return`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip">${s.inv||'—'}</span></td><td>${c?c.nama:'—'}</td><td>${s.ch||'—'}</td><td class="rt">${rp(n)}</td></tr>`;}).join('');
      if(!salesP.length)rows=`<tr><td colspan="5"><div class="empty" style="padding:20px"><p>Tidak ada penjualan periode ini</p></div></td></tr>`;
    }else if(lrKey==='hpp'){
      judul='Rincian Harga Pokok Penjualan (HPP)';
      headCols='<th>Tanggal</th><th>Invoice</th><th>SKU</th><th class="rt">Qty</th><th class="rt">HPP/unit</th><th class="rt">Total HPP</th>';
      const salesP=S.sales.filter(x=>inP(x.tgl));
      const arr=[];
      salesP.forEach(s=>(s.items||[]).forEach(i=>{const t=(i.hpp||0)*i.qty;total+=t;
        arr.push(`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip">${s.inv||'—'}</span></td><td><span class="chip">${i.sku}</span></td><td class="rt">${fmt(i.qty)}</td><td class="rt">${rp(i.hpp||0)}</td><td class="rt">${rp(t)}</td></tr>`);}));
      rows=arr.join('')||`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Tidak ada data HPP periode ini</p></div></td></tr>`;
    }else if(lrKey.startsWith('exp:')){
      const cat=lrKey.slice(4);
      judul='Rincian Biaya — '+cat;
      headCols='<th>Tanggal</th><th>No. Invoice/Nota</th><th>Supplier</th><th>Deskripsi</th><th>Status</th><th class="rt">Jumlah</th>';
      const expP=S.expenses.filter(x=>inP(x.tgl)&&x.cat===cat);
      rows=expP.map(x=>{const s=S.suppliers.find(ss=>ss.id===x.supId);total+=x.jumlah;
        return`<tr><td class="nw">${fd(x.tgl)}</td><td>${x.invNo?`<span class="chip">${x.invNo}</span>`:'—'}</td><td>${s?s.nama:'—'}</td><td>${x.deskripsi||'—'}</td><td><span class="pay-badge ${x.payStatus==='belum'?'outstanding':'paid'}">${x.payStatus==='belum'?'Belum':'Lunas'}</span></td><td class="rt">${rp(x.jumlah)}</td></tr>`;}).join('');
      if(!expP.length)rows=`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Tidak ada biaya ${cat} periode ini</p></div></td></tr>`;
    }
    const colspan=headCols.split('<th').length-1;
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Periode: <strong>${fp==='monthly'?MO[fm]+' ':''}${fy}</strong></div>
      <div class="tw"><table><thead><tr>${headCols}</tr></thead><tbody>${rows}
        <tr style="background:#FAFBFC;font-weight:700"><td colspan="${colspan-1}" class="rt">TOTAL</td><td class="rt">${rp(total)}</td></tr>
      </tbody></table></div>
    </div>
    <div class="mf"><button class="btn btn-p" id="bCl2">Tutup</button></div>
  </div></div>`;
  }

  // IMPORT MARKETPLACE (SKU & Penjualan)
  if(type==='import'){
    const imp=S.imp||{};
    const mode=imp.mode||d.mode; // 'sku' atau 'sell'
    const judul=mode==='sku'?'Import Data SKU / Produk':'Import Data Penjualan';
    // FIELD yang perlu dipetakan
    const FIELDS=mode==='sku'?[
      {key:'sku',label:'SKU',wajib:true},
      {key:'nama',label:'Nama Barang',wajib:true},
      {key:'brand',label:'Brand',wajib:false},
      {key:'modal',label:'Harga Modal',wajib:false},
      {key:'stok',label:'Stok Awal Bagus',wajib:false},
    ]:[
      {key:'tgl',label:'Tanggal',wajib:true},
      {key:'inv',label:'No. Invoice / Pesanan',wajib:true},
      {key:'customer',label:'Nama Customer',wajib:false},
      {key:'sku',label:'SKU Produk',wajib:true},
      {key:'qty',label:'Qty',wajib:true},
      {key:'harga',label:'Harga Jual / Satuan',wajib:true},
      {key:'fee',label:'Total Fee Marketplace',wajib:false},
      {key:'ongkir',label:'Biaya Kirim / Ongkir',wajib:false},
    ];
    // STEP 1: upload
    if(!imp.rows){
      return`<div class="ov" id="mOv"><div class="modal">
      <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
      <div class="mb">
        <div class="ib">Langkah 1 dari 3 — Pilih file export dari marketplace (.xlsx atau .csv).</div>
        <div style="border:2px dashed var(--bd);border-radius:10px;padding:32px;text-align:center">
          <i class="ti ti-file-upload" style="font-size:36px;color:var(--t3)"></i>
          <p style="margin:8px 0;font-size:13px;color:var(--t2)">Pilih file dari Tokopedia, Shopee, Lazada, atau marketplace lain</p>
          <label class="btn btn-p" style="cursor:pointer;display:inline-flex"><i class="ti ti-upload"></i> Pilih File<input type="file" id="fImpFile" accept=".xlsx,.xls,.csv" style="display:none"></label>
        </div>
        ${mode==='sell'?`<div class="tm" style="font-size:11px;margin-top:10px">Catatan: Penjualan yang diimport akan diberi channel "Online" dan payment term "Cash". Bisa diedit setelah import.</div>`:`<div class="tm" style="font-size:11px;margin-top:10px">Catatan: Jika ada SKU yang sudah terdaftar, data akan ditimpa dengan yang baru.</div>`}
      </div>
      <div class="mf"><button class="btn" id="bCl2">Batal</button></div>
    </div></div>`;
    }
    // STEP 2: mapping kolom
    if(!imp.confirmed){
      const headers=imp.headers||[];
      const sample=imp.rows.slice(0,3);
      return`<div class="ov" id="mOv"><div class="modal modal-lg">
      <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
      <div class="mb">
        <div class="ib">Langkah 2 dari 3 — Cocokkan kolom file dengan data aplikasi. File terbaca <strong>${imp.rows.length} baris</strong>.</div>
        <div class="tw" style="margin-bottom:14px"><table><thead><tr><th>Data Aplikasi</th><th>Kolom di File</th><th>Contoh Nilai</th></tr></thead><tbody>
        ${FIELDS.map(f=>{
          const cur=imp.map?imp.map[f.key]:'';
          const sampleVal=cur&&sample.length?(sample[0][cur]??'—'):'—';
          return`<tr>
            <td><strong>${f.label}</strong>${f.wajib?' <span class="r">*</span>':''}</td>
            <td><select class="impMap" data-field="${f.key}"><option value="">— Tidak dipetakan —</option>
              ${headers.map(h=>`<option value="${h}" ${cur===h?'selected':''}>${h}</option>`).join('')}</select></td>
            <td class="tm">${sampleVal}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>
        <div class="tm" style="font-size:11px">Field bertanda <span class="r">*</span> wajib dipetakan. Aplikasi mencoba menebak otomatis berdasarkan nama kolom.</div>
      </div>
      <div class="mf"><button class="btn" id="bImpBack">Kembali</button><button class="btn btn-p" id="bImpPreview">Lanjut — Preview</button></div>
    </div></div>`;
    }
    // STEP 3: preview & konfirmasi
    const parsed=imp.parsed||[];
    const valid=parsed.filter(x=>x._valid);
    const invalid=parsed.filter(x=>!x._valid);
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Langkah 3 dari 3 — Preview hasil. <strong class="g">${valid.length} baris siap diimport</strong>${invalid.length?`, <strong class="r">${invalid.length} baris dilewati</strong> (data wajib kosong/tidak valid)`:''}.</div>
      <div class="tw"><table><thead><tr>
        ${mode==='sku'?'<th>Status</th><th>SKU</th><th>Nama</th><th>Brand</th><th class="rt">Modal</th><th class="rt">Stok</th>':'<th>Status</th><th>Tgl</th><th>Invoice</th><th>Customer</th><th>SKU</th><th class="rt">Qty</th><th class="rt">Harga</th>'}
      </tr></thead><tbody>
      ${parsed.slice(0,50).map(x=>{
        const ok=x._valid;
        const stBadge=ok?(x._dup?`<span class="pay-badge tertahan">Timpa</span>`:`<span class="pay-badge paid">Baru</span>`):`<span class="pay-badge outstanding">Dilewati</span>`;
        if(mode==='sku')return`<tr style="${ok?'':'opacity:.5'}"><td>${stBadge}</td><td><span class="chip">${x.sku||'—'}</span></td><td>${x.nama||'—'}</td><td>${x.brand||'—'}</td><td class="rt">${x.modal?rp(x.modal):'—'}</td><td class="rt">${x.stok||0}</td></tr>`;
        return`<tr style="${ok?'':'opacity:.5'}"><td>${stBadge}</td><td class="nw">${x.tgl||'—'}</td><td><span class="chip">${x.inv||'—'}</span></td><td>${x.customer||'—'}</td><td><span class="chip">${x.sku||'—'}</span></td><td class="rt">${x.qty||0}</td><td class="rt">${x.harga?rp(x.harga):'—'}</td></tr>`;
      }).join('')}
      </tbody></table></div>
      ${parsed.length>50?`<div class="tm" style="font-size:11px;margin-top:8px">Menampilkan 50 baris pertama dari ${parsed.length} baris.</div>`:''}
      ${mode==='sell'?`<div class="tm" style="font-size:11px;margin-top:8px">Baris penjualan dengan No. Invoice sama akan digabung menjadi satu invoice multi-SKU. Customer baru akan otomatis dibuat di database.</div>`:''}
    </div>
    <div class="mf"><button class="btn" id="bImpBack2">Kembali</button><button class="btn btn-p" id="bImpConfirm">Import ${valid.length} Baris</button></div>
  </div></div>`;
  }
  return'';
}

function calcSellSummary(items,fee,ongkir,ppnOn,ppnPct){
  const gross=items.reduce((a,i)=>a+(i.total||0),0);
  const ppnAktif=ppnOn==='yes'||ppnOn===true;
  const ppn=ppnAktif?gross*((ppnPct||11)/100):0;
  const neto=gross-(fee||0);
  return`<div class="row"><span>Subtotal Barang</span><span>${rp(gross)}</span></div>
    ${ppnAktif?`<div class="row"><span>PPN ${ppnPct||11}%</span><span>${rp(ppn)}</span></div>`:''}
    <div class="row"><span>Fee Marketplace</span><span class="r">${rp(fee||0)}</span></div>
    <div class="row"><span>Biaya Kirim / Ongkir</span><span>${rp(ongkir||0)}</span></div>
    <div class="row"><span>Total Neto Invoice</span><strong>${rp(neto)}</strong></div>
    ${ppnAktif?`<div class="row"><span>Total + PPN (tagihan ke customer)</span><strong>${rp(neto+ppn)}</strong></div>`:''}`;
}

// collectors
function collectPO(){
  return [...document.querySelectorAll('#itemListPO .sku-line')].map(l=>{
    const sku=l.querySelector('.poSku').value;
    const hl=parseFloat(l.querySelector('.poHl').value)||0;
    const dc=parseFloat(l.querySelector('.poDc').value)||0;
    const qty=parseFloat(l.querySelector('.poQty').value)||1;
    const hn=hl*(1-dc/100);
    const p=S.products.find(x=>x.sku===sku);
    return{id:uid(),sku,nama:p?.nama||'',qty,hargaListAsli:hl,disc:dc,hargaNetAsli:hn,hargaAsli:hn,total:hn*qty};
  });
}
function collectBuy(){
  return [...document.querySelectorAll('#itemListBuy .sku-line')].map(l=>{
    const sku=l.querySelector('.bySku').value;
    const hl=parseFloat(l.querySelector('.byHl').value)||0;
    const dc=parseFloat(l.querySelector('.byDc').value)||0;
    const qty=parseFloat(l.querySelector('.byQt').value)||1;
    const hn=hl*(1-dc/100);
    const p=S.products.find(x=>x.sku===sku);
    return{id:uid(),sku,nama:p?.nama||'',brand:p?.brand||'',hargaListAsli:hl,disc:dc,hargaNetAsli:hn,qty,totalAsli:hn*qty};
  });
}
function collectSell(){
  return [...document.querySelectorAll('#itemListSell .sku-line')].map(l=>{
    const sku=l.querySelector('.slSku').value;
    const hj=parseFloat(l.querySelector('.slHj').value)||0;
    const dc=parseFloat(l.querySelector('.slDc').value)||0;
    const qty=parseFloat(l.querySelector('.slQt').value)||1;
    const hjNet=hj*(1-dc/100);
    const p=S.products.find(x=>x.sku===sku);
    const s=sku?stats(sku):{avg:0};
    return{id:uid(),sku,nama:p?.nama||'',brand:p?.brand||'',hj:hjNet,disc:dc,qty,total:hjNet*qty,hpp:s.avg};
  });
}
function updatePOTotal(){
  const items=collectPO();const curr=document.getElementById('fCurr')?.value||'IDR';
  const rate=parseFloat(document.getElementById('fRate')?.value)||1;
  const tot=items.reduce((a,i)=>a+i.total,0);
  const g=document.getElementById('poGrand');if(g)g.textContent=cur(tot,curr);
  const gi=document.getElementById('poGrandIDR');if(gi)gi.textContent=rp(tot*rate);
}
function updateBuyTotal(){
  const items=collectBuy();const curr=document.getElementById('fCurr')?.value||'IDR';
  const rate=parseFloat(document.getElementById('fRate')?.value)||1;
  const tot=items.reduce((a,i)=>a+i.totalAsli,0);
  const g=document.getElementById('buyGrand');if(g)g.textContent=cur(tot,curr);
  const gi=document.getElementById('buyGrandIDR');if(gi)gi.textContent=rp(tot*rate);
}
function updateSellSummary(){
  const items=collectSell();
  const fee=parseFloat(document.getElementById('fFee')?.value)||0;
  const ongkir=parseFloat(document.getElementById('fOngkir')?.value)||0;
  const ppnOn=document.getElementById('fPpnOn')?.value;
  const ppnPct=parseFloat(document.getElementById('fPpnPct')?.value)||11;
  const el=document.getElementById('sellSummary');
  if(el)el.innerHTML=calcSellSummary(items,fee,ongkir,ppnOn,ppnPct);
}

// ═══ PDF & EXCEL EXPORT ═══
function exportPOpdf(po){
  const {jsPDF}=window.jspdf;const doc=new jsPDF();
  const sup=S.suppliers.find(s=>s.id===po.supId);
  doc.setFontSize(18);doc.text('PURCHASE ORDER',14,20);
  doc.setFontSize(10);
  doc.text(`No. PO: ${po.noPO||'-'}`,14,30);
  doc.text(`Tanggal: ${fd(po.tgl)}`,14,36);
  doc.text(`Supplier: ${sup?sup.nama:'-'}`,14,42);
  doc.text(`Mata Uang: ${po.curr}${po.curr!=='IDR'?' (Rate: '+fmt(po.rate)+')':''}`,14,48);
  const rows=(po.items||[]).map((i,n)=>[n+1,i.sku,i.nama,fmt(i.qty),cur(i.hargaAsli,po.curr),cur(i.total,po.curr)]);

// ═══ IMPORT LOGIC ═══
function impGuessColumn(headers,keywords){
  // tebak kolom berdasarkan kata kunci pada nama header
  for(const h of headers){
    const hl=String(h).toLowerCase();
    if(keywords.some(k=>hl.includes(k)))return h;
  }
  return '';
}
function impAutoMap(mode,headers){
  const map={};
  if(mode==='sku'){
    map.sku=impGuessColumn(headers,['sku','kode']);
    map.nama=impGuessColumn(headers,['nama','product name','nama produk','nama barang']);
    map.brand=impGuessColumn(headers,['brand','merek']);
    map.modal=impGuessColumn(headers,['modal','hpp','harga beli','cost']);
    map.stok=impGuessColumn(headers,['stok','stock','qty']);
  }else{
    map.tgl=impGuessColumn(headers,['tanggal','tgl','date','order date','waktu pesanan']);
    map.inv=impGuessColumn(headers,['invoice','no. pesanan','nomor pesanan','order id','no pesanan','order sn']);
    map.customer=impGuessColumn(headers,['customer','pembeli','buyer','nama pembeli','penerima']);
    map.sku=impGuessColumn(headers,['sku','kode']);
    map.qty=impGuessColumn(headers,['qty','jumlah','quantity','kuantitas']);
    map.harga=impGuessColumn(headers,['harga','price','harga satuan','harga jual','unit price']);
    map.fee=impGuessColumn(headers,['fee','biaya admin','admin','komisi','layanan']);
    map.ongkir=impGuessColumn(headers,['ongkir','ongkos kirim','shipping','biaya kirim']);
  }
  return map;
}
function impParseFile(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){alert('File kosong atau tidak terbaca');return;}
      const headers=Object.keys(rows[0]);
      cb(rows,headers);
    }catch(e){alert('Gagal membaca file: '+e.message);}
  };
  reader.readAsArrayBuffer(file);
}
function impToNumber(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/[^0-9,.-]/g,'').trim();
  if(s==='')return 0;
  const hasComma=s.includes(','),hasDot=s.includes('.');
  if(hasComma&&hasDot){
    // format Indonesia: titik=ribuan, koma=desimal  -> "1.234.567,89"
    s=s.replace(/\./g,'').replace(',','.');
  }else if(hasComma){
    // hanya koma: anggap desimal "1234,56"
    s=s.replace(',','.');
  }else if(hasDot){
    // hanya titik: bisa ribuan ("1.234.567") atau desimal ("1234.56")
    const parts=s.split('.');
    // jika ada >1 titik ATAU bagian terakhir bukan 1-2 digit -> titik = ribuan
    if(parts.length>2||(parts.length===2&&parts[1].length===3)){
      s=s.replace(/\./g,'');
    }
    // selain itu biarkan sebagai desimal
  }
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
function impToDate(v){
  if(!v)return '';
  if(typeof v==='number'){
    // serial date Excel
    const d=new Date(Math.round((v-25569)*86400000));
    return d.toISOString().slice(0,10);
  }
  const d=new Date(v);
  if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);
  // coba format dd/mm/yyyy atau dd-mm-yyyy
  const m=String(v).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){let y=m[3];if(y.length===2)y='20'+y;return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}
  return '';
}
function impParseRows(mode,rows,map){
  return rows.map(row=>{
    if(mode==='sku'){
      const sku=String(row[map.sku]||'').trim().toUpperCase();
      const nama=String(row[map.nama]||'').trim();
      const brand=map.brand?String(row[map.brand]||'').trim():'';
      const modal=map.modal?impToNumber(row[map.modal]):0;
      const stok=map.stok?impToNumber(row[map.stok]):0;
      const _valid=!!(sku&&nama);
      const _dup=_valid&&S.products.some(p=>p.sku===sku);
      // cocokkan brand ke daftar resmi (case-insensitive)
      const brandMatch=BRANDS.find(b=>b.toLowerCase()===brand.toLowerCase())||(brand?BRANDS[BRANDS.length-1]:BRANDS[0]);
      return{sku,nama,brand:brandMatch,modal,stok,_valid,_dup};
    }else{
      const tgl=map.tgl?impToDate(row[map.tgl]):'';
      const inv=String(row[map.inv]||'').trim();
      const customer=map.customer?String(row[map.customer]||'').trim():'';
      const sku=String(row[map.sku]||'').trim().toUpperCase();
      const qty=impToNumber(row[map.qty]);
      const harga=impToNumber(row[map.harga]);
      const fee=map.fee?impToNumber(row[map.fee]):0;
      const ongkir=map.ongkir?impToNumber(row[map.ongkir]):0;
      const _valid=!!(tgl&&inv&&sku&&qty>0&&harga>0);
      return{tgl,inv,customer,sku,qty,harga,fee,ongkir,_valid};
    }
  });
}
function impCommitSKU(parsed){
  let added=0,updated=0;
  parsed.filter(x=>x._valid).forEach(x=>{
    const existing=S.products.find(p=>p.sku===x.sku);
    if(existing){
      S.products=S.products.map(p=>p.id===existing.id?{...p,nama:x.nama,brand:x.brand,m:x.modal||p.m,sb:x.stok||p.sb}:p);
      updated++;
    }else{
      S.products.push({id:uid(),sku:x.sku,nama:x.nama,brand:x.brand,m:x.modal,sb:x.stok,sk:0,foto:''});
      added++;
    }
  });
  return{added,updated};
}
function impCommitSell(parsed){
  const valid=parsed.filter(x=>x._valid);
  // kelompokkan baris berdasarkan No. Invoice
  const groups={};
  valid.forEach(x=>{if(!groups[x.inv])groups[x.inv]=[];groups[x.inv].push(x);});
  let created=0,skipped=0;
  Object.entries(groups).forEach(([inv,rows])=>{
    // lewati jika invoice sudah ada
    if(S.sales.some(s=>s.inv===inv)){skipped++;return;}
    const first=rows[0];
    // cari atau buat customer
    let custId='';
    if(first.customer){
      let cust=S.customers.find(c=>c.nama.toLowerCase()===first.customer.toLowerCase());
      if(!cust){cust={id:uid(),nama:first.customer,tipe:'Retail'};S.customers.push(cust);}
      custId=cust.id;
    }
    const items=rows.map(r=>{
      const p=S.products.find(pp=>pp.sku===r.sku);
      const s=p?stats(r.sku):{avg:0};
      return{id:uid(),sku:r.sku,nama:p?.nama||'',brand:p?.brand||'',hj:r.harga,disc:0,qty:r.qty,total:r.harga*r.qty,hpp:s.avg};
    });
    const fee=rows.reduce((a,r)=>a+(r.fee||0),0);
    const ongkir=rows.reduce((a,r)=>a+(r.ongkir||0),0);
    S.sales.push({id:uid(),tgl:first.tgl,inv,custId,ch:'Online',fee,ongkir,ppnOn:false,items,payTerm:'cash',payments:[],payStatus:'paid',danaStatus:'tertahan'});
    created++;
  });
  return{created,skipped};
}
