      ['products','purchases','sales','suppliers','customers','expenses','returns','purchaseOrders'].forEach(k=>{
        if(d[k])S[k]=[...S[k],...d[k].filter(x=>!S[k].find(y=>y.id===x.id))];});
      save();render();toast('Import berhasil!');}catch(e){alert('File tidak valid');}};r.readAsText(f);
  });
}

function bm(){
  document.getElementById('bCl')?.addEventListener('click',()=>{S.modal=null;S.imp=null;render();});
  document.getElementById('bCl2')?.addEventListener('click',()=>{S.modal=null;S.imp=null;render();});

  // ═══ IMPORT — STEP HANDLERS ═══
  // step 1: file dipilih
  document.getElementById('fImpFile')?.addEventListener('change',function(){
    const file=this.files[0];if(!file)return;
    impParseFile(file,(rows,headers)=>{
      const mode=S.imp.mode;
      S.imp={...S.imp,rows,headers,map:impAutoMap(mode,headers)};
      render();bm();
    });
  });
  // step 2: kembali ke step 1
  document.getElementById('bImpBack')?.addEventListener('click',()=>{
    S.imp={mode:S.imp.mode};render();bm();
  });
  // step 2: lanjut ke preview
  document.getElementById('bImpPreview')?.addEventListener('click',()=>{
    const mode=S.imp.mode;
    const map={};
    document.querySelectorAll('.impMap').forEach(sel=>{map[sel.dataset.field]=sel.value;});
    // validasi field wajib
    const wajib=mode==='sku'?['sku','nama']:['tgl','inv','sku','qty','harga'];
    const kurang=wajib.filter(k=>!map[k]);
    if(kurang.length){alert('Kolom wajib belum dipetakan: '+kurang.join(', '));return;}
    const parsed=impParseRows(mode,S.imp.rows,map);
    S.imp={...S.imp,map,parsed,confirmed:true};
    render();bm();
  });
  // step 3: kembali ke step 2
  document.getElementById('bImpBack2')?.addEventListener('click',()=>{
    S.imp={...S.imp,confirmed:false,parsed:null};render();bm();
  });
  // step 3: konfirmasi import
  document.getElementById('bImpConfirm')?.addEventListener('click',()=>{
    const mode=S.imp.mode,parsed=S.imp.parsed;
    if(mode==='sku'){
      const r=impCommitSKU(parsed);
      S.modal=null;S.imp=null;save();render();
      toast(`Import selesai: ${r.added} produk baru, ${r.updated} ditimpa`);
    }else{
      const r=impCommitSell(parsed);
      S.modal=null;S.imp=null;save();render();
      toast(`Import selesai: ${r.created} invoice dibuat${r.skipped?', '+r.skipped+' invoice dilewati (sudah ada)':''}`);
    }
  });

  // PRODUK
  // handler upload foto + kompresi otomatis
  document.getElementById('fFoto')?.addEventListener('change',function(){
    const file=this.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=800;
        let w=img.width,h=img.height;
        if(w>h&&w>MAX){h=h*MAX/w;w=MAX;}
        else if(h>=w&&h>MAX){w=w*MAX/h;h=MAX;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.75);
        const hid=document.getElementById('fFotoData');if(hid)hid.value=dataUrl;
        const prev=document.getElementById('fotoPreview');
        if(prev){prev.style.backgroundImage=`url('${dataUrl}')`;prev.innerHTML='';}
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('bRemFoto')?.addEventListener('click',()=>{
    const hid=document.getElementById('fFotoData');if(hid)hid.value='';
    const prev=document.getElementById('fotoPreview');
    if(prev){prev.style.backgroundImage='none';prev.innerHTML='<i class="ti ti-photo" style="font-size:24px;color:#9CA3AF"></i>';}
  });
  document.getElementById('bSvP')?.addEventListener('click',function(){
    const id=this.dataset.id,br=document.getElementById('fBr').value;
    const sku=document.getElementById('fSk').value.trim().toUpperCase(),nama=document.getElementById('fNm').value.trim();
    const m=parseFloat(document.getElementById('fMd').value)||0,sb=parseFloat(document.getElementById('fSb').value)||0,sk=parseFloat(document.getElementById('fSk2').value)||0;
    const foto=document.getElementById('fFotoData')?.value||'';
    if(!sku||!nama){alert('SKU dan Nama wajib diisi');return;}
    if(id){S.products=S.products.map(p=>p.id===id?{...p,brand:br,nama,m,sb,sk,foto}:p);}
    else{if(S.products.find(p=>p.sku===sku)){alert('SKU sudah ada!');return;}S.products.push({id:uid(),brand:br,sku,nama,m,sb,sk,foto});}
    save();S.modal=null;render();toast(id?'Produk diperbarui':'Produk ditambahkan');
  });

  // PO
  bindPOItems();
  document.getElementById('fCurr')?.addEventListener('change',()=>{updatePOTotal();updateBuyTotal();});
  document.getElementById('fRate')?.addEventListener('input',()=>{updatePOTotal();updateBuyTotal();});
  document.getElementById('bSvPO')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tgl=document.getElementById('fTg').value,noPO=document.getElementById('fNoPO').value;
    const supId=document.getElementById('fSup').value,status=document.getElementById('fStatus').value;
    const curr=document.getElementById('fCurr').value,rate=parseFloat(document.getElementById('fRate').value)||1;
    const payTerm=document.getElementById('fPt').value;
    const note=document.getElementById('fNote').value,items=collectPO();
    if(!tgl){alert('Tanggal wajib diisi');return;}
    if(!items.length||items.some(i=>!i.sku)){alert('Lengkapi semua item SKU');return;}
    const rec={tgl,noPO,supId,status,curr,rate,payTerm,note,items};
    if(id){S.purchaseOrders=S.purchaseOrders.map(x=>x.id===id?{...x,...rec}:x);toast('PO diperbarui');}
    else{S.purchaseOrders.push({id:uid(),...rec});toast('PO dibuat');}
    save();S.modal=null;render();
  });

  // PEMBELIAN
  bindBuyItems();
  document.getElementById('bSvBuy')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tgl=document.getElementById('fTg').value,inv=document.getElementById('fIn').value;
    const supId=document.getElementById('fSup').value;
    const curr=document.getElementById('fCurr').value,rate=parseFloat(document.getElementById('fRate').value)||1;
    const items=collectBuy().map(i=>({...i,hargaNetIDR:i.hargaNetAsli*rate,totalIDR:i.totalAsli*rate}));
    if(!tgl){alert('Tanggal wajib diisi');return;}
    if(!items.length||items.some(i=>!i.sku)){alert('Lengkapi semua item SKU');return;}
    if(id){const old=S.purchases.find(x=>x.id===id);
      S.purchases=S.purchases.map(x=>x.id===id?{...x,tgl,inv,supId,curr,rate,items}:x);toast('Pembelian diperbarui');}
    else{S.purchases.push({id:uid(),tgl,inv,supId,curr,rate,items,payTerm:'cash',payments:[],payStatus:'outstanding'});toast('Pembelian dicatat');}
    save();S.modal=null;render();
  });

  // PENJUALAN
  bindSellItems();
  document.getElementById('fPt')?.addEventListener('change',e=>{
    const tr=document.getElementById('termRow');if(tr)tr.style.display=e.target.value==='credit'?'':'none';
  });
  document.getElementById('fTermDays')?.addEventListener('input',e=>{
    const tg=document.getElementById('fTg').value;
    if(tg&&e.target.value){const d=new Date(tg);d.setDate(d.getDate()+parseInt(e.target.value));const jt=document.getElementById('fJt');if(jt)jt.value=d.toISOString().slice(0,10);}
  });
  document.getElementById('fFee')?.addEventListener('input',updateSellSummary);
  document.getElementById('fOngkir')?.addEventListener('input',updateSellSummary);
  document.getElementById('fPpnOn')?.addEventListener('change',updateSellSummary);
  document.getElementById('fPpnPct')?.addEventListener('input',updateSellSummary);
  document.getElementById('bSvSell')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tgl=document.getElementById('fTg').value,inv=document.getElementById('fIn').value;
    const custId=document.getElementById('fCust').value,ch=document.getElementById('fCh').value;
    const fee=parseFloat(document.getElementById('fFee').value)||0;
    const ongkir=parseFloat(document.getElementById('fOngkir').value)||0;
    const payTerm=document.getElementById('fPt').value;
    const termDays=parseInt(document.getElementById('fTermDays')?.value||0);
    const jatuhTempo=document.getElementById('fJt')?.value||'';
    const ppnOn=document.getElementById('fPpnOn').value==='yes';
    const ppnPct=parseFloat(document.getElementById('fPpnPct').value)||11;
    const items=collectSell();
    if(!tgl){alert('Tanggal wajib diisi');return;}
    if(!items.length||items.some(i=>!i.sku)){alert('Lengkapi semua item SKU');return;}
    const initPayStatus=(payTerm==='cash')?'paid':'outstanding';
    if(id){
      S.sales=S.sales.map(x=>x.id===id?{...x,tgl,inv,custId,ch,fee,ongkir,payTerm,termDays,jatuhTempo,ppnOn,ppnPct,items}:x);toast('Penjualan diperbarui');}
    else{S.sales.push({id:uid(),tgl,inv,custId,ch,fee,ongkir,payTerm,termDays,jatuhTempo,ppnOn,ppnPct,items,payStatus:initPayStatus,payments:[],danaStatus:ch==='Online'?'tertahan':'cair'});toast('Penjualan dicatat');}
    save();S.modal=null;render();
  });

  // PAYMENT SELL
  document.getElementById('bSvPaySell')?.addEventListener('click',function(){
    const id=this.dataset.id,tg=document.getElementById('fTg').value;
    const met=document.getElementById('fMet').value,amt=parseFloat(document.getElementById('fAmt').value)||0;
    const note=document.getElementById('fNote').value;
    if(!amt){alert('Jumlah bayar wajib diisi');return;}
    S.sales=S.sales.map(x=>{if(x.id!==id)return x;
      const payments=[...(x.payments||[]),{id:uid(),tgl:tg,met,amount:amt,amountIDR:amt,note}];
      const paid=payments.reduce((a,p)=>a+(p.amountIDR||p.amount),0);
      return{...x,payments,payStatus:paid>=saleNeto(x)?'paid':paid>0?'partial':'outstanding'};
    });
    save();S.modal=null;render();toast('Pembayaran dicatat');
  });

  // PAYMENT BUY (multi currency)
  const updPayBuyIDR=()=>{
    const amt=parseFloat(document.getElementById('fAmt')?.value)||0;
    const rate=parseFloat(document.getElementById('fRate')?.value)||1;
    const el=document.getElementById('payBuyIDR');if(el)el.textContent=rp(amt*rate);
  };
  document.getElementById('fAmt')?.addEventListener('input',updPayBuyIDR);
  document.getElementById('fRate')?.addEventListener('input',updPayBuyIDR);
  document.getElementById('bSvPayBuy')?.addEventListener('click',function(){
    const id=this.dataset.id,tg=document.getElementById('fTg').value;
    const met=document.getElementById('fMet').value,curr=document.getElementById('fCurr').value;
    const rate=parseFloat(document.getElementById('fRate').value)||1;
    const amt=parseFloat(document.getElementById('fAmt').value)||0;
    const note=document.getElementById('fNote').value;
    if(!amt){alert('Jumlah bayar wajib diisi');return;}
    S.purchases=S.purchases.map(x=>{if(x.id!==id)return x;
      const payments=[...(x.payments||[]),{id:uid(),tgl:tg,met,curr,rate,amount:amt,amountIDR:amt*rate,note}];
      const paid=payments.reduce((a,p)=>a+(p.amountIDR||p.amount),0);
      return{...x,payments,payStatus:paid>=purchaseTotalIDR(x)?'paid':paid>0?'partial':'outstanding'};
    });
    save();S.modal=null;render();toast('Pembayaran ke supplier dicatat');
  });

  // SUPPLIER
  document.getElementById('bSvSup')?.addEventListener('click',function(){
    const id=this.dataset.id,nama=document.getElementById('fNm').value.trim();
    if(!nama){alert('Nama supplier wajib diisi');return;}
    const rec={nama,pic:document.getElementById('fPic').value,telp:document.getElementById('fTelp').value,email:document.getElementById('fEmail').value,alamat:document.getElementById('fAlamat').value,npwp:document.getElementById('fNpwp').value,note:document.getElementById('fNote').value};
    if(id){S.suppliers=S.suppliers.map(x=>x.id===id?{...x,...rec}:x);}else S.suppliers.push({id:uid(),...rec});
    save();S.modal=null;render();toast(id?'Supplier diperbarui':'Supplier ditambahkan');
  });

  // CUSTOMER
  document.getElementById('bSvCust')?.addEventListener('click',function(){
    const id=this.dataset.id,nama=document.getElementById('fNm').value.trim();
    if(!nama){alert('Nama customer wajib diisi');return;}
    const rec={nama,tipe:document.getElementById('fTipe').value,pic:document.getElementById('fPic').value,telp:document.getElementById('fTelp').value,email:document.getElementById('fEmail').value,npwp:document.getElementById('fNpwp').value,alamat:document.getElementById('fAlamat').value,note:document.getElementById('fNote').value};
    if(id){S.customers=S.customers.map(x=>x.id===id?{...x,...rec}:x);}else S.customers.push({id:uid(),...rec});
    save();S.modal=null;render();toast(id?'Customer diperbarui':'Customer ditambahkan');
  });

  // BIAYA
  document.getElementById('bSvExp')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tg=document.getElementById('fTg').value,cat=document.getElementById('fCat').value;
    const desc=document.getElementById('fDesc').value,jml=parseFloat(document.getElementById('fJml').value)||0;
    const invNo=document.getElementById('fInvNo').value;
    const payStatus=document.getElementById('fPayStatus').value;
    const invRef=document.getElementById('fInvRef').value;
    const supId=document.getElementById('fSupExp').value;
    const jatuhTempo=document.getElementById('fJtExp').value;
    if(!jml){alert('Jumlah wajib diisi');return;}
    const rec={tgl:tg,cat,deskripsi:desc,jumlah:jml,invNo,payStatus,invRef,supId,jatuhTempo};
    if(id){S.expenses=S.expenses.map(x=>x.id===id?{...x,...rec}:x);toast('Biaya diperbarui');}
    else{S.expenses.push({id:uid(),...rec});toast('Biaya dicatat');}
    save();S.modal=null;render();
  });

  // RETUR
  document.getElementById('bSvRet')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tg=document.getElementById('fTg').value;
    const jenisRetur=document.getElementById('fJenis').value;
    const sku=document.getElementById('fSkRet').value,qt=parseFloat(document.getElementById('fQt').value)||1;
    const nilaiRetur=parseFloat(document.getElementById('fNilai').value)||0;
    const alasan=document.getElementById('fAlasan').value,stokMasuk=document.getElementById('fStokMasuk').checked;
    const refSaleId=document.getElementById('fRefSale')?.value||'';
    const refBuyId=document.getElementById('fRefBuy')?.value||'';
    if(!sku){alert('Pilih SKU produk');return;}
    if(jenisRetur==='penjualan'&&!refSaleId){alert('Pilih invoice penjualan terkait');return;}
    if(jenisRetur==='pembelian'&&!refBuyId){alert('Pilih invoice pembelian terkait');return;}
    const p=S.products.find(x=>x.sku===sku);
    const rec={tgl:tg,jenisRetur,sku,nama:p?.nama||'',qty:qt,nilaiRetur,alasan,stokMasuk,refSaleId,refBuyId};
    if(id){S.returns=S.returns.map(x=>x.id===id?{...x,...rec}:x);toast('Retur diperbarui');}
    else{S.returns.push({id:uid(),...rec});toast('Retur dicatat');}
    save();S.modal=null;render();
  });
  // toggle row jenis retur
  document.getElementById('fJenis')?.addEventListener('change',e=>{
    const isJual=e.target.value==='penjualan';
    const rs=document.getElementById('refSaleRow'),rb=document.getElementById('refBuyRow');
    if(rs)rs.style.display=isJual?'':'none';
    if(rb)rb.style.display=isJual?'none':'';
  });
}

function bindPOItems(){
  const list=document.getElementById('itemListPO');if(!list)return;
  document.getElementById('bAddItemPO')?.addEventListener('click',()=>{
    const div=document.createElement('div');div.innerHTML=skuLinePO({id:uid(),sku:'',qty:1,hargaAsli:0,total:0},list.children.length);
    list.appendChild(div.firstElementChild);bindPOLine(list.lastElementChild);
  });
  [...list.children].forEach(l=>bindPOLine(l));
}
function bindPOLine(l){
  l.querySelectorAll('.poHl,.poDc,.poQty').forEach(el=>el.addEventListener('input',()=>{
    const hl=parseFloat(l.querySelector('.poHl').value)||0,dc=parseFloat(l.querySelector('.poDc').value)||0,q=parseFloat(l.querySelector('.poQty').value)||1;
    const hn=hl*(1-dc/100);
    l.querySelector('.poHn').value=Math.round(hn);
    l.querySelector('.poTot').value=Math.round(hn*q);updatePOTotal();
  }));
  l.querySelector('.poRem')?.addEventListener('click',()=>{l.remove();updatePOTotal();});
  updatePOTotal();
}
function bindBuyItems(){
  const list=document.getElementById('itemListBuy');if(!list)return;
  document.getElementById('bAddItemBuy')?.addEventListener('click',()=>{
    const div=document.createElement('div');div.innerHTML=skuLineBuy({id:uid(),sku:'',qty:1,hargaListAsli:0,disc:0,hargaNetAsli:0,totalAsli:0},list.children.length);
    list.appendChild(div.firstElementChild);bindBuyLine(list.lastElementChild);
  });
  [...list.children].forEach(l=>bindBuyLine(l));
}
function bindBuyLine(l){
  l.querySelectorAll('.byHl,.byDc,.byQt').forEach(el=>el.addEventListener('input',()=>{
    const hl=parseFloat(l.querySelector('.byHl').value)||0,dc=parseFloat(l.querySelector('.byDc').value)||0,q=parseFloat(l.querySelector('.byQt').value)||1;
    const hn=hl*(1-dc/100);l.querySelector('.byHn').value=Math.round(hn);l.querySelector('.byTot').value=Math.round(hn*q);updateBuyTotal();
  }));
  l.querySelector('.byRem')?.addEventListener('click',()=>{l.remove();updateBuyTotal();});
  updateBuyTotal();
}
function bindSellItems(){
  const list=document.getElementById('itemListSell');if(!list)return;
  document.getElementById('bAddItemSell')?.addEventListener('click',()=>{
    const div=document.createElement('div');div.innerHTML=skuLineSell({id:uid(),sku:'',qty:1,hj:0,disc:0,total:0},list.children.length);
    list.appendChild(div.firstElementChild);bindSellLine(list.lastElementChild);
  });
  [...list.children].forEach(l=>bindSellLine(l));
}
function bindSellLine(l){
  l.querySelectorAll('.slHj,.slDc,.slQt').forEach(el=>el.addEventListener('input',()=>{
    const hj=parseFloat(l.querySelector('.slHj').value)||0,dc=parseFloat(l.querySelector('.slDc').value)||0,q=parseFloat(l.querySelector('.slQt').value)||1;
    const hjn=hj*(1-dc/100);l.querySelector('.slTot').value=Math.round(hjn*q);updateSellSummary();
  }));
  l.querySelector('.slSku')?.addEventListener('change',updateSellSummary);
  l.querySelector('.slRem')?.addEventListener('click',()=>{l.remove();updateSellSummary();});
  updateSellSummary();
}

load();render();
</script>
