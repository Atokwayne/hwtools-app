<body><div id="app"></div>
<script>
// ═══ CONSTANTS ═══
// ─── SET KASTOR CONSTANTS ─────────────────────────────────────────────────────
const SET_TYPES=[
  {kode:'H/H', nama:'Set H/H (4x Swivel)',   komposisi:[{tipe:'S',qty:4}]},
  {kode:'M/M', nama:'Set M/M (4x Fixed)',    komposisi:[{tipe:'F',qty:4}]},
  {kode:'R/R', nama:'Set R/R (4x Rem)',      komposisi:[{tipe:'SB',qty:4}]},
  {kode:'H/M', nama:'Set H/M (2x Swivel + 2x Fixed)', komposisi:[{tipe:'S',qty:2},{tipe:'F',qty:2}]},
  {kode:'R/H', nama:'Set R/H (2x Rem + 2x Swivel)',   komposisi:[{tipe:'SB',qty:2},{tipe:'S',qty:2}]},
  {kode:'R/M', nama:'Set R/M (2x Rem + 2x Fixed)',    komposisi:[{tipe:'SB',qty:2},{tipe:'F',qty:2}]},
  {kode:'WO',  nama:'Set WO (4x Wheel Only)',komposisi:[{tipe:'WO',qty:4}]},
];
const SIZE_MAP={
  '025':'1"','040':'1½"','050':'2"','075':'3"',
  '100':'4"','125':'5"','150':'6"','200':'8"','250':'10"'
};
const BRACKET_TYPES=['S','F','SB','WO']; // Swivel, Fixed, Swivel Brake, Wheel Only
const BRACKET_NAMES={'S':'Swivel (Hidup)','F':'Fixed (Mati)','SB':'Swivel Brake (Rem)','WO':'Wheel Only'};
// parse tipe dari suffix SKU: 036-075-S -> 'S', 037-075-F -> 'F', dll
function parseSKUTipe(sku){
  if(!sku)return null;
  const parts=sku.split('-');
  const last=parts[parts.length-1].toUpperCase();
  if(['S','SW'].includes(last))return'S';
  if(['F','FX'].includes(last))return'F';
  if(['SB'].includes(last))return'SB';
  if(['WO'].includes(last))return'WO';
  return null;
}
// parse ukuran dari bagian tengah SKU: 036-075-S -> '075' -> '3"'
function parseSKUSize(sku){
  if(!sku)return null;
  const parts=sku.split('-');
  for(const p of parts){
    if(SIZE_MAP[p])return{kode:p,label:SIZE_MAP[p]};
  }
  return null;
}
// cari SKU yang cocok untuk tipe + kode ukuran tertentu
function findSKUForSet(tipe, sizeKode){
  return S.products.filter(p=>{
    const t=parseSKUTipe(p.sku);
    const s=parseSKUSize(p.sku);
    return t===tipe && s && s.kode===sizeKode;
  });
}
// hitung semua ukuran yang tersedia di produk
function availableSizes(){
  const sizes={};
  S.products.forEach(p=>{
    const s=parseSKUSize(p.sku);
    if(s)sizes[s.kode]=s.label;
  });
  return Object.entries(sizes).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
}

const BRANDS=['Sellery','Ranger Germany','Castrix','Blickle','Prohex','Crossman','King Tony','Elora','Truecraft','Force','Jason','Kondo','KTC','Matsu','Tekiro','Kukko','Toyoda','Zeki','ETC'];
const CURRENCIES=['IDR','RMB','USD'];
const PAY_METHODS=['Cash','Transfer Bank','QRIS','EDC'];
const EXPENSE_CATS=['Biaya Kirim','Biaya Operasional','Biaya Pemasaran','Biaya Lain-lain'];
const MO=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const KEY='hwtools-v21';
const fmt=n=>new Intl.NumberFormat('id-ID').format(Math.round(n||0));
const fmt2=n=>new Intl.NumberFormat('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const rp=n=>'Rp '+fmt(n);
const cur=(n,c)=>(c||'IDR')+' '+fmt2(n);
const pct=n=>((n||0)*100).toFixed(1)+'%';
const fd=d=>d?new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}):'';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const today=()=>new Date().toISOString().slice(0,10);

let S={
  page:'dashboard',modal:null,
  products:[],purchases:[],sales:[],
  suppliers:[],customers:[],expenses:[],returns:[],purchaseOrders:[],
  stockConversions:[],
  locations:[],deliveryOrders:[],setTemplates:[],
  filterLoc:'',setMode:false,settingsTab:'lokasi',
  fb:'',fp:'monthly',fy:new Date().getFullYear(),fm:new Date().getMonth(),q:'',
  sortBy:'brand',sortDir:'asc',
  txSort:'tgl',txDir:'desc',txMonth:-1,txYear:new Date().getFullYear(),
  imp:null,
};

function load(){
  try{const d=localStorage.getItem(KEY);if(d){const p=JSON.parse(d);
    ['products','purchases','sales','suppliers','customers','expenses','returns','purchaseOrders','stockConversions','locations','deliveryOrders','setTemplates'].forEach(k=>{if(p[k])S[k]=p[k];});
  }}catch(e){}
  // migrasi dari v2 lama jika ada
  try{const old=localStorage.getItem('hwtools-v2');if(old&&!S.products.length){const p=JSON.parse(old);
    if(p.products)S.products=p.products;
    if(p.stockIn)S.purchases=p.stockIn.map(x=>({...x,curr:'IDR',rate:1}));
    if(p.stockOut)S.sales=p.stockOut.map(x=>({...x,ongkir:0}));
    if(p.suppliers)S.suppliers=p.suppliers;
    if(p.customers)S.customers=p.customers;
    if(p.expenses)S.expenses=p.expenses;
    if(p.returns)S.returns=p.returns;
  }}catch(e){}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify({products:S.products,purchases:S.purchases,sales:S.sales,suppliers:S.suppliers,customers:S.customers,expenses:S.expenses,returns:S.returns,purchaseOrders:S.purchaseOrders,stockConversions:S.stockConversions,locations:S.locations,deliveryOrders:S.deliveryOrders,setTemplates:S.setTemplates}));}catch(e){}
}
// ─── TRANSACTION FILTER HELPERS ───────────────────────────────────
function txFilterBar(placeholder){
  const yr=S.txYear, mo=S.txMonth, ts=S.txSort, td=S.txDir;
  const yrs=[...new Set([...S.purchases,...S.sales,...S.expenses,...S.returns,...S.stockConversions].map(x=>new Date(x.tgl).getFullYear()).filter(Boolean))];
  if(!yrs.includes(yr))yrs.push(yr);yrs.sort((a,b)=>b-a);
  return`<div class="fb" style="flex-wrap:wrap">
    <input id="iQ" placeholder="${placeholder}" value="${S.q}" style="min-width:180px">
    <select id="sTxYear"><option value="-1">Semua Tahun</option>${yrs.map(y=>`<option value="${y}" ${yr==y?'selected':''}>${y}</option>`).join('')}</select>
    <select id="sTxMonth"><option value="-1">Semua Bulan</option>${MO.map((mm,i)=>`<option value="${i}" ${mo==i?'selected':''}>${mm}</option>`).join('')}</select>
    <select id="sTxSort" style="min-width:150px">
      <option value="tgl" ${ts==='tgl'?'selected':''}>Tanggal</option>
      <option value="inv" ${ts==='inv'?'selected':''}>No. Invoice</option>
      <option value="total" ${ts==='total'?'selected':''}>Nilai</option>
    </select>
    <button class="btn btn-sm" id="sTxDir">${td==='asc'?'↑ Lama-Baru':'↓ Baru-Lama'}</button>
  </div>`;
}
function txFilter(arr, getDateVal, getSortVal){
  let fl=[...arr];
  // filter tahun/bulan
  if(S.txYear>=0){fl=fl.filter(x=>{const d=new Date(getDateVal(x));return d.getFullYear()==S.txYear;});}
  if(S.txMonth>=0){fl=fl.filter(x=>{const d=new Date(getDateVal(x));return d.getMonth()==S.txMonth;});}
  // filter text
  if(S.q){const q=S.q.toLowerCase();fl=fl.filter(x=>{const sv=getSortVal?String(getSortVal(x,true)||'').toLowerCase():'';return sv.includes(q);});}
  // sort
  fl.sort((a,b)=>{
    let va,vb;
    if(S.txSort==='tgl'){va=new Date(getDateVal(a));vb=new Date(getDateVal(b));}
    else if(S.txSort==='total'&&getSortVal){va=getSortVal(a);vb=getSortVal(b);}
    else{va=getDateVal(a);vb=getDateVal(b);}
    return S.txDir==='asc'?va-vb:vb-va;
  });
  return fl;
}

function toast(msg,ok=true){const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.background=ok?'#1C2333':'#A32D2D';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// ═══ COMPUTED ═══
function stats(sku, locId){
  // locId=undefined/null = total semua lokasi
  const p=S.products.find(x=>x.sku===sku);if(!p)return{stokBagus:0,stokKaratan:0,avg:0};
  const byLoc=locId!=null;
  // stok awal per lokasi atau total
  let sbAwal,skAwal;
  if(byLoc){
    const la=(p.stokAwal||[]).find(x=>x.locId===locId);
    sbAwal=la?la.sbAwal:0; skAwal=la?la.skAwal:0;
  }else{
    // total: stokAwal array + legacy p.sb
    sbAwal=(p.stokAwal&&p.stokAwal.length)
      ?(p.stokAwal||[]).reduce((a,x)=>a+x.sbAwal,0)
      :(p.sb||0);
    skAwal=(p.stokAwal&&p.stokAwal.length)
      ?(p.stokAwal||[]).reduce((a,x)=>a+x.skAwal,0)
      :(p.sk||0);
  }
  const locF=arr=>byLoc?arr.filter(x=>x.locId===locId):arr;
  const tIn=locF(S.purchases).reduce((a,inv)=>a+(inv.items||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  const tOut=locF(S.sales).reduce((a,inv)=>a+(inv.items||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  const retF=arr=>byLoc?arr.filter(x=>x.locId===locId):arr;
  const tRetIn=retF(S.returns).filter(x=>x.stokMasuk&&x.sku===sku&&(x.jenisRetur||'penjualan')==='penjualan').reduce((a,x)=>a+x.qty,0);
  const tRetOut=retF(S.returns).filter(x=>x.stokMasuk&&x.sku===sku&&x.jenisRetur==='pembelian').reduce((a,x)=>a+x.qty,0);
  const convF=arr=>byLoc?arr.filter(x=>x.locId===locId):arr;
  const tConvIn=convF(S.stockConversions).reduce((a,c)=>a+(c.masuk||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  const tConvOut=convF(S.stockConversions).reduce((a,c)=>a+(c.keluar||[]).filter(x=>x.sku===sku).reduce((b,x)=>b+x.qty,0),0);
  // DO: confirmed DO menyebabkan stok bergerak antar lokasi
  let tDOIn=0,tDOOut=0;
  S.deliveryOrders.filter(x=>x.status==='confirmed').forEach(d=>{
    const items=(d.items||[]).filter(x=>x.sku===sku);
    if(!byLoc){return;} // total tidak terpengaruh DO (stok hanya pindah)
    if(d.fromLocId===locId)tDOOut+=items.reduce((a,x)=>a+x.qty,0);
    if(d.toLocId===locId)tDOIn+=items.reduce((a,x)=>a+x.qty,0);
  });
  const stokBagus=sbAwal+tIn-tOut+tRetIn-tRetOut+tConvIn-tConvOut+tDOIn-tDOOut;
  // avg modal: pakai semua pembelian (tidak per lokasi, karena HPP global)
  let q=(p.stokAwal&&p.stokAwal.length)?p.stokAwal.reduce((a,x)=>a+x.sbAwal,0):(p.sb||0);
  let v=(p.m||0)*q;
  S.purchases.forEach(inv=>(inv.items||[]).filter(x=>x.sku===sku).forEach(x=>{q+=x.qty;v+=(x.hnIDR||x.hn||0)*x.qty;}));
  return{stokBagus,stokKaratan:byLoc?skAwal:(p.stokAwal&&p.stokAwal.length?p.stokAwal.reduce((a,x)=>a+x.skAwal,0):p.sk||0),avg:q>0?v/q:p.m||0};
}
// helper: nama lokasi
function locNama(id){const l=S.locations.find(x=>x.id===id);return l?l.nama:'?';}
// helper: filter bar lokasi
function locFilterBar(){
  if(!S.locations.length)return'';
  return`<select id="sFilterLoc" style="min-width:160px"><option value="">Semua Lokasi</option>${S.locations.map(l=>`<option value="${l.id}" ${S.filterLoc===l.id?'selected':''}>${l.nama}</option>`).join('')}</select>`;
}
function nilaiTotal(locId){return S.products.reduce((a,p)=>{const s=stats(p.sku,locId||undefined);return a+s.stokBagus*s.avg;},0);}
// laba per invoice penjualan
function returnsForSale(saleId){
  return S.returns.filter(x=>(x.jenisRetur||'penjualan')==='penjualan'&&x.refSaleId===saleId).reduce((a,x)=>a+(x.nilaiRetur||0),0);
}
function returnsForPurchase(buyId){
  return S.returns.filter(x=>x.jenisRetur==='pembelian'&&x.refBuyId===buyId).reduce((a,x)=>a+(x.nilaiRetur||0),0);
}
function saleProfit(sale){
  const hppTotal=(sale.items||[]).reduce((a,i)=>a+(i.hpp||0)*i.qty,0);
  const gross=(sale.items||[]).reduce((a,i)=>a+i.total,0);
  const fee=sale.fee||0, ongkir=sale.ongkir||0;
  const retur=returnsForSale(sale.id);
  const neto=gross-fee-retur;
  // PPN tax-inclusive: sudah termasuk dalam harga jual
  // ppn = neto * rate / (1 + rate), bukan neto * rate
  const ppnAktif=sale.ppnOn===true||sale.ppnOn==='yes';
  const ppnRate=(sale.ppnPct||11)/100;
  const ppn=ppnAktif?Math.round(neto*ppnRate/(1+ppnRate)):0;
  const netoSebelumPPN=ppnAktif?neto-ppn:neto;
  const labaKotor=neto-hppTotal-ongkir;
  return{gross,fee,ongkir,retur,neto,ppn,ppnAktif,netoSebelumPPN,hppTotal,labaKotor,margin:neto>0?labaKotor/neto:0};
}
function saleNeto(sale){return saleProfit(sale).neto;}
function metricsPenjualan(period,yr,mo){
  let outs=[...S.sales];
  const inP=d=>{const dt=new Date(d);
    if(period==='monthly')return dt.getFullYear()===yr&&dt.getMonth()===mo;
    if(period==='quarterly')return dt.getFullYear()===yr&&Math.floor(dt.getMonth()/3)===Math.floor(mo/3);
    if(period==='semesterly')return dt.getFullYear()===yr&&(dt.getMonth()<6?0:1)===(mo<6?0:1);
    return dt.getFullYear()===yr;
  };
  outs=outs.filter(x=>inP(x.tgl));
  let omz=0,hpp=0,laba=0;
  outs.forEach(s=>{const pr=saleProfit(s);omz+=pr.neto;hpp+=pr.hppTotal;laba+=pr.labaKotor;});
  return{omz,hpp,laba,mp:omz>0?laba/omz:0,trx:outs.length};
}
function getPiutangTotal(){
  return S.sales.reduce((a,x)=>{
    const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);
    const sisa=saleNeto(x)-paid;
    return a+(sisa>0?sisa:0);
  },0);
}
function getCustomerPiutang(cid){
  return S.sales.filter(x=>x.custId===cid).reduce((a,x)=>{
    const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);
    const sisa=saleNeto(x)-paid;
    return a+(sisa>0?sisa:0);
  },0);
}
function getUtangTotal(){
  const buyUtang=S.purchases.filter(x=>x.payStatus!=='paid').reduce((a,x)=>{
    const totalIDR=(x.items||[]).reduce((b,i)=>b+(i.totalIDR||i.total||0),0);
    const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);
    return a+(totalIDR-paid);
  },0);
  const expUtang=S.expenses.filter(x=>x.payStatus==='belum').reduce((a,x)=>a+x.jumlah,0);
  return buyUtang+expUtang;
}
function purchaseTotalIDR(p){return (p.items||[]).reduce((a,i)=>a+(i.totalIDR||i.total||0),0)-returnsForPurchase(p.id);}
function danaTertahanTotal(){
  return S.sales.filter(x=>x.ch==='Online'&&x.danaStatus==='tertahan').reduce((a,x)=>a+saleNeto(x),0);
}

function getReminders(){
  const now=new Date();now.setHours(0,0,0,0);
  const items=[];
  // piutang customer dengan jatuh tempo
  S.sales.filter(x=>x.payTerm==='credit'&&x.jatuhTempo).forEach(x=>{
    const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const sisa=saleNeto(x)-paid;
    if(sisa<=0)return;
    const jt=new Date(x.jatuhTempo);jt.setHours(0,0,0,0);
    const days=Math.round((jt-now)/86400000);
    const c=S.customers.find(cc=>cc.id===x.custId);
    items.push({jenis:'Piutang',pihak:c?c.nama:'(Customer)',inv:x.inv||'—',tgl:x.jatuhTempo,sisa,days,refId:x.id,refType:'sale'});
  });
  // hutang biaya dengan jatuh tempo
  S.expenses.filter(x=>x.payStatus==='belum'&&x.jatuhTempo).forEach(x=>{
    const jt=new Date(x.jatuhTempo);jt.setHours(0,0,0,0);
    const days=Math.round((jt-now)/86400000);
    const s=S.suppliers.find(ss=>ss.id===x.supId);
    items.push({jenis:'Hutang Biaya',pihak:s?s.nama:'(Supplier)',inv:x.invNo||'—',tgl:x.jatuhTempo,sisa:x.jumlah,days,refId:x.id,refType:'exp'});
  });
  return items.sort((a,b)=>a.days-b.days);
}

  const sb=S.sortBy||'brand',sd=S.sortDir||'asc';
  fl=[...fl].sort((a,b)=>{
    let va,vb;
    if(sb==='sku'){va=a.sku;vb=b.sku;}

    else if(sb==='brand'){va=a.brand;vb=b.brand;}

function pgKonversi(){
  const base=txFilter(S.stockConversions,x=>x.tgl,x=>x.catatan||'');
  const fl=base.filter(c=>{
    if(!S.q)return true;
    const q=S.q.toLowerCase();
    return c.catatan?.toLowerCase().includes(q)||
      (c.keluar||[]).some(x=>x.sku.toLowerCase().includes(q))||
      (c.masuk||[]).some(x=>x.sku.toLowerCase().includes(q));
  });
  // ringkasan: total konversi & SKU yang paling sering dikonversi
  const skuCount={};
  S.stockConversions.forEach(c=>{
    [...(c.keluar||[]),...(c.masuk||[])].forEach(x=>{skuCount[x.sku]=(skuCount[x.sku]||0)+x.qty;});
  });

  <div class="tw" style="border:none;padding:0"><table><thead><tr><th>Produk</th><th>SKU</th>${S.locations.map(l=>`<th class="rt">${l.nama}</th>`).join('')}<th class="rt">Total</th></tr></thead><tbody>

function pgPiutang(){

  const tot=out.reduce((a,x)=>{const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);return a+(saleNeto(x)-paid);},0);
  return`
  <div class="mg">
    <div class="met"><div class="ml">Total Piutang</div><div class="mv r">${rp(tot)}</div><div class="ms">${out.length} invoice</div></div>
    <div class="met"><div class="ml">Customer dengan Piutang</div><div class="mv">${[...new Set(out.map(x=>x.custId).filter(Boolean))].length}</div></div>
  </div>

  ${!out.length?`<tr><td colspan="9"><div class="empty"><i class="ti ti-circle-check"></i><p>Tidak ada piutang outstanding</p></div></td></tr>`:

    const neto=saleNeto(x),sisa=neto-paid;

      <td class="rt">${rp(neto)}</td><td class="rt g">${rp(paid)}</td>
      <td class="rt r"><strong>${rp(sisa)}</strong></td>
      <td><button class="btn btn-ic btn-sm btn-ok" data-paysell="${x.id}"><i class="ti ti-cash"></i></button></td></tr>`;
  }).join('')}
  </tbody></table></div>`;
}

// ═══ UTANG ═══
function pgUtang(){
  // hutang dari pembelian
  const buyOut=S.purchases.filter(x=>{if(x.payStatus==='paid')return false;const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);return paid<purchaseTotalIDR(x);});
  // hutang dari biaya yang belum lunas
  const expOut=S.expenses.filter(x=>x.payStatus==='belum');
  const totBuy=buyOut.reduce((a,x)=>{const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);return a+(purchaseTotalIDR(x)-paid);},0);
  const totExp=expOut.reduce((a,x)=>a+x.jumlah,0);
  const tot=totBuy+totExp;
  // rollup per supplier
  const supRollup={};
  buyOut.forEach(x=>{const paid=(x.payments||[]).reduce((b,p)=>b+(p.amountIDR||p.amount),0);const sisa=purchaseTotalIDR(x)-paid;
    const key=x.supId||'_none';if(!supRollup[key])supRollup[key]={count:0,total:0};supRollup[key].count++;supRollup[key].total+=sisa;});
  expOut.forEach(x=>{const key=x.supId||'_none';if(!supRollup[key])supRollup[key]={count:0,total:0};supRollup[key].count++;supRollup[key].total+=x.jumlah;});
  // sort hutang pembelian
  const sortU=S.sortBy||'tgl',sortD=S.sortDir||'desc';
  const sortedBuyOut=[...buyOut].sort((a,b)=>{
    const sa=S.suppliers.find(s=>s.id===a.supId),sb2=S.suppliers.find(s=>s.id===b.supId);
    const paidA=(a.payments||[]).reduce((x,p)=>x+(p.amountIDR||p.amount),0);
    const paidB=(b.payments||[]).reduce((x,p)=>x+(p.amountIDR||p.amount),0);
    const sisaA=purchaseTotalIDR(a)-paidA,sisaB=purchaseTotalIDR(b)-paidB;
    let va,vb;
    if(sortU==='supplier'){va=sa?sa.nama:'';vb=sb2?sb2.nama:'';}
    else if(sortU==='nilai'){va=sisaA;vb=sisaB;}
    else if(sortU==='status'){va=a.payStatus;vb=b.payStatus;}
    else if(sortU==='curr'){va=a.curr;vb=b.curr;}
    else{va=new Date(a.tgl);vb=new Date(b.tgl);}
    if(typeof va==='string')return sortD==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return sortD==='asc'?va-vb:vb-va;
  });
  return`
  <div class="mg">
    <div class="met"><div class="ml">Total Hutang Supplier</div><div class="mv r">${rp(tot)}</div><div class="ms">${buyOut.length+expOut.length} tagihan</div></div>
    <div class="met"><div class="ml">Hutang Pembelian</div><div class="mv r">${rp(totBuy)}</div><div class="ms">${buyOut.length} invoice</div></div>
    <div class="met"><div class="ml">Hutang Biaya</div><div class="mv r">${rp(totExp)}</div><div class="ms">${expOut.length} biaya belum lunas</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 16px;border-bottom:1px solid var(--bd);background:#FAFBFC"><strong style="font-size:12px">REKAP PER SUPPLIER — Total Invoice Belum Dibayar</strong></div>
    <div class="tw" style="border:none;border-radius:0"><table><thead><tr><th>Supplier</th><th class="rt">Jumlah Tagihan</th><th class="rt">Total Belum Dibayar</th></tr></thead><tbody>
    ${Object.keys(supRollup).length===0?`<tr><td colspan="3"><div class="empty" style="padding:20px"><p>Tidak ada hutang</p></div></td></tr>`:
    Object.entries(supRollup).sort((a,b)=>b[1].total-a[1].total).map(([k,v])=>{
      const s=S.suppliers.find(ss=>ss.id===k);
      return`<tr><td><strong>${s?s.nama:'(Tanpa Supplier)'}</strong></td><td class="rt">${v.count} tagihan</td><td class="rt r"><strong>${rp(v.total)}</strong></td></tr>`;
    }).join('')}
    </tbody></table></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:10px 16px;border-bottom:1px solid var(--bd);background:#FAFBFC;display:flex;justify-content:space-between;align-items:center">
      <strong style="font-size:12px">RINCIAN HUTANG PEMBELIAN</strong>
      <div style="display:flex;gap:8px">
        <select id="sSort" style="font-size:11px;padding:4px 8px">
          ${[['tgl','Tanggal'],['supplier','Supplier'],['nilai','Nilai Sisa'],['status','Status'],['curr','Mata Uang']].map(([v,l])=>`<option value="${v}" ${sortU===v?'selected':''}>${l}</option>`).join('')}
        </select>
        <button class="btn btn-sm" id="sSortDir">${sortD==='asc'?'↑':'↓'}</button>
      </div>
    </div>
    <div class="tw" style="border:none;border-radius:0"><table><thead><tr><th>Tanggal</th><th>Invoice</th><th>Supplier</th><th>Mata Uang</th><th class="rt">Nilai (IDR)</th><th class="rt">Dibayar</th><th class="rt">Sisa</th><th>Status</th><th></th></tr></thead><tbody>

// ═══ BIAYA ═══
function pgBiaya(){
  const base=txFilter(S.expenses,x=>x.tgl,x=>x.deskripsi||'');
  const fl=base.filter(x=>!S.q||x.deskripsi?.toLowerCase().includes(S.q.toLowerCase())||x.cat?.toLowerCase().includes(S.q.toLowerCase()));
  const total=fl.reduce((a,x)=>a+x.jumlah,0);
  return txFilterBar('Cari kategori / deskripsi...')+`
  <div class="met" style="margin-bottom:14px"><div class="ml">Total Biaya (Semua)</div><div class="mv r">${rp(total)}</div></div>
  <div class="tw"><table><thead><tr><th>Tanggal</th><th>Kategori</th><th>Deskripsi</th><th>No. Invoice</th><th>Status</th><th>Kaitan Transaksi</th><th class="rt">Jumlah</th><th></th></tr></thead><tbody>

          <span>Progress Pelunasan</span><span>${pct100}%</span>
        </div>
        <div class="pb" style="height:8px"><div class="pbf" style="width:${pct100}%;background:${pct100>=100?'var(--ok)':'var(--acc)'}"></div></div>
      </div>
      ${sisa<=0?`<div style="padding:12px;background:var(--okl);border-radius:8px;color:var(--ok);font-weight:600;text-align:center;margin-bottom:14px"><i class="ti ti-circle-check"></i> Invoice ini sudah LUNAS</div>`:`
      <div class="divider"></div>
      <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px">TAMBAH CICILAN / PEMBAYARAN</div>
      <div class="fr c2">
        <div><label>Tanggal Bayar</label><input id="fTg" type="date" value="${today()}"></div>
        <div><label>Metode Pembayaran</label><select id="fMet">${PAY_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
      </div>
      <div class="fr c2">
        <div><label>Jumlah Bayar (Rp) <span class="tm">— bisa sebagian</span></label><input id="fAmt" type="number" value="${sisa}" min="0"></div>
        <div><label>Catatan (Opsional)</label><input id="fNote" placeholder="Cicilan ke-${(inv.payments?.length||0)+1}..."></div>
      </div>
      <div style="padding:10px;background:var(--accl);border-radius:7px;font-size:12px">
        Sisa setelah pembayaran ini: <strong id="sisaAfter">${rp(sisa)}</strong>
      </div>`}
      ${(inv.payments||[]).length?`<div class="divider"></div>
      <div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">RIWAYAT CICILAN</div>
      <table><thead><tr><th>#</th><th>Tanggal</th><th>Metode</th><th class="rt">Jumlah</th><th>Catatan</th><th></th></tr></thead><tbody>
      ${inv.payments.map((p,i)=>`<tr><td class="tm">${i+1}</td><td>${fd(p.tgl)}</td><td>${p.met}</td><td class="rt g">${rp(p.amountIDR||p.amount)}</td><td>${p.note||'—'}</td><td><button class="btn btn-ic btn-sm" data-editpay="${p.id}" data-saleId="${inv.id}"><i class="ti ti-edit"></i></button> <button class="btn btn-ic btn-sm btn-d" data-delpay="${p.id}" data-saleId="${inv.id}"><i class="ti ti-trash"></i></button></td></tr>`).join('')}
      </tbody></table>`:''}
    </div>
    <div class="mf"><button class="btn" id="bCl2">${sisa<=0?'Tutup':'Batal'}</button>${sisa>0?`<button class="btn btn-p" id="bSvPaySell" data-id="${d.id}">Simpan Pembayaran</button>`:''}</div>
  </div></div>`;
  }

  // PAYMENT SUPPLIER (purchase) — multi currency
  if(type==='payBuy'){
    const inv=S.purchases.find(x=>x.id===d.id)||{};
    const paid=(inv.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const tIDR=purchaseTotalIDR(inv),sisa=tIDR-paid;
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>Catat Pembayaran ke Supplier</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Invoice <strong>${inv.inv||'—'}</strong> · Total: <strong>${rp(tIDR)}</strong> · Dibayar: <strong class="g">${rp(paid)}</strong> · Sisa: <strong class="r">${rp(sisa)}</strong></div>
      <div class="fr c2">
        <div><label>Tanggal Bayar</label><input id="fTg" type="date" value="${today()}"></div>
        <div><label>Metode Pembayaran</label><select id="fMet">${PAY_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
      </div>
      <div class="fr c3">
        <div><label>Mata Uang</label><select id="fCurr">${CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
        <div><label>Rate ke IDR</label><input id="fRate" type="number" value="1" min="0" step="0.01"></div>
        <div><label>Jumlah Bayar <span class="tm">(default: sisa tagihan)</span></label><input id="fAmt" type="number" value="${sisa}" min="0"></div>
      </div>
      <div class="sb"><div class="row"><span>Jumlah dalam IDR (estimasi jika bayar selain IDR)</span><strong id="payBuyIDR">${rp(sisa)}</strong></div></div>
      <div class="fr" style="margin-top:10px"><label>Catatan (Opsional)</label><input id="fNote" placeholder="Catatan..."></div>
      ${(inv.payments||[]).length?`<div class="divider"></div><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">RIWAYAT PEMBAYARAN</div>
      <table><thead><tr><th>Tanggal</th><th>Metode</th><th>Mata Uang</th><th class="rt">Jumlah</th><th class="rt">IDR</th></tr></thead><tbody>
      ${inv.payments.map(p=>`<tr><td>${fd(p.tgl)}</td><td>${p.met}</td><td>${p.curr||'IDR'}</td><td class="rt">${cur(p.amount,p.curr)}</td><td class="rt g">${rp(p.amountIDR||p.amount)}</td></tr>`).join('')}
      </tbody></table>`:''}
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvPayBuy" data-id="${d.id}">Simpan Pembayaran</button></div>
  </div></div>`;
  }

  // SUPPLIER
  if(type==='sup')return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${d.id?'Edit Supplier':'Tambah Supplier'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Nama Supplier *</label><input id="fNm" value="${esc(d.nama||'')} " placeholder="Nama perusahaan"></div>
      <div><label>PIC (Opsional)</label><input id="fPic" value="${esc(d.pic||'')} "></div></div>
      <div class="fr c2"><div><label>No. Telp (Opsional)</label><input id="fTelp" value="${esc(d.telp||'')} "></div>
      <div><label>Email (Opsional)</label><input id="fEmail" value="${esc(d.email||'')} "></div></div>
      <div class="fr"><label>Alamat (Opsional)</label><textarea id="fAlamat" rows="2">${esc(d.alamat||'')} </textarea></div>
      <div class="fr c2"><div><label>NPWP (Opsional)</label><input id="fNpwp" value="${esc(d.npwp||'')} "></div>
      <div><label>Catatan (Opsional)</label><input id="fNote" value="${esc(d.note||'')} "></div></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvSup" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;

  // CUSTOMER
  if(type==='cust')return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${d.id?'Edit Customer':'Tambah Customer'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Nama Customer *</label><input id="fNm" value="${esc(d.nama||'')} "></div>
      <div><label>Tipe</label><select id="fTipe"><option value="Retail" ${d.tipe==='Retail'?'selected':''}>Retail</option><option value="Corporate" ${d.tipe==='Corporate'?'selected':''}>Corporate</option><option value="Reseller" ${d.tipe==='Reseller'?'selected':''}>Reseller</option></select></div></div>
      <div class="fr c2"><div><label>PIC (Opsional)</label><input id="fPic" value="${esc(d.pic||'')} "></div>
      <div><label>No. Telp (Opsional)</label><input id="fTelp" value="${esc(d.telp||'')} "></div></div>
      <div class="fr c2"><div><label>Email (Opsional)</label><input id="fEmail" value="${esc(d.email||'')} "></div>
      <div><label>NPWP (Opsional)</label><input id="fNpwp" value="${esc(d.npwp||'')} "></div></div>
      <div class="fr"><label>Alamat (Opsional)</label><textarea id="fAlamat" rows="2">${esc(d.alamat||'')} </textarea></div>
      <div class="fr"><label>Catatan (Opsional)</label><input id="fNote" value="${esc(d.note||'')} "></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvCust" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;

  // BIAYA
  if(type==='exp'){
    const isEdit=!!d.id;
    const supOpts=S.suppliers.map(s=>`<option value="${s.id}" ${d.supId===s.id?'selected':''}>${s.nama}</option>`).join('');
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${isEdit?'Edit Biaya':'Catat Biaya'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
      <div><label>Kategori</label><select id="fCat">${EXPENSE_CATS.map(c=>`<option value="${c}" ${d.cat===c?'selected':''}>${c}</option>`).join('')}</select></div></div>
      <div class="fr"><label>Deskripsi</label><input id="fDesc" value="${esc(d.deskripsi||'')} " placeholder="Keterangan biaya..."></div>
      <div class="fr c2"><div><label>Jumlah (Rp)</label><input id="fJml" type="number" value="${d.jumlah||0}" min="0"></div>
      <div><label>Supplier / Vendor (Opsional)</label><select id="fSupExp"><option value="">— Tidak ada —</option>${supOpts}</select></div></div>
      <div class="fr c2"><div><label>No. Invoice / Nota (Opsional)</label><input id="fInvNo" value="${esc(d.invNo||'')} " placeholder="INV-XXX / Nota-XXX"></div>
      <div><label>Status Pembayaran</label><select id="fPayStatus">
        <option value="lunas" ${d.payStatus!=='belum'?'selected':''}>Lunas</option>
        <option value="belum" ${d.payStatus==='belum'?'selected':''}>Belum Dibayar (jadi Hutang Supplier)</option>
      </select></div></div>
      <div class="fr c2"><div><label>Tgl Jatuh Tempo (jika belum lunas, opsional)</label><input id="fJtExp" type="date" value="${d.jatuhTempo||''}"></div>
      <div><label>Kaitkan ke Invoice Transaksi (Opsional)</label><select id="fInvRef"><option value="">— Tidak —</option>${[...S.purchases.map(x=>x.inv),...S.sales.map(x=>x.inv)].filter(Boolean).map(i=>`<option value="${i}" ${d.invRef===i?'selected':''}>${i}</option>`).join('')}</select></div></div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvExp" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;
  }

  // RETUR
  if(type==='ret'){
    const isEdit=!!d.id;
    const jenisRetur=d.jenisRetur||'penjualan';
    const skuOpts=S.products.map(p=>`<option value="${p.sku}" ${d.sku===p.sku?'selected':''}>${p.sku} — ${p.nama}</option>`).join('');
    const saleOpts=S.sales.filter(x=>x.inv).map(x=>{const c=S.customers.find(cc=>cc.id===x.custId);return`<option value="${x.id}" ${d.refSaleId===x.id?'selected':''}>${x.inv} — ${c?c.nama:'(tanpa customer)'} — ${fd(x.tgl)}</option>`;}).join('');
    const buyOpts=S.purchases.filter(x=>x.inv).map(x=>{const s=S.suppliers.find(ss=>ss.id===x.supId);return`<option value="${x.id}" ${d.refBuyId===x.id?'selected':''}>${x.inv} — ${s?s.nama:'(tanpa supplier)'} — ${fd(x.tgl)}</option>`;}).join('');
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>${isEdit?'Edit Retur':'Catat Retur'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c2"><div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
      <div><label>Jenis Retur</label><select id="fJenis">
        <option value="penjualan" ${jenisRetur==='penjualan'?'selected':''}>Retur Penjualan (customer kembalikan)</option>
        <option value="pembelian" ${jenisRetur==='pembelian'?'selected':''}>Retur Pembelian (kembalikan ke supplier)</option>
      </select></div></div>
      <div class="fr" id="refSaleRow" style="${jenisRetur==='penjualan'?'':'display:none'}">
        <label>Pilih Invoice Penjualan</label>
        <select id="fRefSale"><option value="">— Pilih Invoice Penjualan —</option>${saleOpts}</select></div>
      <div class="fr" id="refBuyRow" style="${jenisRetur==='pembelian'?'':'display:none'}">
        <label>Pilih Invoice Pembelian</label>
        <select id="fRefBuy"><option value="">— Pilih Invoice Pembelian —</option>${buyOpts}</select></div>
      <div class="fr c2"><div><label>SKU Produk</label><select id="fSkRet"><option value="">— Pilih —</option>${skuOpts}</select></div>
      <div><label>Qty Retur</label><input id="fQt" type="number" value="${d.qty||1}" min="1"></div></div>
      <div class="fr c2"><div><label>Nilai Retur (Rp) — dipotong dari invoice terkait</label><input id="fNilai" type="number" value="${d.nilaiRetur||0}" min="0"></div>
      <div><label>Alasan Retur</label><input id="fAlasan" value="${esc(d.alasan||'')} " placeholder="Barang rusak / salah kirim"></div></div>
      <div style="display:flex;align-items:center;gap:8px;padding:10px;background:#F5F6FA;border-radius:7px">
        <input type="checkbox" id="fStokMasuk" ${d.stokMasuk?'checked':''}><label for="fStokMasuk" style="margin:0;cursor:pointer">Konfirmasi pergerakan stok sekarang</label>
      </div>
      <div class="tm" style="font-size:11px;margin-top:6px">Retur penjualan dikonfirmasi → stok kembali masuk gudang &amp; nilai dipotong dari piutang/omzet. Retur pembelian dikonfirmasi → stok keluar gudang &amp; nilai dipotong dari hutang.</div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvRet" data-id="${d.id||''}">Simpan</button></div>
  </div></div>`;
  }

  // DRILL-DOWN LABA RUGI
  if(type==='lrDetail'){
    const {lrKey,fp,fy,fm}=d;
    const inP=dt2=>{const dt=new Date(dt2);
      if(fp==='monthly')return dt.getFullYear()===fy&&dt.getMonth()===fm;
      if(fp==='quarterly')return dt.getFullYear()===fy&&Math.floor(dt.getMonth()/3)===Math.floor(fm/3);
      if(fp==='semesterly')return dt.getFullYear()===fy&&(dt.getMonth()<6?0:1)===(fm<6?0:1);
      return dt.getFullYear()===fy;
    };
    let judul='',rows='',total=0,headCols='';
    if(lrKey==='omzet'){
      judul='Rincian Pendapatan Penjualan (Neto)';
      headCols='<th>Tanggal</th><th>Invoice</th><th>Customer</th><th>Channel</th><th class="rt">Neto</th>';
      const salesP=S.sales.filter(x=>inP(x.tgl));
      rows=salesP.map(s=>{const c=S.customers.find(cc=>cc.id===s.custId);const n=saleNeto(s);total+=n;
        return`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip" data-viewsale="${s.id}" style="cursor:pointer;color:var(--acc)" title="Lihat detail invoice">${s.inv||'—'} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td>${c?c.nama:'—'}</td><td>${s.ch||'—'}</td><td class="rt">${rp(n)}</td></tr>`;}).join('');
      if(!salesP.length)rows=`<tr><td colspan="5"><div class="empty" style="padding:20px"><p>Tidak ada penjualan periode ini</p></div></td></tr>`;
    }else if(lrKey==='hpp'){
      judul='Rincian Harga Pokok Penjualan (HPP)';
      headCols='<th>Tanggal</th><th>Invoice</th><th>SKU</th><th class="rt">Qty</th><th class="rt">HPP/unit</th><th class="rt">Total HPP</th>';
      const salesP=S.sales.filter(x=>inP(x.tgl));
      const arr=[];
      salesP.forEach(s=>(s.items||[]).forEach(i=>{const t=(i.hpp||0)*i.qty;total+=t;
        arr.push(`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip" data-viewsale="${s.id}" style="cursor:pointer;color:var(--acc)" title="Lihat detail invoice">${s.inv||'—'} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td><span class="chip">${i.sku}</span></td><td class="rt">${fmt(i.qty)}</td><td class="rt">${rp(i.hpp||0)}</td><td class="rt">${rp(t)}</td></tr>`);}));
      rows=arr.join('')||`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Tidak ada data HPP periode ini</p></div></td></tr>`;
    }else if(lrKey.startsWith('exp:')){
      const cat=lrKey.slice(4);
      judul='Rincian Biaya — '+cat;
      headCols='<th>Tanggal</th><th>No. Invoice/Nota</th><th>Supplier</th><th>Deskripsi</th><th>Status</th><th class="rt">Jumlah</th>';
      const expP=S.expenses.filter(x=>inP(x.tgl)&&x.cat===cat);
      rows=expP.map(x=>{const s=S.suppliers.find(ss=>ss.id===x.supId);total+=x.jumlah;
        return`<tr><td class="nw">${fd(x.tgl)}</td><td>${x.invNo?`<span class="chip">${x.invNo}</span>`:'—'}</td><td>${s?s.nama:'—'}</td><td>${x.deskripsi||'—'}</td><td><span class="pay-badge ${x.payStatus==='belum'?'outstanding':'paid'}">${x.payStatus==='belum'?'Belum':'Lunas'}</span></td><td class="rt">${rp(x.jumlah)}</td></tr>`;}).join('');
      if(!expP.length)rows=`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Tidak ada biaya ${cat} periode ini</p></div></td></tr>`;
    }
    const colspan=headCols.split('<th').length-1;
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Periode: <strong>${fp==='monthly'?MO[fm]+' ':''}${fy}</strong></div>
      <div class="tw"><table><thead><tr>${headCols}</tr></thead><tbody>${rows}
        <tr style="background:#FAFBFC;font-weight:700"><td colspan="${colspan-1}" class="rt">TOTAL</td><td class="rt">${rp(total)}</td></tr>
      </tbody></table></div>
    </div>
    <div class="mf"><button class="btn btn-p" id="bCl2">Tutup</button></div>
  </div></div>`;
  }

  // VIEW PO DETAIL
  if(type==='viewPO'){
    const po=S.purchaseOrders.find(x=>x.id===d.id)||{};
    const sup=S.suppliers.find(s=>s.id===po.supId);
    const total=(po.items||[]).reduce((a,i)=>a+i.total,0);
    const stMap={draft:'Draft',sent:'Terkirim ke Supplier',received:'Diterima',cancelled:'Dibatalkan'};
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>Detail PO — ${po.noPO||'—'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3" style="margin-bottom:14px">
        <div><div class="tm" style="margin-bottom:3px">Tanggal</div><strong>${fd(po.tgl)}</strong></div>
        <div><div class="tm" style="margin-bottom:3px">Supplier</div><strong>${sup?sup.nama:'—'}</strong></div>
        <div><div class="tm" style="margin-bottom:3px">Status</div><strong>${stMap[po.status]||'—'}</strong></div>
      </div>
      <div class="fr c2" style="margin-bottom:14px">
        <div><div class="tm" style="margin-bottom:3px">Mata Uang</div><strong>${po.curr}${po.curr!=='IDR'?' @ '+fmt(po.rate)+' IDR':''}</strong></div>
        <div><div class="tm" style="margin-bottom:3px">Payment Term</div><strong>${po.payTerm==='credit'?'Credit Term':'Cash'}</strong></div>
      </div>
      <div class="tw"><table>
        <thead><tr><th>#</th><th>SKU</th><th>Nama Barang</th><th class="rt">Harga List</th><th class="rt">Disc%</th><th class="rt">Harga Net</th><th class="rt">Qty</th><th class="rt">Total</th></tr></thead>
        <tbody>${(po.items||[]).map((i,n)=>`<tr>
          <td>${n+1}</td><td><span class="chip">${i.sku||'—'}</span></td><td>${i.nama||'—'}</td>
          <td class="rt">${cur(i.hargaListAsli||i.hargaAsli||0,po.curr)}</td>
          <td class="rt">${i.disc||0}%</td>
          <td class="rt">${cur(i.hargaNetAsli||i.hargaAsli||0,po.curr)}</td>
          <td class="rt">${fmt(i.qty)}</td>
          <td class="rt">${cur(i.total,po.curr)}</td>
        </tr>`).join('')}
        <tr style="background:#FAFBFC;font-weight:700"><td colspan="7" class="rt">TOTAL</td><td class="rt">${cur(total,po.curr)}</td></tr>
        ${po.curr!=='IDR'?`<tr style="background:#FAFBFC"><td colspan="7" class="rt tm">Estimasi IDR (rate ${fmt(po.rate)})</td><td class="rt">${rp(total*(po.rate||1))}</td></tr>`:''}
        </tbody>
      </table></div>
      ${po.note?`<div class="ib" style="margin-top:12px"><strong>Catatan:</strong> ${po.note}</div>`:''}
    </div>
    <div class="mf">
      <button class="btn" data-pdfpo="${po.id}" id="bPdfFromView"><i class="ti ti-file-type-pdf"></i> Export PDF</button>
      <button class="btn" data-xlspo="${po.id}" id="bXlsFromView"><i class="ti ti-file-spreadsheet"></i> Export Excel</button>
      <button class="btn btn-p" id="bCl2">Tutup</button>
    </div>
  </div></div>`;
  }

  // DASHBOARD DETAIL MODAL
  if(type==='dashDetail'){
    const {key}=d;
    const now=new Date(),curM=now.getMonth(),curY=now.getFullYear();
    const inM=dt=>{const d2=new Date(dt);return d2.getFullYear()===curY&&d2.getMonth()===curM;};
    let judul='',rows='',total=0,headCols='';
    if(key==='omzet'||key==='laba'){
      judul=key==='omzet'?'Rincian Omzet Bulan Ini':'Rincian Laba Kotor Bulan Ini';
      headCols='<th>Tgl</th><th>Invoice</th><th>Customer</th><th class="rt">Neto</th><th class="rt">HPP</th><th class="rt">Laba Kotor</th>';
      const sl=S.sales.filter(x=>inM(x.tgl));
      rows=sl.map(s=>{const c=S.customers.find(cc=>cc.id===s.custId);const pr=saleProfit(s);total+=key==='omzet'?pr.neto:pr.labaKotor;
        return`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip" data-viewsale="${s.id}" style="cursor:pointer;color:var(--acc)">${s.inv||'—'} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td>${c?c.nama:'—'}</td><td class="rt">${rp(pr.neto)}</td><td class="rt o">${rp(pr.hppTotal)}</td><td class="rt ${pr.labaKotor>=0?'g':'r'}">${rp(pr.labaKotor)}</td></tr>`;}).join('');
      if(!sl.length)rows=`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Belum ada penjualan bulan ini</p></div></td></tr>`;
    }else if(key==='piutang'){
      judul='Rincian Piutang Customer';
      headCols='<th>Tgl</th><th>Invoice</th><th>Customer</th><th class="rt">Neto</th><th class="rt">Dibayar</th><th class="rt">Sisa</th>';
      const sl=S.sales.filter(x=>{const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);return saleNeto(x)-paid>0;});
      rows=sl.map(s=>{const c=S.customers.find(cc=>cc.id===s.custId);const paid=(s.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);const neto=saleNeto(s);const sisa=neto-paid;total+=sisa;
        return`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip" data-viewsale="${s.id}" style="cursor:pointer;color:var(--acc)">${s.inv||'—'} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td>${c?c.nama:'—'}</td><td class="rt">${rp(neto)}</td><td class="rt g">${rp(paid)}</td><td class="rt r"><strong>${rp(sisa)}</strong></td></tr>`;}).join('');
      if(!sl.length)rows=`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Tidak ada piutang outstanding</p></div></td></tr>`;
    }else if(key==='hutang'){
      judul='Rincian Hutang Supplier';
      headCols='<th>Tgl</th><th>Invoice</th><th>Supplier</th><th class="rt">Total</th><th class="rt">Dibayar</th><th class="rt">Sisa</th>';
      const pl=S.purchases.filter(x=>{const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);return purchaseTotalIDR(x)-paid>0;});
      const el=S.expenses.filter(x=>x.payStatus==='belum');
      const allRows=[
        ...pl.map(x=>{const s=S.suppliers.find(ss=>ss.id===x.supId);const paid=(x.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);const tIDR=purchaseTotalIDR(x);const sisa=tIDR-paid;total+=sisa;
          return`<tr><td class="nw">${fd(x.tgl)}</td><td><span class="chip" data-viewbuy="${x.id}" style="cursor:pointer;color:var(--acc)">${x.inv||'—'} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td>${s?s.nama:'—'}</td><td class="rt">${rp(tIDR)}</td><td class="rt g">${rp(paid)}</td><td class="rt r"><strong>${rp(sisa)}</strong></td></tr>`;}),
        ...el.map(x=>{const s=S.suppliers.find(ss=>ss.id===x.supId);total+=x.jumlah;
          return`<tr><td class="nw">${fd(x.tgl)}</td><td>${x.invNo?`<span class="chip">${x.invNo}</span>`:'Biaya'}</td><td>${s?s.nama:'—'}</td><td class="rt">${rp(x.jumlah)}</td><td class="rt">—</td><td class="rt r"><strong>${rp(x.jumlah)}</strong></td></tr>`;}),
      ];
      rows=allRows.join('')||`<tr><td colspan="6"><div class="empty" style="padding:20px"><p>Tidak ada hutang</p></div></td></tr>`;
    }else if(key==='stok'){
      judul='Rincian Nilai Stok per Brand — Klik brand untuk lihat detail';
      headCols='<th>Brand</th><th class="rt">SKU</th><th class="rt">Stok Bagus</th><th class="rt">Avg Modal</th><th class="rt">Nilai Stok</th>';
      const bRows=BRANDS.map(b=>{const ps=S.products.filter(p=>p.brand===b);if(!ps.length)return'';
        const ni=ps.reduce((a,p)=>{const s=stats(p.sku);return a+s.stokBagus*s.avg;},0);
        const bg=ps.reduce((a,p)=>a+stats(p.sku).stokBagus,0);total+=ni;
        if(!ni&&!bg)return'';
        return`<tr style="cursor:pointer" data-navbrand="${b}" title="Klik untuk lihat stok ${b}"><td><span class="bdg bb" style="cursor:pointer">${b} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td class="rt">${ps.length}</td><td class="rt ${bg<0?'r':'g'}">${fmt(bg)}</td><td class="rt o">${rp(ps.reduce((a,p)=>a+stats(p.sku).avg,0)/ps.length)}</td><td class="rt">${rp(ni)}</td></tr>`;
      });
      rows=bRows.join('')||`<tr><td colspan="5"><div class="empty" style="padding:20px"><p>Belum ada produk</p></div></td></tr>`;
    }else if(key==='tertahan'){
      judul='Rincian Dana Tertahan Marketplace';
      headCols='<th>Tgl</th><th>Invoice</th><th>Customer</th><th class="rt">Neto</th>';
      const sl=S.sales.filter(x=>x.ch==='Online'&&x.danaStatus!=='cair');
      rows=sl.map(s=>{const c=S.customers.find(cc=>cc.id===s.custId);const n=saleNeto(s);total+=n;
        return`<tr><td class="nw">${fd(s.tgl)}</td><td><span class="chip" data-viewsale="${s.id}" style="cursor:pointer;color:var(--acc)">${s.inv||'—'} <i class="ti ti-external-link" style="font-size:9px"></i></span></td><td>${c?c.nama:'—'}</td><td class="rt">${rp(n)}</td></tr>`;}).join('');
      if(!sl.length)rows=`<tr><td colspan="4"><div class="empty" style="padding:20px"><p>Tidak ada dana tertahan</p></div></td></tr>`;
    }
    const cols=headCols.split('<th').length-1;
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="tw"><table><thead><tr>${headCols}</tr></thead><tbody>${rows}
        <tr style="background:#FAFBFC;font-weight:700"><td colspan="${cols-1}" class="rt">TOTAL</td><td class="rt">${rp(total)}</td></tr>
      </tbody></table></div>
      <div class="tm" style="font-size:11px;margin-top:8px">Klik no. invoice untuk lihat detail.</div>
    </div>
    <div class="mf"><button class="btn btn-p" id="bCl2">Tutup</button></div>
  </div></div>`;
  }

  // IMPORT MARKETPLACE (SKU & Penjualan)
  if(type==='import'){
    const imp=S.imp||{};
    const mode=imp.mode||d.mode; // 'sku' atau 'sell'
    const judul=mode==='sku'?'Import Data SKU / Produk':'Import Data Penjualan';
    // FIELD yang perlu dipetakan
    const FIELDS=mode==='sku'?[
      {key:'sku',label:'SKU',wajib:true},
      {key:'nama',label:'Nama Barang',wajib:true},
      {key:'brand',label:'Brand',wajib:false},
      {key:'modal',label:'Harga Modal',wajib:false},
      {key:'stok',label:'Stok Awal Bagus',wajib:false},
    ]:[
      {key:'tgl',label:'Tanggal',wajib:true},
      {key:'inv',label:'No. Invoice / Pesanan',wajib:true},
      {key:'customer',label:'Nama Customer',wajib:false},
      {key:'sku',label:'SKU Produk',wajib:true},
      {key:'qty',label:'Qty',wajib:true},
      {key:'harga',label:'Harga Jual / Satuan',wajib:true},
      {key:'fee',label:'Total Fee Marketplace',wajib:false},
      {key:'ongkir',label:'Biaya Kirim / Ongkir',wajib:false},
    ];
    // STEP 1: upload
    if(!imp.rows){
      return`<div class="ov" id="mOv"><div class="modal">
      <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
      <div class="mb">
        <div class="ib">Langkah 1 dari 3 — Pilih file export dari marketplace (.xlsx atau .csv).</div>
        <div style="border:2px dashed var(--bd);border-radius:10px;padding:32px;text-align:center">
          <i class="ti ti-file-upload" style="font-size:36px;color:var(--t3)"></i>
          <p style="margin:8px 0;font-size:13px;color:var(--t2)">Pilih file dari Tokopedia, Shopee, Lazada, atau marketplace lain</p>
          <label class="btn btn-p" style="cursor:pointer;display:inline-flex"><i class="ti ti-upload"></i> Pilih File<input type="file" id="fImpFile" accept=".xlsx,.xls,.csv" style="display:none"></label>
        </div>
        ${mode==='sell'?`<div class="tm" style="font-size:11px;margin-top:10px">Catatan: Penjualan yang diimport akan diberi channel "Online" dan payment term "Cash". Bisa diedit setelah import.</div>`:`<div class="tm" style="font-size:11px;margin-top:10px">Catatan: Jika ada SKU yang sudah terdaftar, data akan ditimpa dengan yang baru.</div>`}
      </div>
      <div class="mf"><button class="btn" id="bCl2">Batal</button></div>
    </div></div>`;
    }
    // STEP 2: mapping kolom
    if(!imp.confirmed){
      const headers=imp.headers||[];
      const sample=imp.rows.slice(0,3);
      return`<div class="ov" id="mOv"><div class="modal modal-lg">
      <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
      <div class="mb">
        <div class="ib">Langkah 2 dari 3 — Cocokkan kolom file dengan data aplikasi. File terbaca <strong>${imp.rows.length} baris</strong>.</div>
        <div class="tw" style="margin-bottom:14px"><table><thead><tr><th>Data Aplikasi</th><th>Kolom di File</th><th>Contoh Nilai</th></tr></thead><tbody>
        ${FIELDS.map(f=>{
          const cur=imp.map?imp.map[f.key]:'';
          const sampleVal=cur&&sample.length?(sample[0][cur]??'—'):'—';
          return`<tr>
            <td><strong>${f.label}</strong>${f.wajib?' <span class="r">*</span>':''}</td>
            <td><select class="impMap" data-field="${f.key}"><option value="">— Tidak dipetakan —</option>
              ${headers.map(h=>`<option value="${h}" ${cur===h?'selected':''}>${h}</option>`).join('')}</select></td>
            <td class="tm">${sampleVal}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>
        <div class="tm" style="font-size:11px">Field bertanda <span class="r">*</span> wajib dipetakan. Aplikasi mencoba menebak otomatis berdasarkan nama kolom.</div>
      </div>
      <div class="mf"><button class="btn" id="bImpBack">Kembali</button><button class="btn btn-p" id="bImpPreview">Lanjut — Preview</button></div>
    </div></div>`;
    }
    // STEP 3: preview & konfirmasi
    const parsed=imp.parsed||[];
    const valid=parsed.filter(x=>x._valid);
    const invalid=parsed.filter(x=>!x._valid);
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${judul}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Langkah 3 dari 3 — Preview hasil. <strong class="g">${valid.length} baris siap diimport</strong>${invalid.length?`, <strong class="r">${invalid.length} baris dilewati</strong> (data wajib kosong/tidak valid)`:''}.</div>
      <div class="tw"><table><thead><tr>
        ${mode==='sku'?'<th>Status</th><th>SKU</th><th>Nama</th><th>Brand</th><th class="rt">Modal</th><th class="rt">Stok</th>':'<th>Status</th><th>Tgl</th><th>Invoice</th><th>Customer</th><th>SKU</th><th class="rt">Qty</th><th class="rt">Harga</th>'}
      </tr></thead><tbody>
      ${parsed.slice(0,50).map(x=>{
        const ok=x._valid;
        const stBadge=ok?(x._dup?`<span class="pay-badge tertahan">Timpa</span>`:`<span class="pay-badge paid">Baru</span>`):`<span class="pay-badge outstanding">Dilewati</span>`;
        if(mode==='sku')return`<tr style="${ok?'':'opacity:.5'}"><td>${stBadge}</td><td><span class="chip">${x.sku||'—'}</span></td><td>${x.nama||'—'}</td><td>${x.brand||'—'}</td><td class="rt">${x.modal?rp(x.modal):'—'}</td><td class="rt">${x.stok||0}</td></tr>`;
        return`<tr style="${ok?'':'opacity:.5'}"><td>${stBadge}</td><td class="nw">${x.tgl||'—'}</td><td><span class="chip">${x.inv||'—'}</span></td><td>${x.customer||'—'}</td><td><span class="chip">${x.sku||'—'}</span></td><td class="rt">${x.qty||0}</td><td class="rt">${x.harga?rp(x.harga):'—'}</td></tr>`;
      }).join('')}
      </tbody></table></div>
      ${parsed.length>50?`<div class="tm" style="font-size:11px;margin-top:8px">Menampilkan 50 baris pertama dari ${parsed.length} baris.</div>`:''}
      ${mode==='sell'?`<div class="tm" style="font-size:11px;margin-top:8px">Baris penjualan dengan No. Invoice sama akan digabung menjadi satu invoice multi-SKU. Customer baru akan otomatis dibuat di database.</div>`:''}
    </div>
    <div class="mf"><button class="btn" id="bImpBack2">Kembali</button><button class="btn btn-p" id="bImpConfirm">Import ${valid.length} Baris</button></div>
  </div></div>`;
  }

  // DETAIL INVOICE PENJUALAN (dari drill-down laba rugi)
  if(type==='viewSale'){
    const s=S.sales.find(x=>x.id===d.id)||{};
    const cust=S.customers.find(c=>c.id===s.custId);
    const pr=saleProfit(s);
    const paid=(s.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const payStatus=paid>=pr.neto?'paid':paid>0?'partial':'outstanding';
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>Detail Invoice — ${s.inv||'—'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3" style="margin-bottom:14px">
        <div><div class="tm" style="margin-bottom:3px">Tanggal</div><strong>${fd(s.tgl)}</strong></div>
        <div><div class="tm" style="margin-bottom:3px">Customer</div><strong>${cust?cust.nama:'—'}</strong></div>
        <div><div class="tm" style="margin-bottom:3px">Channel</div><strong>${s.ch||'—'}</strong></div>
      </div>
      <div class="tw" style="margin-bottom:14px"><table>
        <thead><tr><th>SKU</th><th>Nama Barang</th><th class="rt">Harga</th><th class="rt">Qty</th><th class="rt">Total</th></tr></thead>
        <tbody>${(s.items||[]).map(i=>`<tr>
          <td><span class="chip">${i.sku}</span></td><td>${i.nama||'—'}</td>
          <td class="rt">${rp(i.hj)}</td><td class="rt">${fmt(i.qty)}</td><td class="rt">${rp(i.total)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
      <div class="sb">
        <div class="row"><span>Subtotal Barang</span><span>${rp(pr.gross)}</span></div>
        ${pr.fee>0?`<div class="row"><span>Fee Marketplace</span><span class="r">(${rp(pr.fee)})</span></div>`:''}
        ${pr.ongkir>0?`<div class="row"><span>Biaya Kirim</span><span>${rp(pr.ongkir)}</span></div>`:''}
        ${pr.retur>0?`<div class="row"><span>Retur</span><span class="r">(${rp(pr.retur)})</span></div>`:''}
        <div class="row"><span>Neto</span><strong>${rp(pr.neto)}</strong></div>
        <div class="row"><span>Sudah Dibayar</span><span class="g">${rp(paid)}</span></div>
        <div class="row"><span>Sisa</span><strong class="${payStatus==='paid'?'g':'r'}">${rp(Math.max(0,pr.neto-paid))}</strong></div>
      </div>
      ${(s.payments||[]).length?`<div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">RIWAYAT PEMBAYARAN</div>
      <table><thead><tr><th>Tanggal</th><th>Metode</th><th class="rt">Jumlah</th><th>Catatan</th></tr></thead><tbody>
      ${s.payments.map(p=>`<tr><td>${fd(p.tgl)}</td><td>${p.met}</td><td class="rt g">${rp(p.amountIDR||p.amount)}</td><td>${p.note||'—'}</td></tr>`).join('')}
      </tbody></table></div>`:''}
    </div>
    <div class="mf">
      <button class="btn btn-ok" data-paysell="${s.id}" id="bPayFromView"><i class="ti ti-cash"></i> Catat Pembayaran</button>
      <button class="btn btn-p" id="bCl2">Tutup</button>
    </div>
  </div></div>`;
  }

  // VIEW DETAIL PEMBELIAN
  if(type==='viewBuy'){
    const b=S.purchases.find(x=>x.id===d.id)||{};
    const sup=S.suppliers.find(s=>s.id===b.supId);
    const loc=S.locations.find(l=>l.id===b.locId);
    const paid=(b.payments||[]).reduce((a,p)=>a+(p.amountIDR||p.amount),0);
    const tIDR=purchaseTotalIDR(b),sisa=tIDR-paid;
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>Detail Pembelian — ${b.inv||'—'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3" style="margin-bottom:14px">
        <div><div class="tm">Tanggal</div><strong>${fd(b.tgl)}</strong></div>
        <div><div class="tm">Supplier</div><strong>${sup?sup.nama:'—'}</strong></div>
        <div><div class="tm">Lokasi Masuk</div><strong>${loc?loc.nama:'—'}</strong></div>
      </div>
      <div class="fr c2" style="margin-bottom:14px">
        <div><div class="tm">Mata Uang</div><strong>${b.curr}${b.curr!=='IDR'?' @ '+fmt(b.rate)+' IDR':''}</strong></div>
        <div><div class="tm">Payment Term</div><strong>${b.payTerm==='credit'?'Credit Term':'Cash'}</strong></div>
      </div>
      <div class="tw"><table>
        <thead><tr><th>#</th><th>SKU</th><th>Nama</th><th class="rt">Harga List</th><th class="rt">Disc%</th><th class="rt">Harga Net</th><th class="rt">Qty</th><th class="rt">Total (IDR)</th></tr></thead>
        <tbody>${(b.items||[]).map((i,n)=>`<tr>
          <td>${n+1}</td><td><span class="chip">${i.sku}</span></td><td>${i.nama||'—'}</td>
          <td class="rt">${cur(i.hargaListAsli||0,b.curr)}</td>
          <td class="rt">${i.disc||0}%</td>
          <td class="rt">${cur(i.hargaNetAsli||0,b.curr)}</td>
          <td class="rt">${fmt(i.qty)}</td>
          <td class="rt">${rp(i.totalIDR||i.total||0)}</td>
        </tr>`).join('')}
        <tr style="background:#FAFBFC;font-weight:700"><td colspan="7" class="rt">TOTAL (IDR)</td><td class="rt">${rp(tIDR)}</td></tr>
        </tbody>
      </table></div>
      <div class="sb" style="margin-top:14px">
        <div class="row"><span>Total</span><span>${rp(tIDR)}</span></div>
        <div class="row"><span>Sudah Dibayar</span><span class="g">${rp(paid)}</span></div>
        <div class="row"><span>Sisa Hutang</span><strong class="${sisa>0?'r':''}">${rp(sisa)}</strong></div>
      </div>
      ${(b.payments||[]).length?`<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:6px">RIWAYAT PEMBAYARAN</div>
      <table><thead><tr><th>Tanggal</th><th>Metode</th><th>Mata Uang</th><th class="rt">Jumlah</th><th class="rt">IDR</th></tr></thead><tbody>
      ${b.payments.map(p=>`<tr><td>${fd(p.tgl)}</td><td>${p.met}</td><td>${p.curr||'IDR'}</td><td class="rt">${cur(p.amount,p.curr)}</td><td class="rt g">${rp(p.amountIDR||p.amount)}</td></tr>`).join('')}
      </tbody></table></div>`:''}
    </div>
    <div class="mf">
      ${sisa>0?`<button class="btn btn-ok" data-paybuy="${b.id}"><i class="ti ti-cash"></i> Catat Pembayaran</button>`:''}
      <button class="btn btn-p" id="bCl2">Tutup</button>
    </div>
  </div></div>`;
  }

  // JUAL SET KASTOR — live update
  const _rebindSellSet=()=>{
    const size=document.getElementById('fSetSize')?.value||'';
    const tpl=document.getElementById('fSetTemplate')?.value||'';
    const qty=parseInt(document.getElementById('fSetQty')?.value)||1;
    const harga=parseFloat(document.getElementById('fSetHarga')?.value)||0;
    const fee=parseFloat(document.getElementById('fFee')?.value)||0;
    const ongkir=parseFloat(document.getElementById('fOngkir')?.value)||0;
    const halfSet=document.getElementById('rHalfSet')?.checked||false;
    const custId=document.getElementById('fCust')?.value||'';
    const inv=document.getElementById('fIn')?.value||'';
    const tgl=document.getElementById('fTg')?.value||today();
    const halfSku=document.getElementById('fHalfSku')?.value||'';
    const halfQtySet=parseInt(document.getElementById('fHalfQtySet')?.value)||1;
    const halfHarga=parseFloat(document.getElementById('fHalfHarga')?.value)||0;
    S.modal={type:'sellSet',data:{sizeKode:size,templateKode:tpl,qtySet:qty,hargaSet:harga,halfSet,halfSku,halfQtySet,halfHarga,fee,ongkir,custId,inv,tgl}};
    render();bm();
  };
  ['fSetSize','fSetTemplate','fSetQty','rFullSet','rHalfSet'].forEach(id=>{
    document.getElementById(id)?.addEventListener('change',_rebindSellSet);
    document.getElementById(id)?.addEventListener('input',_rebindSellSet);
  });
  document.querySelectorAll('input[name="setMode"]').forEach(el=>el.addEventListener('change',e=>{
    const fa=document.getElementById('fullSetArea');
    const ha=document.getElementById('halfSetArea');
    if(fa)fa.style.display=e.target.value==='half'?'none':'';
    if(ha)ha.style.display=e.target.value==='half'?'':'none';
  }));
  document.getElementById('bSvSellSet')?.addEventListener('click',()=>{
    const tgl=document.getElementById('fTg')?.value;
    const inv=document.getElementById('fIn')?.value||'';
    const custId=document.getElementById('fCust')?.value||'';
    const fee=parseFloat(document.getElementById('fFee')?.value)||0;
    const ongkir=parseFloat(document.getElementById('fOngkir')?.value)||0;
    const halfSet=document.getElementById('rHalfSet')?.checked||false;
    if(!tgl){alert('Tanggal wajib diisi');return;}
    let items=[];
    if(!halfSet){
      const size=document.getElementById('fSetSize')?.value||'';
      const tplKode=document.getElementById('fSetTemplate')?.value||'';
      const qtySet=parseInt(document.getElementById('fSetQty')?.value)||1;
      const hargaSet=parseFloat(document.getElementById('fSetHarga')?.value)||0;
      if(!size){alert('Pilih ukuran roda');return;}
      if(!tplKode){alert('Pilih template set');return;}
      const tpl=SET_TYPES.find(t=>t.kode===tplKode);
      if(!tpl){alert('Template tidak ditemukan');return;}
      // expand template ke items
      const expanded=[];
      for(const k of tpl.komposisi){
        const found=findSKUForSet(k.tipe,size);
        if(!found.length){alert('SKU tidak ditemukan untuk tipe '+BRACKET_NAMES[k.tipe]+' ukuran '+SIZE_MAP[size]+'. Pastikan SKU menggunakan suffix -'+k.tipe);return;}
        // gunakan SKU pertama yang ditemukan
        const p=found[0];
        const qtyPcs=k.qty*qtySet;
        const s=stats(p.sku);
        // harga per pcs = harga set / 4 (proporsional)
        const hjPerPcs=hargaSet/4;
        expanded.push({id:uid(),sku:p.sku,nama:p.nama,brand:p.brand||'',hjAsli:hjPerPcs,hj:hjPerPcs,disc:0,qty:qtyPcs,total:hjPerPcs*qtyPcs,hpp:s.avg});
      }
      // verify total = harga set (minor rounding fix)
      const totalExpanded=expanded.reduce((a,i)=>a+i.total,0);
      const diff=hargaSet*qtySet-totalExpanded;
      if(expanded.length>0&&Math.abs(diff)>0)expanded[0].total+=diff;
      items=expanded;
    }else{
      const halfSku=document.getElementById('fHalfSku')?.value||'';
      const halfQtySet=parseInt(document.getElementById('fHalfQtySet')?.value)||1;
      const halfHarga=parseFloat(document.getElementById('fHalfHarga')?.value)||0;
      if(!halfSku){alert('Pilih SKU untuk ½ set');return;}
      const p=S.products.find(x=>x.sku===halfSku);
      const s=p?stats(halfSku):{avg:0};
      const qtyPcs=2*halfQtySet; // ½ set = 2 pcs
      items=[{id:uid(),sku:halfSku,nama:p?.nama||'',brand:p?.brand||'',hjAsli:halfHarga/2,hj:halfHarga/2,disc:0,qty:qtyPcs,total:halfHarga*halfQtySet,hpp:s.avg}];
    }
    if(!items.length){alert('Tidak ada item yang bisa dibuat');return;}
    S.sales.push({id:uid(),tgl,inv,custId,ch:'Offline',fee,ongkir,locId:S.filterLoc||'',ppnOn:false,items,payTerm:'cash',payments:[],payStatus:'paid',danaStatus:'cair'});
    save();S.modal=null;render();
    toast('Penjualan set berhasil dicatat — '+items.length+' SKU, '+items.reduce((a,i)=>a+i.qty,0)+' pcs total');
  });

  // EDIT CICILAN PIUTANG
  if(type==='editPaySell'){
    const {saleId,payId}=d;
    const sale=S.sales.find(x=>x.id===saleId)||{};
    const pay=(sale.payments||[]).find(p=>p.id===payId)||{};
    return`<div class="ov" id="mOv"><div class="modal">
    <div class="mh"><h3>Edit Cicilan Pembayaran</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="ib">Invoice <strong>${sale.inv||'—'}</strong></div>
      <div class="fr c2">
        <div><label>Tanggal Bayar</label><input id="fTg" type="date" value="${pay.tgl||today()}"></div>
        <div><label>Metode Pembayaran</label><select id="fMet">${PAY_METHODS.map(m=>`<option value="${m}" ${pay.met===m?'selected':''}>${m}</option>`).join('')}</select></div>
      </div>
      <div class="fr c2">
        <div><label>Jumlah Bayar (Rp)</label><input id="fAmt" type="number" value="${pay.amountIDR||pay.amount||0}" min="0"></div>
        <div><label>Catatan</label><input id="fNote" value="${pay.note||''}"></div>
      </div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvEditPay" data-saleid="${saleId}" data-payid="${payId}">Simpan</button></div>
  </div></div>`;
  }

  // KONVERSI STOK
  if(type==='konversi'){
    const d=S.modal.data||{};
    // build stok info per baris
    const konvLine=(prefix,items,label,badgeClass)=>{
      if(!items||!items.length)return'';
      return items.map((it,i)=>{
        const p=S.products.find(x=>x.sku===it.sku);
        const s=p?stats(it.sku):{stokBagus:0};
        return`<div class="${prefix}Line" data-idx="${i}" style="display:grid;grid-template-columns:2fr 160px 70px;gap:6px;align-items:center;padding:7px;background:#FAFBFC;border:1px solid var(--bd);border-radius:7px;margin-bottom:6px">
          <select class="${prefix}Sku" data-idx="${i}">
            <option value="">— Pilih SKU —</option>
            ${S.products.map(pp=>`<option value="${pp.sku}" ${it.sku===pp.sku?'selected':''}>${pp.sku} — ${pp.nama}</option>`).join('')}
          </select>
          <div style="font-size:11px;color:var(--t2)">
            ${p?`<span class="chip" style="font-size:10px">${it.sku}</span><br><span style="color:${s.stokBagus<0?'var(--err)':s.stokBagus<3?'var(--warn)':'var(--ok)'}">Stok: ${fmt(s.stokBagus)}</span>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:4px">
            <input class="${prefix}Qty" type="number" value="${it.qty||1}" min="1" style="text-align:center;font-size:12px;padding:4px">
            <button class="btn btn-ic btn-sm btn-d ${prefix}Rem"><i class="ti ti-minus"></i></button>
          </div>
        </div>`;
      }).join('');
    };
    const keluarItems=d.keluar||[{sku:'',qty:1}];
    const masukItems=d.masuk||[{sku:'',qty:1}];
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>${d.id?'Edit Konversi Stok':'Konversi Stok'}</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3">
        <div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
        <div><label>No. Referensi (Opsional)</label><input id="fNoRef" value="${esc(d.noRef||'')} " placeholder="KONV-001"></div>
        <div><label>Catatan (Opsional)</label><input id="fCatatan" value="${esc(d.catatan||'')} " placeholder="Switch bracket karet → fixed"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px">
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label style="margin:0;color:var(--err)">🔻 SKU KELUAR (Stok Berkurang)</label>
            <button class="btn btn-sm" id="bAddKeluar"><i class="ti ti-plus"></i> Tambah</button>
          </div>
          <div id="keluarList">${konvLine('keluar',keluarItems,'Keluar','br')}</div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label style="margin:0;color:var(--ok)">🔺 SKU MASUK (Stok Bertambah)</label>

      </div>
      <div class="ib" style="margin-top:10px;font-size:11px">
        <strong>Cara pakai:</strong> SKU Keluar = komponen yang kamu "ambil" stoknya. SKU Masuk = SKU baru yang terbentuk setelah switch. Qty boleh berbeda (misal: 5 unit Swivel jadi 5 unit Fixed, bracket Nylon 5 unit jadi Swivel).
      </div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvKonv">Simpan Konversi</button></div>
  </div></div>`;
  }

  // LOKASI / GUDANG
  if(type==='loc'){
    return`<div class="ov" id="mOv"><div class="modal">

  </div></div>`;
  }

  // DELIVERY ORDER

          const _stokInfo=it.sku&&_sStok.stokBagus!=null?('Stok: <strong style="color:'+(_sStok.stokBagus<0?'var(--err)':_sStok.stokBagus<(it.qty||1)?'var(--warn)':'var(--ok)')+'">'+fmt(_sStok.stokBagus)+' pcs</strong>'+(_fromL?' di '+_fromL.nama:'')):'';

            <div>
              <select class="doSku" style="width:100%;padding:7px;border:1px solid var(--bd);border-radius:7px;font-family:inherit;font-size:12px"><option value="">— Pilih SKU —</option>${S.products.map(p=>`<option value="${p.sku}" ${it.sku===p.sku?'selected':''}>${p.sku} — ${p.nama}</option>`).join('')}</select>

  </div></div>`;
  }

  // VIEW DO DETAIL
  if(type==='viewDO'){

      <div class="fr c2" style="margin-bottom:14px">
        <div><div class="tm" style="margin-bottom:3px">Dari</div><strong>${fromL?fromL.nama:'—'}</strong></div>

        <div><div class="tm" style="margin-bottom:3px">Status</div><strong>${stMap[d2.status]||'—'}</strong></div>

  if(type==='sellSet'){

    if(selTemplate&&selSize&&!selHalfSet){

          return`<div class="row"><span><span class="chip">${it.sku}</span> ${it.nama} <span class="tm">(${BRACKET_NAMES[it.tipe]})</span></span><span class="${s.stokBagus<it.qty?'r':'g'}">−${fmt(it.qty)} pcs (sisa: ${fmt(s.stokBagus-it.qty)})</span></div>`;

        previewHtml=`<div class="ib" style="background:var(--errl);border-color:var(--err);margin-top:10px">Tidak ditemukan SKU yang cocok untuk template ${selTemplate} ukuran ${SIZE_MAP[selSize]||selSize}. Pastikan SKU menggunakan suffix tipe (-S, -F, -SB, -WO).</div>`;

    const custOpts=S.customers.map(c=>`<option value="${c.id}" ${d.custId===c.id?'selected':''}>${c.nama}</option>`).join('');
    return`<div class="ov" id="mOv"><div class="modal modal-lg">
    <div class="mh"><h3>Jual Set Kastor</h3><button class="btn btn-ic" id="bCl"><i class="ti ti-x"></i></button></div>
    <div class="mb">
      <div class="fr c3">
        <div><label>Tanggal</label><input id="fTg" type="date" value="${d.tgl||today()}"></div>
        <div><label>No. Invoice</label><input id="fIn" value="${esc(d.inv||'')} " placeholder="INV-001"></div>
        <div><label>Customer</label><select id="fCust"><option value="">— Pilih —</option>${custOpts}</select></div>

      <div class="fr c2">
        <div><label>Ukuran Roda</label><select id="fSetSize">
          <option value="">— Pilih Ukuran —</option>
          ${sizes.map(([k,l])=>`<option value="${k}" ${selSize===k?'selected':''}>${l} (${k})</option>`).join('')}
        </select></div>
        <div><label>Mode</label>
          <div style="display:flex;gap:8px;margin-top:8px">
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:400"><input type="radio" name="setMode" id="rFullSet" value="full" ${!selHalfSet?'checked':''}> Set Penuh (4 pcs)</label>
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:400"><input type="radio" name="setMode" id="rHalfSet" value="half" ${selHalfSet?'checked':''}> ½ Set (2 pcs, 1 SKU)</label>

          </select></div>
          <div><label>Qty Set</label><input id="fSetQty" type="number" value="${selQtySet}" min="1" placeholder="Berapa set?"></div>
          <div><label>Harga per Set (Rp)</label><input id="fSetHarga" type="number" value="${d.hargaSet||0}" min="0"></div>

      </div>
      <div class="fr c2" style="margin-top:8px">
        <div><label>Fee Marketplace (Rp)</label><input id="fFee" type="number" value="${d.fee||0}" min="0"></div>
        <div><label>Ongkir (Rp)</label><input id="fOngkir" type="number" value="${d.ongkir||0}" min="0"></div>
      </div>
    </div>
    <div class="mf"><button class="btn" id="bCl2">Batal</button><button class="btn btn-p" id="bSvSellSet">Proses & Simpan</button></div>
  </div></div>`;
  }
  return'';
}

function skuLinePO(it,idx){
  const opts=S.products.map(p=>`<option value="${p.sku}" ${it.sku===p.sku?'selected':''}>${p.sku} — ${p.nama}</option>`).join('');

function calcSellSummary(items,fee,ongkir,ppnOn,ppnPct){
  const gross=items.reduce((a,i)=>a+(i.total||0),0);
  const ppnAktif=ppnOn==='yes'||ppnOn===true;
  const ppnRate=(ppnPct||11)/100;
  const neto=gross-(fee||0);
  // tax-inclusive: PPN sudah termasuk dalam harga jual, diekstrak
  const ppn=ppnAktif?Math.round(neto*ppnRate/(1+ppnRate)):0;
  const netoSebelumPPN=ppnAktif?neto-ppn:neto;
  return`<div class="row"><span>Subtotal Barang (inc. PPN)</span><span>${rp(gross)}</span></div>
    <div class="row"><span>Fee Marketplace</span><span class="r">${rp(fee||0)}</span></div>
    ${ongkir>0?`<div class="row"><span>Biaya Kirim / Ongkir</span><span>${rp(ongkir||0)}</span></div>`:''}
    <div class="row"><span>Total Neto Invoice</span><strong>${rp(neto)}</strong></div>
    ${ppnAktif?`<div class="divider" style="margin:4px 0"></div>
    <div class="row tm"><span>├ Neto sebelum PPN</span><span>${rp(netoSebelumPPN)}</span></div>
    <div class="row tm"><span>├ PPN ${ppnPct||11}% (sudah termasuk)</span><span>${rp(ppn)}</span></div>`:''}`;
}

// collectors
function collectPO(){
  return [...document.querySelectorAll('#itemListPO .sku-line')].map(l=>{
    const sku=l.querySelector('.poSku').value;
    const hl=parseFloat(l.querySelector('.poHl').value)||0;
    const dc=parseFloat(l.querySelector('.poDc').value)||0;
    const qty=parseFloat(l.querySelector('.poQty').value)||1;
    const hn=hl*(1-dc/100);
    const p=S.products.find(x=>x.sku===sku);
    return{id:uid(),sku,nama:p?.nama||'',qty,hargaListAsli:hl,disc:dc,hargaNetAsli:hn,hargaAsli:hn,total:hn*qty};
  });
}
function collectBuy(){
  return [...document.querySelectorAll('#itemListBuy .sku-line')].map(l=>{
    const sku=l.querySelector('.bySku').value;
    const hl=parseFloat(l.querySelector('.byHl').value)||0;
    const dc=parseFloat(l.querySelector('.byDc').value)||0;
    const qty=parseFloat(l.querySelector('.byQt').value)||1;
    const hn=hl*(1-dc/100);
    const p=S.products.find(x=>x.sku===sku);
    return{id:uid(),sku,nama:p?.nama||'',brand:p?.brand||'',hargaListAsli:hl,disc:dc,hargaNetAsli:hn,qty,totalAsli:hn*qty};
  });
}
function collectSell(){
  const result=[];
  [...document.querySelectorAll('#itemListSell .sku-line')].forEach(l=>{
    const isSet=l.querySelector('.slIsSet')?.checked||false;
    if(isSet){
      // expand set template into individual SKU rows
      const tplKode=l.querySelector('.slSetTpl')?.value||'';
      const sizeKode=l.querySelector('.slSetSize')?.value||'';
      const qtySet=parseFloat(l.querySelector('.slSetQty')?.value)||1;
      const hargaSet=parseFloat(l.querySelector('.slSetHarga')?.value)||0;
      if(!tplKode||!sizeKode){
        // incomplete set — skip (validation will catch)
        result.push({id:uid(),sku:'',nama:'',brand:'',hjAsli:0,hj:0,disc:0,qty:1,total:0,hpp:0,isSet:true,setTpl:tplKode,setSize:sizeKode,setQty:qtySet,setHarga:hargaSet,_incomplete:true});
        return;
      }
      const tpl=SET_TYPES.find(t=>t.kode===tplKode);
      if(!tpl)return;
      const hargaPerPcs=hargaSet/4; // 1 set = 4 pcs
      const kompSels=[...l.querySelectorAll('.kompSkuSel')];
      tpl.komposisi.forEach((k,ki)=>{
        const selSkuVal=kompSels[ki]?.value||'';
        const found=selSkuVal?[S.products.find(x=>x.sku===selSkuVal)].filter(Boolean):findSKUForSet(k.tipe,sizeKode);
        if(!found.length||!found[0])return;
        const p=found[0];
        const qtyPcs=k.qty*qtySet;
        const s=stats(p.sku);
        result.push({id:uid(),sku:p.sku,nama:p.nama,brand:p.brand||'',hjAsli:hargaPerPcs,hj:hargaPerPcs,disc:0,qty:qtyPcs,total:hargaPerPcs*qtyPcs,hpp:s.avg,_fromSet:tplKode,_setSize:sizeKode});
      });
    }else{
      const sku=l.querySelector('.slSku')?.value||'';
      const hjAsli=parseFloat(l.querySelector('.slHj')?.value)||0;
      const dc=parseFloat(l.querySelector('.slDc')?.value)||0;
      const qty=parseFloat(l.querySelector('.slQt')?.value)||1;
      const hjNet=hjAsli*(1-dc/100);
      const p=S.products.find(x=>x.sku===sku);
      const s=sku?stats(sku):{avg:0};
      result.push({id:uid(),sku,nama:p?.nama||'',brand:p?.brand||'',hjAsli,hj:hjNet,disc:dc,qty,total:hjNet*qty,hpp:s.avg});
    }
  });
  return result;
}
