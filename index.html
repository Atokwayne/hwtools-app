// ═══ IMPORT LOGIC ═══
function impGuessColumn(headers,keywords){
  // tebak kolom berdasarkan kata kunci pada nama header
  for(const h of headers){
    const hl=String(h).toLowerCase();
    if(keywords.some(k=>hl.includes(k)))return h;
  }
  return '';
}
function impAutoMap(mode,headers){
  const map={};
  if(mode==='sku'){
    map.sku=impGuessColumn(headers,['sku','kode']);
    map.nama=impGuessColumn(headers,['nama','product name','nama produk','nama barang']);
    map.brand=impGuessColumn(headers,['brand','merek']);
    map.modal=impGuessColumn(headers,['modal','hpp','harga beli','cost']);
    map.stok=impGuessColumn(headers,['stok','stock','qty']);
  }else{
    map.tgl=impGuessColumn(headers,['tanggal','tgl','date','order date','waktu pesanan']);
    map.inv=impGuessColumn(headers,['invoice','no. pesanan','nomor pesanan','order id','no pesanan','order sn']);
    map.customer=impGuessColumn(headers,['customer','pembeli','buyer','nama pembeli','penerima']);
    map.sku=impGuessColumn(headers,['sku','kode']);
    map.qty=impGuessColumn(headers,['qty','jumlah','quantity','kuantitas']);
    map.harga=impGuessColumn(headers,['harga','price','harga satuan','harga jual','unit price']);
    map.fee=impGuessColumn(headers,['fee','biaya admin','admin','komisi','layanan']);
    map.ongkir=impGuessColumn(headers,['ongkir','ongkos kirim','shipping','biaya kirim']);
  }
  return map;
}
function impParseFile(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=new Uint8Array(ev.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){alert('File kosong atau tidak terbaca');return;}
      const headers=Object.keys(rows[0]);
      cb(rows,headers);
    }catch(e){alert('Gagal membaca file: '+e.message);}
  };
  reader.readAsArrayBuffer(file);
}
function impToNumber(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return v;
  let s=String(v).replace(/[^0-9,.-]/g,'').trim();
  if(s==='')return 0;
  const hasComma=s.includes(','),hasDot=s.includes('.');
  if(hasComma&&hasDot){
    // format Indonesia: titik=ribuan, koma=desimal  -> "1.234.567,89"
    s=s.replace(/\./g,'').replace(',','.');
  }else if(hasComma){
    // hanya koma: anggap desimal "1234,56"
    s=s.replace(',','.');
  }else if(hasDot){
    // hanya titik: bisa ribuan ("1.234.567") atau desimal ("1234.56")
    const parts=s.split('.');
    // jika ada >1 titik ATAU bagian terakhir bukan 1-2 digit -> titik = ribuan
    if(parts.length>2||(parts.length===2&&parts[1].length===3)){
      s=s.replace(/\./g,'');
    }
    // selain itu biarkan sebagai desimal
  }
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}
function impToDate(v){
  if(!v)return '';
  if(typeof v==='number'){
    // serial date Excel
    const d=new Date(Math.round((v-25569)*86400000));
    return d.toISOString().slice(0,10);
  }
  const d=new Date(v);
  if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);
  // coba format dd/mm/yyyy atau dd-mm-yyyy
  const m=String(v).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){let y=m[3];if(y.length===2)y='20'+y;return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;}
  return '';
}
function impParseRows(mode,rows,map){
  return rows.map(row=>{
    if(mode==='sku'){
      const sku=String(row[map.sku]||'').trim().toUpperCase();
      const nama=String(row[map.nama]||'').trim();
      const brand=map.brand?String(row[map.brand]||'').trim():'';
      const modal=map.modal?impToNumber(row[map.modal]):0;
      const stok=map.stok?impToNumber(row[map.stok]):0;
      const _valid=!!(sku&&nama);
      const _dup=_valid&&S.products.some(p=>p.sku===sku);
      // cocokkan brand ke daftar resmi (case-insensitive)
      const brandMatch=BRANDS.find(b=>b.toLowerCase()===brand.toLowerCase())||(brand?BRANDS[BRANDS.length-1]:BRANDS[0]);
      return{sku,nama,brand:brandMatch,modal,stok,_valid,_dup};
    }else{
      const tgl=map.tgl?impToDate(row[map.tgl]):'';
      const inv=String(row[map.inv]||'').trim();
      const customer=map.customer?String(row[map.customer]||'').trim():'';
      const sku=String(row[map.sku]||'').trim().toUpperCase();
      const qty=impToNumber(row[map.qty]);
      const harga=impToNumber(row[map.harga]);
      const fee=map.fee?impToNumber(row[map.fee]):0;
      const ongkir=map.ongkir?impToNumber(row[map.ongkir]):0;
      const _valid=!!(tgl&&inv&&sku&&qty>0&&harga>0);
      return{tgl,inv,customer,sku,qty,harga,fee,ongkir,_valid};
    }
  });
}
function impCommitSKU(parsed){
  let added=0,updated=0;
  parsed.filter(x=>x._valid).forEach(x=>{
    const existing=S.products.find(p=>p.sku===x.sku);
    if(existing){
      S.products=S.products.map(p=>p.id===existing.id?{...p,nama:x.nama,brand:x.brand,m:x.modal||p.m,sb:x.stok||p.sb}:p);
      updated++;
    }else{
      S.products.push({id:uid(),sku:x.sku,nama:x.nama,brand:x.brand,m:x.modal,sb:x.stok,sk:0,foto:''});
      added++;
    }
  });
  return{added,updated};
}
function impCommitSell(parsed){
  const valid=parsed.filter(x=>x._valid);
  // kelompokkan baris berdasarkan No. Invoice
  const groups={};
  valid.forEach(x=>{if(!groups[x.inv])groups[x.inv]=[];groups[x.inv].push(x);});
  let created=0,skipped=0;
  Object.entries(groups).forEach(([inv,rows])=>{
    // lewati jika invoice sudah ada
    if(S.sales.some(s=>s.inv===inv)){skipped++;return;}
    const first=rows[0];
    // cari atau buat customer
    let custId='';
    if(first.customer){
      let cust=S.customers.find(c=>c.nama.toLowerCase()===first.customer.toLowerCase());
      if(!cust){cust={id:uid(),nama:first.customer,tipe:'Retail'};S.customers.push(cust);}
      custId=cust.id;
    }
    const items=rows.map(r=>{
      const p=S.products.find(pp=>pp.sku===r.sku);
      const s=p?stats(r.sku):{avg:0};
      return{id:uid(),sku:r.sku,nama:p?.nama||'',brand:p?.brand||'',hj:r.harga,disc:0,qty:r.qty,total:r.harga*r.qty,hpp:s.avg};
    });
    const fee=rows.reduce((a,r)=>a+(r.fee||0),0);
    const ongkir=rows.reduce((a,r)=>a+(r.ongkir||0),0);
    S.sales.push({id:uid(),tgl:first.tgl,inv,custId,ch:'Online',fee,ongkir,ppnOn:false,items,payTerm:'cash',payments:[],payStatus:'paid',danaStatus:'tertahan'});
    created++;
  });
  return{created,skipped};
}

  const _bPdfDO=document.getElementById('bPdfDO');
  if(_bPdfDO)_bPdfDO.addEventListener('click',function(){exportDOpdf(this.dataset.doid);});
  document.getElementById('bConfFromView')?.addEventListener('click',function(){
    const doId=this.dataset.confirmdo;
    if(!confirm('Konfirmasi terima barang? Stok akan bergerak ke lokasi tujuan.'))return;
    S.deliveryOrders=S.deliveryOrders.map(x=>x.id===doId?{...x,status:'confirmed',confirmedTgl:today()}:x);
    save();S.modal=null;render();toast('DO dikonfirmasi — stok telah bergerak');
  });

  // KONVERSI STOK
  const collectKonvLines=(prefix)=>{
    return [...document.querySelectorAll(`.${prefix}Line`)].map(line=>{
      const sku=line.querySelector(`.${prefix}Sku`)?.value||'';
      const qty=parseFloat(line.querySelector(`.${prefix}Qty`)?.value)||1;
      const p=S.products.find(x=>x.sku===sku);
      return{sku,nama:p?.nama||'',brand:p?.brand||'',qty};
    }).filter(x=>x.sku);
  };
  const addKonvLine=(listId,prefix)=>{
    const list=document.getElementById(listId);if(!list)return;
    const idx=list.querySelectorAll(`.${prefix}Line`).length;
    const div=document.createElement('div');
    div.innerHTML=`<div class="${prefix}Line" data-idx="${idx}" style="display:grid;grid-template-columns:2fr 160px 70px;gap:6px;align-items:center;padding:7px;background:#FAFBFC;border:1px solid var(--bd);border-radius:7px;margin-bottom:6px">
      <select class="${prefix}Sku" data-idx="${idx}"><option value="">— Pilih SKU —</option>${S.products.map(p=>`<option value="${p.sku}">${p.sku} — ${p.nama}</option>`).join('')}</select>
      <div class="${prefix}Info" style="font-size:11px;color:var(--t2)">—</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <input class="${prefix}Qty" type="number" value="1" min="1" style="text-align:center;font-size:12px;padding:4px">
        <button class="btn btn-ic btn-sm btn-d ${prefix}Rem"><i class="ti ti-minus"></i></button>
      </div>
    </div>`;
    list.appendChild(div.firstElementChild);
    bindKonvLine(list.lastElementChild,prefix);
  };
  const bindKonvLine=(line,prefix)=>{
    const skuSel=line.querySelector(`.${prefix}Sku`);
    const infoDiv=line.querySelector(`.${prefix}Info`);
    if(skuSel&&infoDiv){
      skuSel.addEventListener('change',()=>{
        const sku=skuSel.value;const p=S.products.find(x=>x.sku===sku);
        if(p){const s=stats(sku);const clr=s.stokBagus<0?'var(--err)':s.stokBagus<3?'var(--warn)':'var(--ok)';
          infoDiv.innerHTML=`<span class="chip" style="font-size:10px">${sku}</span><br><span style="color:${clr}">Stok: ${fmt(s.stokBagus)}</span>`;}
        else infoDiv.textContent='—';
      });
    }
    line.querySelector(`.${prefix}Rem`)?.addEventListener('click',()=>line.remove());
  };
  document.getElementById('bAddKeluar')?.addEventListener('click',()=>addKonvLine('keluarList','keluar'));
  document.getElementById('bAddMasuk')?.addEventListener('click',()=>addKonvLine('masukList','masuk'));
  document.querySelectorAll('.keluarLine').forEach(l=>bindKonvLine(l,'keluar'));
  document.querySelectorAll('.masukLine').forEach(l=>bindKonvLine(l,'masuk'));
  setTimeout(()=>document.querySelectorAll('.keluarSku,.masukSku').forEach(sel=>{if(sel.value)sel.dispatchEvent(new Event('change'));}),30);
  document.getElementById('bSvKonv')?.addEventListener('click',()=>{
    const tgl=document.getElementById('fTg').value;
    const noRef=document.getElementById('fNoRef').value.trim();
    const catatan=document.getElementById('fCatatan').value.trim();
    const keluar=collectKonvLines('keluar');
    const masuk=collectKonvLines('masuk');
    if(!tgl){alert('Tanggal wajib diisi');return;}
    if(!keluar.length&&!masuk.length){alert('Minimal isi 1 SKU keluar dan 1 SKU masuk');return;}
    if(!keluar.length){alert('Tambahkan minimal 1 SKU yang stoknya berkurang (SKU Keluar)');return;}
    if(!masuk.length){alert('Tambahkan minimal 1 SKU yang stoknya bertambah (SKU Masuk)');return;}
    // cek stok cukup
    const kurang=keluar.filter(x=>{const s=stats(x.sku);return s.stokBagus-x.qty<0;});
    if(kurang.length){
      const warn=kurang.map(x=>{const s=stats(x.sku);return`${x.sku} (stok ${fmt(s.stokBagus)}, konversi ${fmt(x.qty)})`;}).join(', ');
      if(!confirm('Stok akan menjadi minus untuk: '+warn+'\n\nLanjutkan tetap?'))return;
    }
    const editId=S.modal?.data?.id||'';
    const rec={tgl,noRef,catatan,keluar,masuk};
    if(editId){S.stockConversions=S.stockConversions.map(c=>c.id===editId?{...c,...rec}:c);toast('Konversi diperbarui');}
    else{S.stockConversions.push({id:uid(),...rec});toast('Konversi dicatat');}
    save();S.modal=null;render();
  });

  // RETUR
  document.getElementById('bSvRet')?.addEventListener('click',function(){
    const id=this.dataset.id;
    const tg=document.getElementById('fTg').value;
    const jenisRetur=document.getElementById('fJenis').value;
    const sku=document.getElementById('fSkRet').value,qt=parseFloat(document.getElementById('fQt').value)||1;
    const nilaiRetur=parseFloat(document.getElementById('fNilai').value)||0;
    const alasan=document.getElementById('fAlasan').value,stokMasuk=document.getElementById('fStokMasuk').checked;
    const refSaleId=document.getElementById('fRefSale')?.value||'';
    const refBuyId=document.getElementById('fRefBuy')?.value||'';
    if(!sku){alert('Pilih SKU produk');return;}
    if(jenisRetur==='penjualan'&&!refSaleId){alert('Pilih invoice penjualan terkait');return;}
    if(jenisRetur==='pembelian'&&!refBuyId){alert('Pilih invoice pembelian terkait');return;}
    const p=S.products.find(x=>x.sku===sku);
    const rec={tgl:tg,jenisRetur,sku,nama:p?.nama||'',qty:qt,nilaiRetur,alasan,stokMasuk,refSaleId,refBuyId};
    if(id){S.returns=S.returns.map(x=>x.id===id?{...x,...rec}:x);toast('Retur diperbarui');}
    else{S.returns.push({id:uid(),...rec});toast('Retur dicatat');}
    save();S.modal=null;render();
  });
  // toggle row jenis retur
  document.getElementById('fJenis')?.addEventListener('change',e=>{
    const isJual=e.target.value==='penjualan';
    const rs=document.getElementById('refSaleRow'),rb=document.getElementById('refBuyRow');
    if(rs)rs.style.display=isJual?'':'none';
    if(rb)rb.style.display=isJual?'none':'';
    // reset SKU list when jenis changes
    retPopulateSKU('');
  });
  // ketika invoice dipilih: populate SKU dari invoice tsb
  document.getElementById('fRefSale')?.addEventListener('change',e=>{retPopulateSKU(e.target.value,'sale');});
  document.getElementById('fRefBuy')?.addEventListener('change',e=>{retPopulateSKU(e.target.value,'buy');});
  document.getElementById('fSkRet')?.addEventListener('change',()=>retCalcNilai());
  document.getElementById('fQt')?.addEventListener('input',()=>retCalcNilai());
}

// helper: populate SKU dropdown sesuai invoice yang dipilih
function retPopulateSKU(refId,refType){
  const sel=document.getElementById('fSkRet');if(!sel)return;
  sel.innerHTML='<option value="">— Pilih SKU —</option>';
  if(!refId){return;}
  let items=[];
  if(refType==='sale'){
    const sale=S.sales.find(x=>x.id===refId);
    items=(sale?.items||[]);
  }else{
    const buy=S.purchases.find(x=>x.id===refId);
    items=(buy?.items||[]);
  }
  items.forEach(i=>{
    const opt=document.createElement('option');
    opt.value=i.sku;
    opt.textContent=i.sku+' — '+(i.nama||'')+(i.qty?' ('+fmt(i.qty)+' pcs)':'');
    opt.dataset.harga=refType==='sale'?(i.hj||0):(i.hargaNetIDR||i.hargaNetAsli||0);
    sel.appendChild(opt);
  });
  retCalcNilai();
}
// helper: auto-fill nilai retur
function retCalcNilai(){
  const sel=document.getElementById('fSkRet');
  const qtyEl=document.getElementById('fQt');
  const nilaiEl=document.getElementById('fNilai');
  if(!sel||!qtyEl||!nilaiEl)return;
  const opt=sel.options[sel.selectedIndex];
  const harga=parseFloat(opt?.dataset?.harga||0);
  const qty=parseFloat(qtyEl.value)||1;
  if(harga>0)nilaiEl.value=Math.round(harga*qty);
}

function bindPOItems(){
  const list=document.getElementById('itemListPO');if(!list)return;
  document.getElementById('bAddItemPO')?.addEventListener('click',()=>{
    const div=document.createElement('div');div.innerHTML=skuLinePO({id:uid(),sku:'',qty:1,hargaAsli:0,total:0},list.children.length);
    list.appendChild(div.firstElementChild);bindPOLine(list.lastElementChild);
  });
  [...list.children].forEach(l=>bindPOLine(l));
}
function bindPOLine(l){
  l.querySelectorAll('.poHl,.poDc,.poQty').forEach(el=>el.addEventListener('input',()=>{
    const hl=parseFloat(l.querySelector('.poHl').value)||0,dc=parseFloat(l.querySelector('.poDc').value)||0,q=parseFloat(l.querySelector('.poQty').value)||1;
    const hn=hl*(1-dc/100);
    l.querySelector('.poHn').value=Math.round(hn);
    l.querySelector('.poTot').value=Math.round(hn*q);updatePOTotal();
  }));
  l.querySelector('.poRem')?.addEventListener('click',()=>{l.remove();updatePOTotal();});
  updatePOTotal();
}
function bindBuyItems(){
  const list=document.getElementById('itemListBuy');if(!list)return;
  document.getElementById('bAddItemBuy')?.addEventListener('click',()=>{
    const div=document.createElement('div');div.innerHTML=skuLineBuy({id:uid(),sku:'',qty:1,hargaListAsli:0,disc:0,hargaNetAsli:0,totalAsli:0},list.children.length);
    list.appendChild(div.firstElementChild);bindBuyLine(list.lastElementChild);
  });
  [...list.children].forEach(l=>bindBuyLine(l));
}
function bindBuyLine(l){
  l.querySelectorAll('.byHl,.byDc,.byQt').forEach(el=>el.addEventListener('input',()=>{
    const hl=parseFloat(l.querySelector('.byHl').value)||0,dc=parseFloat(l.querySelector('.byDc').value)||0,q=parseFloat(l.querySelector('.byQt').value)||1;
    const hn=hl*(1-dc/100);l.querySelector('.byHn').value=Math.round(hn);l.querySelector('.byTot').value=Math.round(hn*q);updateBuyTotal();
  }));
  l.querySelector('.byRem')?.addEventListener('click',()=>{l.remove();updateBuyTotal();});
  updateBuyTotal();
}
function bindSellItems(){
  const list=document.getElementById('itemListSell');if(!list)return;
  document.getElementById('bAddItemSell')?.addEventListener('click',()=>{
    const div=document.createElement('div');div.innerHTML=skuLineSell({id:uid(),sku:'',qty:1,hj:0,disc:0,total:0},list.children.length);
    list.appendChild(div.firstElementChild);bindSellLine(list.lastElementChild);
  });
  [...list.children].forEach(l=>bindSellLine(l));
}
function bindSellLine(l){
  // normal row handlers
  l.querySelectorAll('.slHj,.slDc,.slQt').forEach(el=>el.addEventListener('input',()=>{
    const hj=parseFloat(l.querySelector('.slHj')?.value)||0,dc=parseFloat(l.querySelector('.slDc')?.value)||0,q=parseFloat(l.querySelector('.slQt')?.value)||1;
    const hjn=hj*(1-dc/100);const tot=l.querySelector('.slTot');if(tot)tot.value=Math.round(hjn*q);updateSellSummary();
  }));
  l.querySelector('.slSku')?.addEventListener('change',updateSellSummary);
  l.querySelector('.slRem')?.addEventListener('click',()=>{l.remove();updateSellSummary();});
  // set row handlers
  const isSetCb=l.querySelector('.slIsSet');
  const normalRow=l.querySelector('.slNormalRow');
  const setRow=l.querySelector('.slSetRow');
  const setInfo=l.querySelector('.slSetInfo');
  const _buildKomposisi=()=>{
    const komp=l.querySelector('.slSetKomposisi');if(!komp)return;
    const tplKode=l.querySelector('.slSetTpl')?.value||'';
    const sizeKode=l.querySelector('.slSetSize')?.value||'';
    const qtySet=parseFloat(l.querySelector('.slSetQty')?.value)||1;
    if(!tplKode||!sizeKode){komp.style.display='none';if(setInfo)setInfo.innerHTML='Pilih template dan ukuran dulu';return;}
    const tpl=SET_TYPES.find(t=>t.kode===tplKode);
    if(!tpl){komp.style.display='none';return;}
    komp.style.display='block';
    // build picker per komponen
    const rows=tpl.komposisi.map((k,ki)=>{
      const found=findSKUForSet(k.tipe,sizeKode);
      const qtyPcs=k.qty*qtySet;
      const selId='kompSku_'+ki+'_'+idx;
      const curVal=komp.querySelectorAll('.kompSkuSel')[ki]?.value||'';
      const opts=found.map(p=>{
        const s=stats(p.sku);
        const clr=s.stokBagus<qtyPcs?'color:var(--err)':'';
        return`<option value="${p.sku}" style="${clr}" ${(curVal||found[0]?.sku)===p.sku?'selected':''}>${p.sku} — ${p.nama} (stok: ${fmt(s.stokBagus)})</option>`;
      }).join('');
      if(!found.length)return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span class="bdg bo">${BRACKET_NAMES[k.tipe]} ×${qtyPcs}pcs</span><span style="color:var(--err);font-size:11px">✗ SKU tidak ditemukan — tambah produk dengan suffix -${k.tipe} dan kode ${sizeKode}</span></div>`;
      return`<div style="display:grid;grid-template-columns:160px 1fr 80px;gap:8px;align-items:center;margin-bottom:6px">
        <div><span class="bdg ${k.tipe==='SB'?'bo':k.tipe==='F'?'bx':'bb'}">${BRACKET_NAMES[k.tipe]}</span><span class="tm" style="font-size:10px;margin-left:4px">×${qtyPcs}pcs</span></div>
        <select class="kompSkuSel" data-ki="${ki}">${opts}</select>
        <span id="${selId}Stok" style="font-size:11px"></span>
      </div>`;
    });
    komp.innerHTML='<div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:8px">PILIH SKU PER KOMPONEN <span style="font-weight:400">(difilter: '+BRACKET_NAMES[tpl.komposisi[0]?.tipe]+' + ukuran '+SIZE_MAP[sizeKode]+' — pilih bahan roda)</span></div>'+rows.join('');
    // wire stok update per komponen select
    komp.querySelectorAll('.kompSkuSel').forEach(sel=>{
      const ki=parseInt(sel.dataset.ki);const k=tpl.komposisi[ki];
      const _upd=()=>{
        const sku=sel.value;if(!sku)return;
        const qtyPcs=k.qty*qtySet;const s=stats(sku);
        const clr=s.stokBagus<qtyPcs?'var(--err)':'var(--ok)';
        const stokEl=sel.parentElement?.querySelector('[id$="Stok"]');
        if(stokEl)stokEl.innerHTML=`<span style="color:${clr}">stok:${fmt(s.stokBagus)}</span>`;
        updateSellSummary();
      };
      sel.addEventListener('change',_upd);setTimeout(_upd,10);
    });
  };
  const updateSetInfo=()=>{
    if(!isSetCb?.checked)return;
    _buildKomposisi();
    updateSellSummary();
  };
  isSetCb?.addEventListener('change',()=>{
    const on=isSetCb.checked;
    if(normalRow)normalRow.style.display=on?'none':'grid';
    if(setRow)setRow.style.display=on?'grid':'none';
    if(setInfo)setInfo.innerHTML='';
    updateSellSummary();
  });
  l.querySelectorAll('.slSetTpl,.slSetSize,.slSetQty,.slSetHarga').forEach(el=>{
    el.addEventListener('change',updateSetInfo);
    el.addEventListener('input',updateSetInfo);
  });
  updateSellSummary();
}

load();render();
</script>
</body>
</html>
